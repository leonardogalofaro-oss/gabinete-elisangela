<!DOCTYPE html>
<html lang="pt-BR" class="">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <!-- Privacidade: não vaza a URL do app para serviços externos (mapa OSM/Nominatim) -->
  <meta name="referrer" content="no-referrer" />
  <!-- Seguranca (defesa-em-profundidade): mesmo que um XSS escape, dados NAO podem ser
       enviados a servidores de fora — so GitHub (sync) e OpenStreetMap (mapa) sao liberados.
       Sem unsafe-inline: handlers/scripts injetados nao executam; os 2 blocos inline
       legitimos entram por hash SHA-256. Ao editar JS inline, rode: node scripts/csp-hash.cjs
       (recalcula os hashes, senao a app nao carrega). unsafe-eval permanece (Tailwind JIT). -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-eval' 'sha256-u8lzBZlZD+kvopqDD4PNO1GImd7rgHuXRZ18++81gqg=' 'sha256-RSHEdJAvam62Bq5d/xvY24sRncln2vPFZyyxWZLT/fw='; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://*.tile.openstreetmap.org https://*.openstreetmap.org; font-src 'self' data:; connect-src 'self' blob: https://api.github.com https://nominatim.openstreetmap.org https://*.tile.openstreetmap.org; object-src 'none'; base-uri 'self'; frame-src 'none'; form-action 'none'" />
  <title>Sistema de Gabinete</title>

  <!-- ── PWA ────────────────────────────────────────────────────────── -->
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#0369A1" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)" />
  <meta name="color-scheme" content="light dark" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Gabinete" />
  <meta name="application-name" content="Sistema de Gabinete" />
  <link rel="icon" type="image/svg+xml" href="./icon.svg" />
  <link rel="apple-touch-icon" href="./icon.svg" id="apple-touch-icon-link" />

  <!-- ── Bibliotecas (locais — funciona 100% offline) ──────────────── -->
  <!-- Tailwind CSS (permite config inline) -->
  <script src="./vendor/tailwind.min.js"></script>

  <!-- Fontes — DM Sans (corpo) + Newsreader (display) -->
  <link href="./vendor/fonts/fonts.css" rel="stylesheet" />

  <!-- Font Awesome 6 (ícones) -->
  <link rel="stylesheet" href="./vendor/fontawesome/css/all.min.css" />

  <!-- Chart.js (gráficos) -->
  <script src="./vendor/chart.umd.min.js"></script>

  <!-- CryptoJS (criptografia AES-256) -->
  <script src="./vendor/crypto-js.min.js"></script>

  <!-- Lucide icons (editorial, 1.5px stroke) -->
  <script src="./vendor/lucide.min.js"></script>

  <!-- JSZip (exportação .zip com anexos) -->
  <script src="./vendor/jszip.min.js"></script>

  <!-- docx (geração .docx) + file-saver -->
  <script src="./vendor/docx.umd.js"></script>
  <script src="./vendor/FileSaver.min.js"></script>

  <!-- Locais de votação de Bertioga/SP (TSE) — colégio automático por seção -->
  <script src="./data/bertioga-locais-votacao.js"></script>

  <!-- Leaflet (mapa) — local; tiles via OpenStreetMap (precisa de internet) -->
  <link rel="stylesheet" href="./vendor/leaflet/leaflet.css" />
  <script src="./vendor/leaflet/leaflet.js"></script>

  <!-- ── Tailwind config ───────────────────────────────────────────── -->
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans:    ['DM Sans', '-apple-system', 'BlinkMacSystemFont', 'system-ui', 'sans-serif'],
            display: ['Newsreader', 'Georgia', 'serif'],
          },
          colors: {
            primary: {
              DEFAULT: 'var(--primary)',
              light:   'var(--primary-light)',
              dark:    'var(--primary-dark)',
            },
            accent: {
              DEFAULT: 'var(--accent)',
              light:   'var(--accent-light)',
            },
            ink: {
              DEFAULT: 'var(--text-primary)',
              soft:    'var(--text-secondary)',
              muted:   'var(--text-muted)',
            },
            surface: {
              base:     'var(--bg-base)',
              elevated: 'var(--bg-elevated)',
              sunken:   'var(--bg-sunken)',
            },
            hairline: 'var(--border)',
          },
          boxShadow: {
            'card':     '0 0 0 1px var(--border)',
            'card-lg':  '0 1px 0 var(--border), 0 8px 24px rgba(0,0,0,0.04)',
            'floating': '0 1px 0 var(--border), 0 20px 50px -12px rgba(0,0,0,0.12), 0 6px 16px rgba(0,0,0,0.06)',
            'inset-soft': 'inset 0 0 0 1px var(--border)',
          },
          borderRadius: {
            'md':  '0.375rem',
            'lg':  '0.5rem',
            'xl':  '0.625rem',
            '2xl': '0.75rem',
            '3xl': '1rem',
          },
          letterSpacing: {
            'tightest':  '-0.03em',
            'widest':    '0.18em',
          },
          transitionTimingFunction: {
            'editorial': 'cubic-bezier(0.4, 0, 0.2, 1)',
          },
        }
      }
    };
  </script>

  <!-- ── Estilos globais ───────────────────────────────────────────── -->
  <style>
    /* ═══════════════════════════════════════════════════════════════
       GABINETE — EDITORIAL INSTITUCIONAL
       Peso tipográfico · Hairlines · Cores opinionadas · Sem adorno
       Refs: The Economist · Linear · Stripe Dashboard
    ═══════════════════════════════════════════════════════════════ */

    /* Defaults = tema Institucional (light). JS reescreve via aplicarTema(). */
    :root {
      /* cor de marca */
      --primary:             #1B2A4E;
      --primary-dark:        #101A33;
      --primary-light:       #E8ECF3;
      --primary-rgb:         27, 42, 78;
      --primary-contrast:    #FFFFFF;
      --accent:              #B84A39;
      --accent-dark:         #9A3B2C;
      --accent-light:        #F4E5E2;
      --accent-rgb:          184, 74, 57;

      /* superfícies */
      --bg-base:             #F7F5F0;
      --bg-elevated:         #FFFFFF;
      --bg-sunken:           #EFEDE4;
      --bg-inverted:         #131F3A;

      /* bordas (hairlines) */
      --border:              #E5E0D5;
      --border-strong:       #D5CFC1;
      --border-subtle:       rgba(27,42,78,0.06);
      --border-default:      rgba(27,42,78,0.09);

      /* texto */
      --text-primary:        #1A1F2E;
      --text-secondary:      #5C5C68;
      --text-muted:          #8A8A95;
      --text-inverted:       #E8ECF3;

      /* sidebar */
      --sidebar-bg:          #131F3A;
      --sidebar-text:        #E8ECF3;
      --sidebar-text-muted:  rgba(232,236,243,0.55);
      --sidebar-rule:        rgba(232,236,243,0.10);
      --sidebar-hover:       rgba(232,236,243,0.06);
      --sidebar-active:      rgba(232,236,243,0.10);
      --sidebar-active-bar:  var(--accent);

      /* aliases legados (compat) */
      --surface:             var(--bg-elevated);
      --surface-raised:      var(--bg-elevated);
      --surface-dim:         var(--bg-sunken);

      /* tokens de tipografia */
      --font-sans:           'DM Sans', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      --font-display:        'Newsreader', Georgia, 'Times New Roman', serif;
      --text-display:        clamp(2.75rem, 5.2vw, 4.75rem);  /* hero numérico */
      --text-title:          1.625rem;   /* h2 editorial */
      --text-subtitle:       1.125rem;
      --text-body:           0.9375rem;
      --text-caption:        0.8125rem;
      --text-micro:          0.6875rem;
      --leading-display:     1.05;
      --leading-title:       1.15;
      --leading-body:        1.6;

      /* timing */
      --ease-out:            cubic-bezier(0.4, 0, 0.2, 1);
      --ease-smooth:         cubic-bezier(0.25, 0.46, 0.45, 0.94);
      --dur-fast:            120ms;
      --dur-normal:          150ms;
      --dur-slow:            200ms;
    }

    /* Dark mode — variação refinada (não inversão slate) */
    .dark {
      --primary:             #6A86BF;
      --primary-dark:        #4C6AA3;
      --primary-light:       rgba(106,134,191,0.14);
      --primary-rgb:         106, 134, 191;
      --primary-contrast:    #0B0D12;
      --accent:              #E17455;
      --accent-dark:         #C25F42;
      --accent-light:        rgba(225,116,85,0.14);
      --accent-rgb:          225, 116, 85;

      --bg-base:             #13161D;
      --bg-elevated:         #1B1F29;
      --bg-sunken:           #0E1014;
      --bg-inverted:         #0B0D12;

      --border:              #2A2F3B;
      --border-strong:       #3A404E;
      --border-subtle:       rgba(232,232,238,0.05);
      --border-default:      rgba(232,232,238,0.09);

      --text-primary:        #E8E8EE;
      --text-secondary:      #9EA1AE;
      --text-muted:          #686C7A;
      --text-inverted:       #13161D;

      --sidebar-bg:          #0B0D12;
      --sidebar-text:        #E8E8EE;
      --sidebar-text-muted:  rgba(232,232,238,0.50);
      --sidebar-rule:        rgba(232,232,238,0.08);
      --sidebar-hover:       rgba(232,232,238,0.04);
      --sidebar-active:      rgba(232,232,238,0.08);
    }

    /* ── Base ───────────────────────────────────────────────────────── */
    html, body { background: var(--bg-base); }
    body {
      font-family: var(--font-sans);
      font-size: var(--text-body);
      line-height: var(--leading-body);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      letter-spacing: -0.011em;
      font-feature-settings: 'cv11', 'ss01', 'ss03';
    }

    ::selection {
      background: var(--accent);
      color: var(--primary-contrast);
    }

    /* ── Transições globais — editorial (rápidas, sem bounce) ─────── */
    * {
      transition-property: background-color, border-color, color, box-shadow, opacity;
      transition-duration: var(--dur-normal);
      transition-timing-function: var(--ease-out);
    }
    canvas, svg, img, input, textarea, select, [data-no-transition] { transition: none !important; }

    /* ── Scrollbar minimal ─────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb {
      background: var(--border-strong);
      border-radius: 100px;
      border: 2px solid transparent;
      background-clip: content-box;
    }
    ::-webkit-scrollbar-thumb:hover { background-color: var(--text-muted); background-clip: content-box; }

    /* ── Foco acessível (anel accent, não primary) ─────────────────── */
    *:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
      border-radius: 4px;
    }

    /* ── Tipografia editorial ──────────────────────────────────────── */
    .font-display       { font-family: var(--font-display); }
    .heading-display    {
      font-family: var(--font-display);
      font-weight: 500;
      letter-spacing: -0.022em;
      line-height: var(--leading-title);
    }
    .display-xl {
      font-family: var(--font-display);
      font-weight: 500;
      font-size: var(--text-display);
      line-height: var(--leading-display);
      letter-spacing: -0.03em;
      font-feature-settings: 'lnum', 'ss01';
    }
    .display-lg {
      font-family: var(--font-display);
      font-weight: 500;
      font-size: clamp(2rem, 3.6vw, 3rem);
      line-height: 1.08;
      letter-spacing: -0.025em;
    }
    .display-md {
      font-family: var(--font-display);
      font-weight: 500;
      font-size: 1.875rem;
      line-height: 1.12;
      letter-spacing: -0.02em;
    }
    .editorial-h2 {
      font-family: var(--font-display);
      font-weight: 500;
      font-size: var(--text-title);
      line-height: var(--leading-title);
      letter-spacing: -0.018em;
      padding-bottom: 0.625rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.25rem;
    }
    .editorial-kicker {
      font-family: var(--font-sans);
      font-size: var(--text-micro);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--text-muted);
    }
    .micro-label {
      font-family: var(--font-sans);
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--text-muted);
    }
    .small-caps {
      font-family: var(--font-display);
      font-feature-settings: 'smcp', 'c2sc';
      font-variant: small-caps;
      letter-spacing: 0.05em;
    }
    .drop-cap::first-letter {
      font-family: var(--font-display);
      font-weight: 500;
      font-size: 3.4em;
      line-height: 0.9;
      float: left;
      margin: 0.18em 0.08em 0 0;
      color: var(--primary);
    }

    /* ── Hairlines (regra horizontal fina) ─────────────────────────── */
    .hairline     { height: 1px; background: var(--border); border: 0; }
    .hairline-y   { width: 1px; background: var(--border); align-self: stretch; }
    .rule         { border-bottom: 1px solid var(--border); padding-bottom: 0.75rem; }
    .rule-top     { border-top: 1px solid var(--border); padding-top: 0.75rem; }

    /* ── Superfícies ───────────────────────────────────────────────── */
    .card {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      padding: 1.25rem;
    }
    .card-flush { padding: 0; }
    .card-tight { padding: 0.875rem; }
    .card-wide  { padding: 1.5rem; }

    .card-hover {
      transition: border-color var(--dur-normal) var(--ease-out);
    }
    .card-hover:hover { border-color: var(--border-strong); }

    .surface-sunken { background: var(--bg-sunken); }

    /* ── Botões ────────────────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 0.5rem;
      padding: 0.5rem 0.9375rem;
      font-size: 0.875rem;
      font-weight: 500;
      letter-spacing: -0.005em;
      border-radius: 0.375rem;
      border: 1px solid transparent;
      cursor: pointer;
      white-space: nowrap;
      line-height: 1.2;
    }
    .btn-primary {
      background: var(--primary);
      color: var(--primary-contrast);
      border-color: var(--primary);
      font-weight: 500;
      font-family: var(--font-sans);
    }
    .btn-primary:hover  { background: var(--primary-dark); border-color: var(--primary-dark); }
    .btn-primary:active { background: var(--primary-dark); }

    .btn-ghost {
      background: transparent;
      color: var(--text-primary);
      border-color: var(--border);
    }
    .btn-ghost:hover { background: var(--bg-sunken); border-color: var(--border-strong); }

    .btn-accent {
      background: var(--accent);
      color: var(--primary-contrast);
      border-color: var(--accent);
    }
    .btn-accent:hover { background: var(--accent-dark); border-color: var(--accent-dark); }

    .btn-danger {
      background: transparent;
      color: #C03433;
      border-color: #EBCECE;
    }
    .dark .btn-danger { color: #F19A99; border-color: rgba(220,38,38,0.35); }
    .btn-danger:hover { background: #C03433; color: #fff; border-color: #C03433; }

    /* legacy .btn-primary como utility (antes era uma única classe; mantém compat) */
    button.btn-primary, a.btn-primary, label.btn-primary { padding-inline: 1rem; padding-block: 0.5rem; }

    /* ── Classes de cor por nome (Tailwind @apply não disponível no CDN) ── */
    .text-primary   { color: var(--primary) !important; }
    .text-accent    { color: var(--accent) !important; }
    .text-ink       { color: var(--text-primary); }
    .text-ink-soft  { color: var(--text-secondary); }
    .text-ink-muted { color: var(--text-muted); }

    .bg-primary     { background-color: var(--primary); }
    .bg-primary-lt  { background-color: var(--primary-light); }
    .bg-accent      { background-color: var(--accent); }
    .bg-accent-lt   { background-color: var(--accent-light); }
    .bg-surface     { background-color: var(--bg-elevated); }
    .bg-base        { background-color: var(--bg-base); }
    .bg-sunken      { background-color: var(--bg-sunken); }
    .bg-inverted    { background-color: var(--bg-inverted); }

    .border-primary { border-color: var(--primary); }
    .border-accent  { border-color: var(--accent); }
    .border-hairline{ border-color: var(--border); }
    .ring-primary   { --tw-ring-color: var(--primary); }
    .ring-accent    { --tw-ring-color: var(--accent); }

    /* ── Inputs ────────────────────────────────────────────────────── */
    input:not([type="checkbox"]):not([type="radio"]):not([type="file"]),
    select, textarea {
      font-family: var(--font-sans);
      font-size: 0.875rem;
      letter-spacing: -0.005em;
      color: var(--text-primary);
    }
    input[type="text"], input[type="email"], input[type="password"],
    input[type="number"], input[type="date"], input[type="time"],
    input[type="datetime-local"], input[type="search"], input[type="tel"],
    input[type="url"], select, textarea {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 0.375rem;
      padding: 0.5rem 0.75rem;
      transition: border-color var(--dur-normal) var(--ease-out), box-shadow var(--dur-normal) var(--ease-out);
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-light);
    }
    .field-group label { display: block; margin-bottom: 0.375rem; }

    /* ── Nav / Sidebar ────────────────────────────────────────────── */
    .sidebar-root {
      background: var(--sidebar-bg);
      color: var(--sidebar-text);
    }
    .sidebar-rule { border-color: var(--sidebar-rule); }
    .sidebar-nav-item,
    .sidebar-nav-item * {
      /* Nenhuma transição nos itens da sidebar — evita "trail" visual ao
         passar o mouse rápido por vários itens a caminho do alvo. */
      transition: none !important;
    }
    .sidebar-nav-item,
    .sidebar-nav-item:link,
    .sidebar-nav-item:visited {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.6875rem 1.125rem 0.6875rem 1.375rem; /* alvo de toque maior (~44px) */
      font-size: 0.875rem; font-weight: 400;
      color: var(--sidebar-text-muted) !important;
      border-left: 2px solid transparent;
      text-decoration: none;
    }
    .sidebar-nav-item:hover,
    .sidebar-nav-item:visited:hover {
      background: var(--sidebar-hover) !important;
      color: var(--sidebar-text) !important;
    }
    .sidebar-nav-item.nav-active,
    .sidebar-nav-item.nav-active:visited {
      background: var(--sidebar-active);
      color: var(--sidebar-text) !important;
      border-left-color: var(--sidebar-active-bar);
      font-weight: 500;
    }
    /* Remove estado :active/:focus "pegado" do navegador em links de navegação */
    .sidebar-nav-item:active { background: var(--sidebar-hover); }
    .sidebar-nav-item:focus { outline: none; }
    .sidebar-nav-item:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: -2px;
      border-radius: 0;
    }
    .sidebar-section-label {
      font-family: var(--font-sans);
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--sidebar-text-muted);
      padding: 0.5rem 1.375rem;
    }

    /* ── Monograma "G" (SVG usa currentColor) ─────────────────────── */
    .monograma-g {
      font-family: var(--font-display);
      font-weight: 500;
      font-feature-settings: 'lnum', 'ss01';
    }

    /* ── Animações (sutis, 200ms, ease-out editorial) ─────────────── */
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(12px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.99); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    @keyframes pulse-subtle {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.55; }
    }
    .animate-fade-in  { animation: fadeSlide var(--dur-slow) var(--ease-out) both; }
    .animate-slide-in { animation: slideInRight var(--dur-slow) var(--ease-out) both; }
    .animate-slide-up { animation: slideUp var(--dur-slow) var(--ease-out) both; }
    .animate-scale-in { animation: scaleIn var(--dur-normal) var(--ease-out) both; }

    /* ── Skeleton shimmer ──────────────────────────────────────────── */
    .skeleton {
      background: linear-gradient(90deg, var(--bg-sunken) 0%, var(--border) 50%, var(--bg-sunken) 100%);
      background-size: 200% 100%;
      animation: shimmer 1.6s ease-in-out infinite;
      border-radius: 0.375rem;
    }

    /* ── Toast ─────────────────────────────────────────────────────── */
    #toast-container {
      position: fixed;
      bottom: 1.5rem; right: 1.5rem;
      z-index: 9999;
      display: flex; flex-direction: column; gap: 0.5rem;
    }
    .toast {
      padding: 0.75rem 1rem;
      border-radius: 0.375rem;
      font-size: 0.8125rem;
      font-weight: 500;
      background: var(--bg-elevated);
      color: var(--text-primary);
      border: 1px solid var(--border);
      box-shadow: 0 12px 28px -8px rgba(0,0,0,0.14), 0 4px 8px rgba(0,0,0,0.04);

      display: flex; align-items: center; justify-content: center;
      padding: 1.5rem;

      border: 1px solid var(--border);
      border-radius: 0.5rem;

      width: 100%;
      max-height: 88vh;
      overflow-y: auto;

      font-size: 10px;

      text-transform: uppercase;

      padding: 0.75rem;

    .table-editorial tbody tr:hover td { background: var(--bg-sunken); }
    .table-row-hover:hover { background: var(--bg-sunken); }

    /* ── Badges (pills) ────────────────────────────────────────────── */

      display: inline-flex; align-items: center; gap: 0.25rem;

      border-radius: 9999px;

      text-transform: uppercase;

    .badge-media    { background: #F8EFD3; color: #7A5B16; border-color: #ECDDB0; }
    .badge-baixa    { background: #E5EEDF; color: #395824; border-color: #D0DCC2; }
    .badge-pendente      { background: #E3E9F3; color: #27406F; border-color: #CDD6EA; }
    .badge-em_andamento  { background: #F8EFD3; color: #7A5B16; border-color: #ECDDB0; }
    .badge-resolvido     { background: #E5EEDF; color: #395824; border-color: #D0DCC2; }
    .badge-arquivado     { background: var(--bg-sunken); color: var(--text-muted); border-color: var(--border); }

    .dark .badge-urgente  { background: rgba(220,38,38,.14); color: #F2A9A1; border-color: rgba(220,38,38,.28); }
    .dark .badge-alta     { background: rgba(234,88,12,.14); color: #F4B693; border-color: rgba(234,88,12,.28); }
    .dark .badge-media    { background: rgba(202,138,4,.14); color: #EBCF79; border-color: rgba(202,138,4,.28); }
    .dark .badge-baixa    { background: rgba(22,163,74,.14); color: #8DCD94; border-color: rgba(22,163,74,.26); }
    .dark .badge-pendente { background: rgba(106,134,191,.18); color: #B2C1E0; border-color: rgba(106,134,191,.32); }
    .dark .badge-em_andamento { background: rgba(202,138,4,.14); color: #EBCF79; border-color: rgba(202,138,4,.28); }
    .dark .badge-resolvido    { background: rgba(22,163,74,.14); color: #8DCD94; border-color: rgba(22,163,74,.26); }
    .dark .badge-arquivado    { background: var(--bg-sunken); color: var(--text-muted); border-color: var(--border); }

    /* ── Compat: remapeia cores Tailwind comuns para tokens ─────────── */
    .bg-white                    { background-color: var(--bg-elevated) !important; }

    .bg-slate-100                { background-color: var(--bg-sunken)   !important; }

    .text-slate-400, .text-slate-500 { color: var(--text-muted); }
    .text-slate-600, .text-slate-700 { color: var(--text-secondary); }
    .text-slate-800, .text-slate-900 { color: var(--text-primary); }

    .border-slate-700\/60 { border-color: var(--border) !important; }

    .gradient-text { color: var(--primary); background: none !important; -webkit-text-fill-color: currentColor; }

    /* Glass (legado) — achatado */
    .glass { background: var(--bg-elevated); border: 1px solid var(--border); backdrop-filter: none; }

    [data-lucide] { width: 18px; height: 18px; stroke-width: 1.5; }
    .lucide-sm [data-lucide] { width: 14px; height: 14px; }
    .lucide-lg [data-lucide] { width: 22px; height: 22px; }

    /* ── Página rota — transição ───────────────────────────────────── */
    .page-enter {
      animation: fadeSlide var(--dur-slow) var(--ease-out) both;
    }

      display: flex; align-items: center; justify-content: center;
      gap: 0.5rem;

      background: var(--bg-base);

      font-size: 0.8125rem;
      cursor: pointer;
      transition: border-color var(--dur-normal), background var(--dur-normal), color var(--dur-normal);
    }
    .anx-drop:hover { border-color: var(--border-strong); color: var(--text-secondary); }
    .anx-drop.anx-drop-over {
      border-color: var(--accent);
      background: var(--accent-light);
      color: var(--text-primary);
    }
    .anx-item {
      display: flex; gap: 0.75rem; align-items: flex-start;
      padding: 0.75rem 0;
      border-top: 1px solid var(--border);
    }
    .anx-item:first-child { border-top: 0; padding-top: 0; }
    .anx-thumb {
      width: 44px; height: 44px;
      border-radius: 0.375rem;
      background: var(--bg-sunken);
      border: 1px solid var(--border);
      overflow: hidden;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted);
      cursor: pointer;
    }
    .anx-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .anx-actions button {
      color: var(--text-muted);
      padding: 0.25rem 0.375rem;
      border-radius: 0.25rem;
    }
    .anx-actions button:hover { color: var(--text-primary); background: var(--bg-sunken); }
    .anx-actions button.anx-danger:hover { color: #C03433; background: transparent; }
    .anx-progress {
      height: 3px;
      background: var(--bg-sunken);
      border-radius: 999px;
      overflow: hidden;
    }
    .anx-progress .bar {
      height: 100%;
      background: var(--accent);
      transition: width var(--dur-normal);
    }
    .anx-preview-overlay {
      position: fixed; inset: 0;
      background: rgba(11, 13, 18, 0.94);
      z-index: 9500;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      cursor: grab;
      animation: fadeIn var(--dur-normal) var(--ease-out);
    }
    .anx-preview-overlay:active { cursor: grabbing; }
    .anx-preview-overlay .anx-preview-wrap {
      transform-origin: center center;
      transition: transform 100ms var(--ease-out);
      will-change: transform;
    }
    .anx-preview-overlay img { max-width: 94vw; max-height: 88vh; user-select: none; pointer-events: none; display: block; }
    .anx-preview-close, .anx-preview-dl {
      position: fixed; top: 1rem;
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 0.375rem; background: rgba(255,255,255,0.08); color: #fff;
      cursor: pointer; z-index: 10;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .anx-preview-close { right: 1rem; }
    .anx-preview-dl    { right: 4rem; }
    .anx-preview-meta {
      position: fixed; bottom: 1rem; left: 50%; transform: translateX(-50%);
      background: rgba(255,255,255,0.08); color: #fff; padding: 0.375rem 0.75rem;
      border-radius: 0.375rem; font-size: 0.75rem;
      border: 1px solid rgba(255,255,255,0.08);
    }

    /* ── Print ─────────────────────────────────────────────────────── */
    @media print {
      .no-print  { display: none !important; }
      .print-only { display: block !important; }
      body { background: #fff !important; color: #000 !important; }
    }
    .print-only { display: none; }
  </style>
</head>

  /**
   * Resolve uma chave de tema legada (blue, purple, etc.) para uma das 3 curadas.
   */
  function _resolverTema(key) {
    if (!key) return 'institucional';
    if (TEMAS[key]) return key;
    const legado = {
      blue: 'institucional', navy: 'institucional',
      green: 'tribunal',
      red: 'contemporaneo', purple: 'contemporaneo',
    };
    return legado[key] || 'institucional';
  }

  /**
   * Aplica o tema editorial curado. Atualiza todas as CSS custom properties
   * em :root, respeitando o modo claro/escuro atual.
   */
  function aplicarTema(key) {
    const resolvido = _resolverTema(key);
    const tema = TEMAS[resolvido];
    window._temaAtual = resolvido;
    const isDark = document.documentElement.classList.contains('dark');
    const vars = isDark ? tema.dark : tema.light;
    const root = document.documentElement;
    root.setAttribute('data-tema', resolvido);
    Object.entries(vars).forEach(([k, v]) => {
      root.style.setProperty(`--${k}`, v);
    });
    // Aliases legados
    root.style.setProperty('--surface',        vars['bg-elevated']);
    root.style.setProperty('--surface-raised', vars['bg-elevated']);
    root.style.setProperty('--surface-dim',    vars['bg-sunken']);
    // Sincroniza meta theme-color (PWA)
    const metaLight = document.querySelector('meta[name="theme-color"]:not([media*="dark"])');
    const metaDark  = document.querySelector('meta[name="theme-color"][media*="dark"]');
    if (metaLight) metaLight.setAttribute('content', tema.light['primary']);
    if (metaDark)  metaDark.setAttribute('content',  tema.dark['bg-base']);
  }

    const isDark = html.classList.toggle('dark');
    localStorage.setItem('gabinete_darkmode', isDark ? '1' : '0');
    aplicarTema(window._temaAtual);
    return isDark;
  }

  /**
   * Exibe uma notificação toast temporária.
   * @param {string} msg     - mensagem a exibir
   * @param {'success'|'error'|'info'|'warning'} tipo
   * @param {number} duracao - milissegundos (padrão 3000)
   */
  function toast(msg, tipo = 'success', duracao = 3000) {
    const container = document.getElementById('toast-container');
    const el = document.createElement('div');
    el.className = `toast toast-${tipo}`;
    // Ícone via elemento + mensagem via texto (textContent) → seguro por padrão:
    // qualquer HTML em msg (ex.: nome de cidadão importado) NÃO é interpretado (anti-XSS).
    const icon = document.createElement('i');
    icon.className = 'fa-solid mr-2 ' + (
      tipo === 'success' ? 'fa-circle-check' :
      tipo === 'error'   ? 'fa-circle-xmark' :
      tipo === 'warning' ? 'fa-triangle-exclamation' :
                           'fa-circle-info'
    );
    el.appendChild(icon);
    el.appendChild(document.createTextNode(String(msg == null ? '' : msg)));
    el.style.cursor = 'pointer';
    el.title = 'Toque para fechar';
    container.appendChild(el);
    let timer;
    const fechar = () => {
      el.style.opacity = '0';
      el.style.transform = 'translateX(20px)';
      el.style.transition = 'opacity .3s, transform .3s';
      setTimeout(() => el.remove(), 300);
    };
    const agendar = (ms) => { clearTimeout(timer); timer = setTimeout(fechar, ms); };
    agendar(duracao);
    el.addEventListener('click', () => { clearTimeout(timer); fechar(); });
    el.addEventListener('pointerenter', () => clearTimeout(timer)); // pausa enquanto o dedo/mouse está em cima
    el.addEventListener('pointerleave', () => agendar(1200));
  }

  /**
   * Abre um modal genérico com conteúdo HTML.
   * @param {string} html     - conteúdo interno
   * @param {string} maxWidth - classe Tailwind de largura máxima (padrão 'max-w-xl')
   * @returns {HTMLElement} - referência ao overlay (para fechar via fecharModal)
   */
  function abrirModal(html, maxWidth = 'max-w-xl') {
    fecharModal(); // fecha qualquer modal aberto
    const overlay = document.createElement('div');
    overlay.id = 'modal-overlay';
    overlay.innerHTML = `<div class="modal-box ${maxWidth} p-0">${html}</div>`;
    // Fechar ao clicar fora do box — MAS não em modais com formulário (evita perder
    // o que foi digitado com um toque acidental na borda; use Cancelar/X nesses casos).
    overlay.addEventListener('click', (e) => {
      if (e.target !== overlay) return;
      const box = overlay.querySelector('.modal-box');
      if (box && box.querySelector('input, textarea, select')) return; // formulário → só fecha pelos botões
      fecharModal();
    });
    document.body.appendChild(overlay);
    // Fechar com ESC
    document.addEventListener('keydown', _escListener);
    return overlay;
  }

  function _escListener(e) {
    if (e.key === 'Escape') fecharModal();
  }

  function fecharModal() {
    const el = document.getElementById('modal-overlay');
    if (el) el.remove();
    document.removeEventListener('keydown', _escListener);
  }

  /**
   * Modal de confirmação simples.
   * @param {string}   mensagem  - texto da confirmação
   * @param {Function} onConfirm - callback ao confirmar
   * @param {string}   tipo      - 'danger' (botão vermelho) | 'primary'
   */
  function confirmar(mensagem, onConfirm, tipo = 'danger', labelConfirmar = 'Confirmar', labelCancelar = 'Cancelar') {
    const corBtn = tipo === 'danger'
      ? 'bg-red-600 hover:bg-red-700 text-white'
      : 'btn-primary';
    abrirModal(`
      <div class="p-6">
        <p class="text-slate-700 dark:text-slate-200 mb-6">${mensagem}</p>
        <div class="flex justify-end gap-3">
          <button data-act="a0"
                  class="px-4 py-2 rounded-xl border border-slate-200 dark:border-slate-600
                         text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700">
            ${esc(labelCancelar)}
          </button>
          <button id="btn-confirmar"
                  class="px-4 py-2 rounded-lg ${corBtn} font-semibold">
            ${esc(labelConfirmar)}
          </button>
        </div>
      </div>
    `, 'max-w-sm');
    document.getElementById('btn-confirmar').addEventListener('click', () => {
      fecharModal();
      onConfirm();
    });
  }

  // ── Debounce (performance) ────────────────────────────────────────

  /**
   * Retorna uma versão debounced de uma função.
   * Útil para inputs de busca — evita chamadas excessivas a cada tecla.
   * @param {Function} fn - função a debouncear
   * @param {number} delay - milissegundos (padrão 250)
   */
  function debounce(fn, delay = 250) {
    let timer;
    return function(...args) {
      clearTimeout(timer);
      timer = setTimeout(() => fn.apply(this, args), delay);
    };
  }

  /**
   * Gera HTML de um <select> padronizado.
   * @param {string} id
   * @param {Array} options - [{value, label}] ou [string]
   * @param {string} selected - valor selecionado
   * @param {string} placeholder - texto do option vazio
   * @param {string} extraAttrs - atributos adicionais (onchange, etc)
   */
  function buildSelect(id, options, selected = '', placeholder = '', extraAttrs = '') {
    const opts = options.map(o => {
      const val = typeof o === 'string' ? o : o.value;
      const lbl = typeof o === 'string' ? o : o.label;
      return `<option value="${esc(val)}" ${selected===val?'selected':''}>${esc(lbl)}</option>`;
    }).join('');
    return `<select id="${id}" ${extraAttrs}
              class="w-full text-sm rounded-xl border border-slate-200 dark:border-slate-600
                     bg-slate-50 dark:bg-slate-700 text-slate-800 dark:text-white
                     px-3 py-2 focus:outline-none focus:ring-2 ring-primary cursor-pointer"
              aria-label="${placeholder || id}">
              ${placeholder ? `<option value="">${placeholder}</option>` : ''}
              ${opts}
            </select>`;
  }

  /** Formata data ISO para pt-BR (dd/mm/aaaa) */
  /**
   * Escapa caracteres HTML perigosos de uma string.
   * DEVE ser usada em todo dado de usuário inserido via innerHTML.
   * @param {*} str
   * @returns {string}
   */
  function escapeHtml(str) {
    if (str === null || str === undefined) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }
  // Alias curto para uso nos templates
  const esc = escapeHtml;

  // Escapa um valor para uso DENTRO de uma string JS em atributo: data-act="a1".
  // esc() NÃO serve aqui: o parser HTML decodifica &#39; → ' ANTES do JS rodar, permitindo
  // breakout. Aqui usamos escapes \uXXXX, que não viram entidade HTML nem delimitador JS.
  function escJs(v) {
    return String(v == null ? '' : v)
      .replace(/\\/g, '\\\\')
      .replace(/'/g, '\\u0027')
      .replace(/"/g, '\\u0022')
      .replace(/</g, '\\u003C')
      .replace(/>/g, '\\u003E')
      .replace(/&/g, '\\u0026')
      .replace(/\r/g, '\\r')
      .replace(/\n/g, '\\n');
  }

  // Regenera qualquer `id` MALFORMADO (não-UUID) em todo o objeto — fecha XSS via
  // dados forjados (backup ou sync) cujos ids são interpolados em onclick. Ids
  // legítimos são UUID e ficam intactos (referências preservadas).
  const _UUID_RE = /^[a-f0-9-]{36}$/;
  function sanearIdsMalformados(o) {
    if (Array.isArray(o)) { o.forEach(sanearIdsMalformados); return; }
    if (o && typeof o === 'object') {
      if (typeof o.id === 'string' && !_UUID_RE.test(o.id)) o.id = gerarUUID();
      Object.keys(o).forEach(k => { if (k !== 'id') sanearIdsMalformados(o[k]); });
    }
  }

  function formatarData(iso) {
    if (!iso) return '—';
    const d = new Date(iso + (iso.length === 10 ? 'T00:00:00' : ''));
    return d.toLocaleDateString('pt-BR');
  }

  /** Formata uma data por extenso em pt-BR: "22 de abril de 2026". */
  function formatarDataExtenso(iso) {
    const d = iso ? new Date(iso + (typeof iso === 'string' && iso.length === 10 ? 'T00:00:00' : '')) : new Date();
    try {
      return d.toLocaleDateString('pt-BR', { day: 'numeric', month: 'long', year: 'numeric' });
    } catch (e) {
      return d.toLocaleDateString('pt-BR');
    }
  }

  /** Formata data e hora ISO para pt-BR */
  function formatarDataHora(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleString('pt-BR', {
      day: '2-digit', month: '2-digit', year: 'numeric',
      hour: '2-digit', minute: '2-digit',
    });
  }

  /** Data LOCAL (YYYY-MM-DD) de um Date — sem o desvio de fuso do toISOString (que dá UTC) */
  function dataLocal(d) {
    const p = (n) => String(n).padStart(2, '0');
    return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())}`;
  }
  /** Retorna a data atual LOCAL no formato YYYY-MM-DD (não UTC) */
  function hoje() {
    return dataLocal(new Date());
  }

  /** Diferença em dias entre hoje e uma data ISO */
  function diasAtras(iso) {
    const d = new Date(iso + (iso.length === 10 ? 'T00:00:00' : ''));
    return Math.floor((Date.now() - d.getTime()) / 86400000);
  }

  // SEÇÃO 4 — UUID v4 (geração pura em JS, sem biblioteca)
  // ════════════════════════════════════════════════════════════════

  /**
   * Gera um UUID v4 aleatório no formato padrão.
   * Usa crypto.getRandomValues quando disponível (mais seguro).
   */
  function gerarUUID() {
    if (typeof crypto !== 'undefined' && crypto.randomUUID) {
      return crypto.randomUUID();
    }
    // Fallback: usa CSPRNG (getRandomValues) em vez de Math.random.
    const b = (typeof crypto !== 'undefined' && crypto.getRandomValues)
      ? crypto.getRandomValues(new Uint8Array(16))
      : Array.from({ length: 16 }, () => Math.random() * 256 | 0);
    b[6] = (b[6] & 0x0f) | 0x40; b[8] = (b[8] & 0x3f) | 0x80;
    const h = [...b].map((x) => x.toString(16).padStart(2, '0'));
    return `${h[0]}${h[1]}${h[2]}${h[3]}-${h[4]}${h[5]}-${h[6]}${h[7]}-${h[8]}${h[9]}-${h[10]}${h[11]}${h[12]}${h[13]}${h[14]}${h[15]}`;
  }
