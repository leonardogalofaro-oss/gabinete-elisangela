    async _fazerExportBackup(opcoes = {}) {
      const { apenasJson = false } = opcoes;
      // Determina a senha: se estamos no fluxo de login, exp-senha; se logado, usa a sessão
      const campoSenha = document.getElementById('exp-senha');
      const senha = campoSenha ? (campoSenha.value || '') : (this.state.senha || '');
      if (!senha) { toast('Senha ausente.', 'error'); return; }
      const teste = await Storage.carregarDados(this.state.uuid, senha);
      if (!teste) { toast('Senha incorreta', 'error'); return; }
      if (campoSenha) fecharModal();

      const backup = Storage.exportarBackup(this.state.uuid);
      backup.versao_schema = 2; // v2 inclui anexos (quando .zip)
      const nome = (this.state.meta?.nome_vereador || 'gabinete').replace(/\s+/g, '-').toLowerCase();
      const baseFile = `backup-${nome}-${hoje()}`;

      let anexos = [];
      if (!apenasJson) {
        try { anexos = await AnexoStore.exportarTodos(); } catch (e) { /* sem anexos ou erro */ }
      }

      // Se não há anexos OU user pediu só JSON → exporta JSON como antes
      if (apenasJson || !anexos.length) {
        const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
        this._baixarArquivo(`${baseFile}.json`, blob);
        toast('Backup exportado (.json).', 'success');
        return;
      }

      if (typeof JSZip === 'undefined') {
        toast('JSZip não carregado. Exportando só JSON.', 'warning');
        const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
        this._baixarArquivo(`${baseFile}.json`, blob);
        return;
      }

      toast('Empacotando anexos…', 'info', 2500);
      try {
        const zip = new JSZip();
        zip.file('backup.json', JSON.stringify(backup, null, 2));

        // Índice dos anexos com metadados (sem o blob cifrado)
        const indice = anexos.map(({ blob_cifrado, ...meta }) => meta);
        zip.file('anexos/_indice.json', JSON.stringify(indice, null, 2));

        // Arquivos cifrados (mantidos como estão — ver decisão de design)
        const pasta = zip.folder('anexos');
        for (const a of anexos) {
          const nomeSeguro = a.id;
          pasta.file(nomeSeguro + '.enc', a.blob_cifrado);
        }

        const out = await zip.generateAsync({ type: 'blob', compression: 'DEFLATE', compressionOptions: { level: 6 } });
        this._baixarArquivo(`${baseFile}.zip`, out);
        toast(`Backup exportado com ${anexos.length} anexo${anexos.length !== 1 ? 's' : ''}.`, 'success');
      } catch (e) {
        console.warn('[Export] zip falhou', e);
        toast('Falha ao gerar .zip. Baixando só .json.', 'warning');
        const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
        this._baixarArquivo(`${baseFile}.json`, blob);
      }
    },

    _baixarArquivo(nome, blob) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = nome;
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 2000);
    },

    // Lida com o upload de foto na configuração
    _onFotoChange(event) {
      const file = event.target.files[0];
      if (!file) return;
      if (file.size > 2 * 1024 * 1024) {
        toast('Imagem muito grande (máximo 2MB)', 'error');
        return;
      }
      const reader = new FileReader();
      reader.onload = (e) => {
        window._cfgFoto = e.target.result;
        const preview = document.getElementById('cfg-foto-preview');
        preview.innerHTML = `<img src="${e.target.result}"
                                  class="w-full h-full object-cover" />`;
      };
      reader.readAsDataURL(file);
    },

    // Valida e salva a configuração inicial
    confirmarConfiguracao() {
      // Coleta valores
      const nome    = document.getElementById('cfg-nome').value.trim();
      const cargo   = document.getElementById('cfg-cargo').value;
      const partido = document.getElementById('cfg-partido').value.trim();
      const mandato = document.getElementById('cfg-mandato').value.trim();
      const cidade  = document.getElementById('cfg-cidade').value.trim();
      const uf      = document.getElementById('cfg-uf').value;
      const cripto  = document.getElementById('cfg-cripto').value;
      const cripto2 = document.getElementById('cfg-cripto2').value;
      const login   = (document.getElementById('cfg-login')?.value || '').trim().toLowerCase();
      const senha   = document.getElementById('cfg-senha').value;
      const tema    = _resolverTema(window._cfgTema || 'institucional');
      const foto    = window._cfgFoto || null;

      // Validações
      const erros = [];
      if (!nome)              erros.push('Nome do(a) vereador(a)');
      if (!partido)           erros.push('Partido');
      if (!mandato)           erros.push('Mandato');
      if (!cidade)            erros.push('Cidade');
      if (cripto.length < 10) erros.push('Chave de criptografia (m\u00ednimo 10 caracteres)');
      if (cripto !== cripto2) erros.push('As chaves de criptografia n\u00e3o coincidem');
      if (!login || login.length < 3) erros.push('Login (m\u00ednimo 3 caracteres)');
      if (senha.length < 4)  erros.push('Senha pessoal (m\u00ednimo 4 caracteres)');

      if (erros.length) {
        toast('Preencha corretamente: ' + erros.join(', '), 'error', 5000);
        return;
      }

      // Gera UUID único para este gabinete
      const uuid = gerarUUID();

      // Estrutura meta (não criptografada — apenas para tela de login)
      const meta = { uuid, nome_vereador: nome, cargo, cidade, estado: uf, versao: VERSAO };

      // Estrutura de dados inicial (será criptografada)
      const vereadorId = gerarUUID();
      const dados = {
        configuracoes: { partido, mandato, tema, foto_base64: foto, comunicacao: { rodape_opt_out: false, ddd_padrao: '' } },
        assessores:    [],
        bairros:       [],
        orgaos:        [],
        demandas:      [],
        checklists:    [],
        metas:         [],
        agenda:        [],
        oficios:       [],
        projetos_lei:  [],
        cidadaos:      [],
        cesta_basica:  [],
        saude:         [],
        contatos:      [],
        fiscalizacoes: [],
        diario:        [],
        anexos:        [],
        mensagens_templates:  Mensagens._SEEDS(),
        listas_destinatarios: [],
        campanhas:            [],
        historico_mensagens:  [],
        contadores:    { demandas: 0, oficios: 0, projetos_lei: 0, campanhas: 0, mensagens: 0 },
        usuarios: [{
          id:         vereadorId,
          nome:       nome,
          login:      login,
          senha_hash: hashSenha(senha),
          tipo:       'vereador',
          ativo:      true,
          permissoes: gerarPermissoesTotais(),
          criado_em:  new Date().toISOString(),
        }],
        log_atividades: [],
      };

      // Persiste no localStorage (cripto = chave AES, senha = senha pessoal do vereador)
      Storage.salvarMeta(uuid, meta);
      Storage.salvarDados(uuid, dados, cripto);
      if (foto) Storage.salvarFoto(uuid, foto, cripto);

      // Atualiza estado global e inicia sessão
      this.state.uuid  = uuid;
      this.state.senha = cripto;
      this.state.meta  = meta;
      this.state.dados = dados;

      // Define o vereador como usuário logado
      // Strip senha_hash — nunca manter hash em memória de sessão
      const { senha_hash: _h, ...usrSeguro } = dados.usuarios[0];
      this.state.usuario_logado = usrSeguro;

      aplicarTema(tema);
      iniciarTimeout();

      registrarLog('login', 'sistema', `Gabinete criado e primeiro login por ${esc(nome)}`);
      this.salvar();

      toast(`Bem-vinda(o), ${esc(nome)}! Gabinete configurado com sucesso.`, 'success', 4000);

      // Entra no sistema
      this._posLogin();
    },

    // ════════════════════════════════════════════════════════════
    // LAYOUT PRINCIPAL — sidebar + topbar + área de conteúdo
    // ════════════════════════════════════════════════════════════

    _posLogin() {
      this.renderLayout();
      // Navega para a rota salva ou para o dashboard
      const rota = window.location.hash || '#dashboard';
      window.location.hash = rota;
      this.rotear();
      try { Backup.inicializar(); } catch (e) { /* silent */ }
      try { Templates.seedIfMissing(); } catch (e) { /* silent */ }
      // Migração de tema: se o usuário existente ainda não escolheu um tema
      if (this.state.dados && !this.state.dados.configuracoes?.tema) {
        setTimeout(() => this._showMigracaoTema(), 400);
      }
      // Limpeza de anexos órfãos em segundo plano
      setTimeout(async () => {
        try {
          const n = await AnexoStore.limparOrfaos();
          if (n > 0) console.log(`[Anexos] ${n} anexo(s) órfão(s) removido(s).`);
        } catch (e) { /* silent */ }
      }, 2000);
    },

    _showMigracaoTema() {
      const atualKey = _resolverTema(this.state.dados?.configuracoes?.cor);
      const cards = Object.entries(TEMAS).map(([k, t]) => `
        <button type="button" data-tema="${k}"
                data-act="a18" data-c0="${esc(k)}" data-c1="${esc(k)}"
                aria-selected="${k === atualKey ? 'true' : 'false'}"
                class="text-left p-4 rounded-md border border-hairline bg-surface hover:border-[color:var(--border-strong)] [&[aria-selected=true]]:border-[color:var(--primary)] [&[aria-selected=true]]:ring-1 [&[aria-selected=true]]:ring-[color:var(--primary)]">
          <div class="flex gap-1 mb-3">
            ${t.paleta.map(col => `<span class="w-5 h-5 rounded-sm border border-hairline" style="background:${col}"></span>`).join('')}
          </div>
          <div class="font-display text-[17px] font-medium leading-none">${esc(t.nome)}</div>
          <div class="text-[12px] text-ink-soft leading-snug mt-1.5">${esc(t.descricao)}</div>
        </button>
      `).join('');
      window._migrTema = atualKey;
      abrirModal(`
        <div class="p-7">
          <p class="editorial-kicker">Nova identidade visual</p>
          <h3 class="display-md mt-2 mb-1">Escolha a linguagem do seu gabinete</h3>
          <p class="text-[13px] text-ink-soft mb-5 max-w-[48ch]">
            O sistema passou por uma reforma visual editorial. Selecione um dos três
            temas curados — você pode trocar depois em Configurações.
          </p>
          <div class="grid sm:grid-cols-3 gap-3 mb-6">${cards}</div>
          <div class="flex justify-end gap-2">
            <button data-act="a19" class="btn btn-primary">
              Aplicar tema
            </button>
          </div>
        </div>
      `, 'max-w-3xl');
    },

    _confirmarMigracaoTema() {
      const tema = _resolverTema(window._migrTema || 'institucional');
      this.state.dados.configuracoes = {
        ...(this.state.dados.configuracoes || {}),
        tema,
      };
      delete this.state.dados.configuracoes.cor;
      aplicarTema(tema);
      this.salvar();
      fecharModal();
      this.renderLayout();
      this.rotear();
      toast(`Tema ${TEMAS[tema].nome} aplicado.`, 'success');
    },

      // Conta badges do menu

            ${temPermissao('demandas','ver') ? this._bottomNavItem('#demandas','clipboard-list','Demandas') : ''}
            ${temPermissao('cesta_basica','ver') ? this._bottomNavItem('#cesta-basica','package','Cestas') : ''}
            <button data-act="a20" class="flex-1 flex flex-col items-center justify-center gap-0.5 py-2 text-ink-muted" style="min-height:56px" aria-label="Abrir menu completo">

      renderLucide();

      // Escuta mudanças de rota (remove listener anterior para evitar duplicatas)
      if (this._hashHandler) window.removeEventListener('hashchange', this._hashHandler);
      this._hashHandler = () => this.rotear();
      window.addEventListener('hashchange', this._hashHandler);
    },

    // Gera um item de navegação da sidebar (usa Lucide)
    _navItem(hash, icon, label, badgeNum = null, badgeUrgente = null) {
      const ativa = (window.location.hash || '#dashboard') === hash;
      const style = this._navItemStyle(ativa);
      return `
        <a href="${hash}" class="sidebar-nav-item ${ativa ? 'nav-active' : ''}"
           style="${style}">
          <i data-lucide="${icon}" style="width:16px;height:16px" class="shrink-0"></i>
          <span class="flex-1 truncate">${label}</span>
          ${badgeUrgente ? `
            <span class="text-[10px] font-semibold tracking-wide px-1.5 py-0.5 rounded"
                  style="background: var(--accent); color: var(--primary-contrast);">
              ${badgeUrgente}
            </span>` : ''}
          ${badgeNum && !badgeUrgente ? `
            <span class="text-[10px] font-medium px-1.5 py-0.5 rounded"
                  style="background: var(--sidebar-hover); color: var(--sidebar-text-muted);">
              ${badgeNum}
            </span>` : ''}
        </a>`;
    },

    // Navega de forma idempotente: se já estamos na rota, força re-render (o hashchange
    // não dispara quando o hash é o mesmo) — evita "tela presa" ao tocar a seção atual.
    _irPara(hash) {
      if ((window.location.hash || '#dashboard') === hash) this.rotear();
      else window.location.hash = hash;
    },
    _bottomNavItem(hash, icon, label) {
      const ativa = (window.location.hash || '#dashboard') === hash;
      return '<a href="' + hash + '" data-hash="' + hash + '" data-act="b0" data-c0="' + esc(hash) + '"'
        + ' class="bottom-nav-item flex-1 flex flex-col items-center justify-center gap-0.5 py-2 ' + (ativa ? 'text-primary' : 'text-ink-muted') + '" style="min-height:56px">'
        + '<i data-lucide="' + icon + '" style="width:21px;height:21px"></i>'
        + '<span class="text-[10px] leading-none">' + label + '</span></a>';
    },
    _navItemStyle(ativa) {
      return ativa
        ? 'color: var(--sidebar-text); background: var(--sidebar-active); border-left-color: var(--sidebar-active-bar); font-weight: 500;'
        : 'color: var(--sidebar-text-muted); background: transparent; border-left-color: transparent; font-weight: 400;';
    },

    // ════════════════════════════════════════════════════════════
    // ANEXOS — componente reutilizável + handlers
    // ════════════════════════════════════════════════════════════

    _moduloParaPermissao(modulo) {
      return {
        demanda:      'demandas',
        oficio:       'oficios',
        projeto_lei:  'projetos_lei',
        fiscalizacao: 'fiscalizacao',
        cidadao:      'cidadaos',
        diario:       'diario',
      }[modulo] || modulo;
    },

    _moduloParaLabel(modulo) {
      return {
        demanda: 'Demandas', oficio: 'Ofícios', projeto_lei: 'Projetos de Lei',
        fiscalizacao: 'Fiscalização', cidadao: 'Cidadãos', diario: 'Diário',
      }[modulo] || modulo;
    },

    /**
     * Retorna o HTML de uma seção de anexos pronta para inserção em um modal.
     * Depois do innerHTML ser aplicado, chame App._anxMontar(modulo, itemId).
     */
    _renderAnexos(modulo, itemId, opcoes = {}) {
      const { titulo = 'Anexos', subtitulo = null, aviso = null, somenteLeitura = false, accept = '' } = opcoes;
      if (!itemId) {
        return `
          <div class="rule-top pt-5 mt-5">
            <p class="editorial-kicker mb-2">${esc(titulo)}</p>
            <p class="text-[12.5px] text-ink-muted">Salve o registro primeiro para poder anexar arquivos.</p>
          </div>`;
      }
      const podeEditar = !somenteLeitura && temPermissao(this._moduloParaPermissao(modulo), 'editar');
      const contId = `anx-${modulo}-${itemId}`;
      return `
        <div id="${contId}" class="rule-top pt-5 mt-5"
             data-anx-modulo="${esc(modulo)}" data-anx-item="${esc(itemId)}"
             data-anx-readonly="${podeEditar ? '0' : '1'}">
          <div class="flex items-end justify-between gap-3 mb-3">
            <div class="min-w-0">
              <p class="editorial-kicker">${esc(titulo)}</p>
              ${subtitulo ? `<p class="text-[12px] text-ink-soft mt-1 max-w-[52ch] leading-snug">${subtitulo}</p>` : ''}
            </div>
            ${podeEditar ? `
              <div class="flex items-center gap-2 shrink-0">
                <button type="button"
                        data-act="b1" data-c0="${esc(contId)}"
                        class="btn btn-ghost text-[12px]">
                  <i data-lucide="paperclip" style="width:14px;height:14px"></i>
                  Adicionar anexo
                </button>
                <input type="file" multiple hidden ${accept ? `accept="${accept}"` : ''}
                       data-anx-file
                       data-change="a24" data-g0="${esc(modulo)}" data-g1="${esc(itemId)}"/>
              </div>` : ''}
          </div>
          ${aviso ? `
            <div class="mb-3 text-[12px] p-3 rounded-md" style="background: var(--accent-light); color: var(--text-primary); border: 1px solid color-mix(in srgb, var(--accent) 28%, transparent);">
              <i data-lucide="shield-alert" style="width:14px;height:14px;display:inline;vertical-align:-2px"></i>
              ${aviso}
            </div>` : ''}
          ${podeEditar ? `
            <div class="anx-drop mb-3" data-anx-drop
                 data-act="b2" data-c0="${esc(contId)}">
              <i data-lucide="upload-cloud" style="width:18px;height:18px"></i>
              <span>Arraste arquivos aqui — até ${formatarTamanho(AnexoStore.TAMANHO_MAX)} por arquivo</span>
            </div>` : ''}
          <div class="anx-progress hidden mb-2" data-anx-progress>
            <div class="bar" style="width:0%"></div>
          </div>
          <div class="anx-lista" data-anx-lista>
            <div class="text-[12px] text-ink-muted py-2">Carregando anexos…</div>
          </div>
        </div>
      `;
    },

    /** Depois de inserir o HTML de _renderAnexos, chama isto para montar eventos + carregar lista. */
    _anxMontar(modulo, itemId) {
      if (!itemId) return;
      const cont = document.getElementById(`anx-${modulo}-${itemId}`);
      if (!cont) return;
      const drop = cont.querySelector('[data-anx-drop]');
      const readonly = cont.getAttribute('data-anx-readonly') === '1';

      if (drop && !readonly) {
        drop.addEventListener('dragover', (e) => { e.preventDefault(); drop.classList.add('anx-drop-over'); });
        drop.addEventListener('dragleave', () => drop.classList.remove('anx-drop-over'));
        drop.addEventListener('drop', (e) => {
          e.preventDefault();
          drop.classList.remove('anx-drop-over');
          if (e.dataTransfer?.files?.length) {
            this._anxReceberArquivos(modulo, itemId, e.dataTransfer.files);
          }
        });
      }

      this._anxRecarregar(modulo, itemId);
    },

    async _anxRecarregar(modulo, itemId) {
      const cont = document.getElementById(`anx-${modulo}-${itemId}`);
      if (!cont) return;
      const lista = cont.querySelector('[data-anx-lista]');
      if (!lista) return;
      try {
        const anexos = await AnexoStore.listar({ modulo, item_id: itemId });
        if (!anexos.length) {
          lista.innerHTML = `<div class="text-[12px] text-ink-muted py-2 italic">Nenhum anexo.</div>`;
          return;
        }
        const readonly = cont.getAttribute('data-anx-readonly') === '1';
        lista.innerHTML = anexos.map(a => this._anxCard(a, readonly)).join('');
        renderLucide();

        // Thumbnails para imagens pequenas — carregar lazy
        anexos.filter(a => a.categoria === 'foto' && a.tamanho <= AnexoStore.MIME_IMG_MAX).forEach(async (a) => {
          try {
            const blob = await AnexoStore.obterBlob(a.id);
            const url = URL.createObjectURL(blob);
            const img = cont.querySelector(`[data-anx-thumb="${a.id}"]`);
            if (img) img.innerHTML = `<img src="${url}" alt="${esc(a.nome)}" />`;
          } catch (e) { /* silent */ }
        });
      } catch (e) {
        console.warn('[Anexos] falha ao listar', e);
        lista.innerHTML = `<div class="text-[12px]" style="color:#C03433">Falha ao carregar anexos.</div>`;
      }
    },

    _anxCard(a, readonly) {
      const ehImg = a.categoria === 'foto';
      const ehPdf = a.tipo_mime === 'application/pdf';
      const data  = (() => { try { return new Date(a.uploaded_em).toLocaleDateString('pt-BR', { day:'2-digit', month:'short', year:'2-digit' }); } catch { return ''; } })();
      const iconeLucide = ehImg ? 'image' : ehPdf ? 'file-text' : (a.categoria === 'documento' ? 'file-text' : 'file');

      const acoes = [];
      if (ehImg) acoes.push(`<button type="button" data-act="a25" data-c0="${esc(a.id)}" title="Visualizar"><i data-lucide="eye" style="width:14px;height:14px"></i></button>`);
      else if (ehPdf) acoes.push(`<button type="button" data-act="a26" data-c0="${esc(a.id)}" title="Abrir em nova aba"><i data-lucide="external-link" style="width:14px;height:14px"></i></button>`);
      acoes.push(`<button type="button" data-act="a27" data-c0="${esc(a.id)}" title="Baixar"><i data-lucide="download" style="width:14px;height:14px"></i></button>`);
      if (!readonly) acoes.push(`<button type="button" class="anx-danger" data-act="a28" data-c0="${esc(a.id)}" data-c1="${esc(a.modulo)}" data-c2="${esc(a.item_id)}" title="Excluir"><i data-lucide="trash-2" style="width:14px;height:14px"></i></button>`);

      const onClickThumb = ehImg ? `data-act="a25" data-c0="${esc(a.id)}"` : (ehPdf ? `data-act="a26" data-c0="${esc(a.id)}"` : `data-act="a27" data-c0="${esc(a.id)}"`);

      return `
        <div class="anx-item">
          <div class="anx-thumb" ${onClickThumb} data-anx-thumb="${a.id}" title="${esc(a.nome)}">
            <i data-lucide="${iconeLucide}" style="width:18px;height:18px"></i>
          </div>
          <div class="flex-1 min-w-0">
            <p class="text-[13px] text-ink font-medium truncate">${esc(a.nome)}</p>
            <p class="text-[11px] text-ink-muted mt-0.5">
              ${formatarTamanho(a.tamanho)} · ${esc(data)}${a.descricao ? ' · ' + esc(a.descricao) : ''}
            </p>
          </div>
          <div class="anx-actions flex items-center gap-0.5 shrink-0">
            ${acoes.join('')}
          </div>
        </div>`;
    },

    async _anxReceberArquivos(modulo, itemId, fileList) {
      if (!temPermissao(this._moduloParaPermissao(modulo), 'editar')) {
        toast('Sem permissão para anexar neste módulo.', 'error');
        return;
      }
      const arquivos = Array.from(fileList || []);
      if (!arquivos.length) return;

      const cont = document.getElementById(`anx-${modulo}-${itemId}`);
      const progWrap = cont?.querySelector('[data-anx-progress]');
      const progBar  = progWrap?.querySelector('.bar');

      let ok = 0, falhas = 0;
      for (let i = 0; i < arquivos.length; i++) {
        const f = arquivos[i];
        if (f.size > AnexoStore.TAMANHO_MAX) {
          toast(`"${f.name}" excede ${formatarTamanho(AnexoStore.TAMANHO_MAX)}.`, 'error', 4500);
          falhas++;
          continue;
        }
        if (progWrap) { progWrap.classList.remove('hidden'); progBar.style.width = '0%'; }
        try {
          await AnexoStore.salvar({ modulo, item_id: itemId, arquivo: f }, (p) => {
            if (progBar) {
              const fatia = 100 / arquivos.length;
              progBar.style.width = ((i * fatia) + (p * fatia / 100)) + '%';
            }
          });
          ok++;
        } catch (e) {
          console.warn('[Anexos] upload falhou', e);
          toast(`Falha ao anexar "${f.name}": ${e.message || e}`, 'error', 4500);
          falhas++;
        }
      }
      if (progWrap) setTimeout(() => progWrap.classList.add('hidden'), 400);

      if (ok) toast(`${ok} anexo${ok > 1 ? 's' : ''} salvo${ok > 1 ? 's' : ''}.`, 'success');
      this._anxRecarregar(modulo, itemId);
    },

    async _anxBaixar(id) {
      try {
        const reg = await AnexoStore.buscar(id);
        if (!reg) { toast('Anexo não encontrado.', 'error'); return; }
        const blob = await AnexoStore.obterBlob(id);
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = reg.nome || 'anexo';
        document.body.appendChild(a); a.click(); a.remove();
        setTimeout(() => URL.revokeObjectURL(url), 2000);
      } catch (e) {
        toast('Falha ao baixar anexo. Verifique sua senha de sessão.', 'error');
      }
    },

    async _anxAbrirExterno(id) {
      try {
        const reg = await AnexoStore.buscar(id);
        const blob = await AnexoStore.obterBlob(id);
        const url = URL.createObjectURL(blob);
        const win = window.open(url, '_blank');
        if (!win) {
          // Fallback: download se o popup foi bloqueado
          const a = document.createElement('a');
          a.href = url; a.download = reg?.nome || 'anexo';
          document.body.appendChild(a); a.click(); a.remove();
        }
        setTimeout(() => URL.revokeObjectURL(url), 60_000);
      } catch (e) {
        toast('Falha ao abrir anexo.', 'error');
      }
    },

    async _anxAbrirImagem(id) {
      try {
        const reg = await AnexoStore.buscar(id);
        if (!reg) return;
        const blob = await AnexoStore.obterBlob(id);
        const url = URL.createObjectURL(blob);

        const ov = document.createElement('div');
        ov.className = 'anx-preview-overlay';
        ov.setAttribute('role', 'dialog');
        ov.setAttribute('aria-label', reg.nome);

        const wrap = document.createElement('div');
        wrap.className = 'anx-preview-wrap';
        const img = document.createElement('img');
        img.src = url; img.alt = reg.nome;
        wrap.appendChild(img);

        const btnClose = document.createElement('button');
        btnClose.type = 'button';
        btnClose.className = 'anx-preview-close';
        btnClose.setAttribute('aria-label', 'Fechar');
        btnClose.innerHTML = '<i data-lucide="x" style="width:18px;height:18px;color:currentColor"></i>';

        const btnDl = document.createElement('button');
        btnDl.type = 'button';
        btnDl.className = 'anx-preview-dl';
        btnDl.setAttribute('aria-label', 'Baixar');
        btnDl.innerHTML = '<i data-lucide="download" style="width:18px;height:18px;color:currentColor"></i>';

        const meta = document.createElement('div');
        meta.className = 'anx-preview-meta';
        meta.textContent = `${reg.nome} · ${formatarTamanho(reg.tamanho)}`;

        ov.appendChild(btnDl); ov.appendChild(btnClose); ov.appendChild(wrap); ov.appendChild(meta);
        document.body.appendChild(ov);
        renderLucide();

        // Pan + zoom
        let scale = 1, tx = 0, ty = 0;
        let dragging = false, sx = 0, sy = 0;
        const aplicar = () => { wrap.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`; };
        ov.addEventListener('wheel', (e) => {
          e.preventDefault();
          const factor = e.deltaY < 0 ? 1.12 : 0.89;
          scale = Math.max(0.3, Math.min(8, scale * factor));
          aplicar();
        }, { passive: false });
        ov.addEventListener('mousedown', (e) => {
          if (e.target === btnClose || e.target === btnDl || btnClose.contains(e.target) || btnDl.contains(e.target)) return;
          dragging = true; sx = e.clientX - tx; sy = e.clientY - ty;
        });
        window.addEventListener('mousemove', (e) => {
          if (!dragging) return;
          tx = e.clientX - sx; ty = e.clientY - sy; aplicar();
        });
        window.addEventListener('mouseup', () => { dragging = false; });

        const fechar = () => {
          URL.revokeObjectURL(url);
          ov.remove();
          document.removeEventListener('keydown', escHandler);
        };
        const escHandler = (e) => { if (e.key === 'Escape') fechar(); };
        document.addEventListener('keydown', escHandler);

        btnClose.addEventListener('click', (e) => { e.stopPropagation(); fechar(); });
        btnDl.addEventListener('click', (e) => { e.stopPropagation(); this._anxBaixar(id); });
      } catch (e) {
        toast('Falha ao abrir imagem.', 'error');
      }
    },

    _anxExcluir(id, modulo, itemId) {
      if (!temPermissao(this._moduloParaPermissao(modulo), 'editar')) {
        toast('Sem permissão.', 'error'); return;
      }
      confirmar('Remover este anexo? Esta ação não pode ser desfeita.', async () => {
        try {
          await AnexoStore.excluir(id);
          App.salvar();
          toast('Anexo removido.', 'info');
          App._anxRecarregar(modulo, itemId);
        } catch (e) {

    _executarTrocaSenha() {
      const atual = document.getElementById('tsen-atual')?.value || '';
      const nova  = document.getElementById('tsen-nova')?.value  || '';
      const conf  = document.getElementById('tsen-conf')?.value  || '';

      const u = this.state.usuario_logado;
      if (!u) return;

      // Busca hash do array (não está em usuario_logado por segurança)
      const usr = (this.state.dados.usuarios || []).find(x => x.id === u.id);
      if (!usr) return;

      // Verifica senha atual (timing-safe)
      if (!verificarSenha(atual, usr.senha_hash)) {
        toast('Senha atual incorreta.', 'error');
        return;
      }
      if (nova.length < 4) {
        toast('Nova senha deve ter m\u00ednimo 4 caracteres.', 'error');
        return;
      }
      if (nova !== conf) {
        toast('As senhas n\u00e3o coincidem.', 'error');
        return;
      }

      // Atualiza no array de usuários
      if (usr) {
        usr.senha_hash = hashSenha(nova);
        registrarLog('trocar_senha', 'sistema', `Senha alterada por ${esc(u.nome)}`, u.id);
        this.salvar();
        fecharModal();
        toast('Senha alterada com sucesso!', 'success');
      }
    },

    // ════════════════════════════════════════════════════════════
    // ROTEADOR (hash-based)
    // ════════════════════════════════════════════════════════════

    // Mapa de rota → módulo de permissão
    _rotaParaModulo: {
      '#dashboard': 'dashboard', '#alertas': 'dashboard',
      '#demandas': 'demandas', '#cidadaos': 'cidadaos',
      '#cesta-basica': 'cesta_basica', '#saude': 'saude',
      '#projetos-lei': 'projetos_lei', '#oficios': 'oficios',
      '#fiscalizacao': 'fiscalizacao', '#agenda': 'agenda',
      '#checklist': 'checklist', '#presenca': 'presenca',
      '#metas': 'metas', '#diario': 'diario',
      '#relatorios': 'relatorios', '#indicadores': 'indicadores',
      '#contatos': 'contatos', '#comunicacao': 'comunicacao', '#configuracoes': 'configuracoes',
      '#usuarios': 'usuarios',
    },

    rotear() {
      const rota  = window.location.hash || '#dashboard';
      this.state.rota = rota;
      if (this._filaTeclas) this._filaCleanup(); // saiu da fila de disparo navegando → tira o atalho
      // Fecha sidebar automaticamente em mobile ao navegar
      this._fecharSidebarMobile();

      // Parse rotas dinâmicas (ex: #cidadao/{uuid})
      const detalhe = this._parseRotaDetalhe(rota);

      // Proteção de rota por permissão
      const modulo = detalhe?.modulo || this._rotaParaModulo[rota];
      if (modulo && modulo !== 'usuarios' && !temPermissao(modulo, 'ver')) {
        window.location.hash = '#dashboard';
        toast('Voc\u00ea n\u00e3o tem permiss\u00e3o para acessar este m\u00f3dulo.', 'warning');
        return;
      }
      if (rota === '#usuarios' && !isAdmin()) {
        window.location.hash = '#dashboard';
        toast('Acesso restrito ao(a) vereador(a).', 'warning');
        return;
      }

      // Atualiza links ativos na sidebar (classe + inline style)
      document.querySelectorAll('.sidebar-nav-item').forEach(a => {
        const link = a.getAttribute('href');
        const ativa = link === rota || (detalhe?.base && link === detalhe.base);
        a.classList.toggle('nav-active', ativa);
        a.setAttribute('style', this._navItemStyle(ativa));
      });

      // Títulos das seções
      const titulos = {
        '#dashboard':     'Dashboard',
        '#alertas':       'Central de Alertas',
        '#demandas':      'Fichas de Demanda',
        '#cidadaos':      'Cadastro de Cidadãos',
        '#cesta-basica':  'Cesta Básica',
        '#saude':         'Saúde',
        '#projetos-lei':  'Projetos de Lei',
        '#oficios':       'Protocolo de Ofícios',
        '#fiscalizacao':  'Fiscalização do Executivo',
        '#agenda':        'Agenda do Parlamentar',
        '#checklist':     'Checklist da Assessoria',
        '#presenca':      'Controle de Presença',
        '#metas':         'Metas do Mandato',
        '#diario':        'Diário do Mandato',
        '#relatorios':    'Relatórios',
        '#indicadores':   'Indicadores por Bairro',
        '#contatos':      'Contatos Institucionais',
        '#comunicacao':   'Comunicação',
        '#configuracoes': 'Configurações do Gabinete',
        '#usuarios':      'Gestão de Usuários',
      };
      const titulo = document.getElementById('topbar-titulo');
      if (titulo) titulo.textContent = titulos[rota] || 'Sistema de Gabinete';

      // Renderiza o módulo correspondente
      const conteudo = document.getElementById('conteudo');
      if (!conteudo) return;
      // pb-24 no celular = respiro para a barra inferior fixa não cobrir o conteúdo.
      conteudo.className = 'flex-1 overflow-y-auto px-4 lg:px-8 pt-4 pb-24 lg:py-7 animate-fade-in';
      // Atualiza o destaque da barra inferior (mobile)
      document.querySelectorAll('.bottom-nav-item').forEach(a => {
        const ativa = a.getAttribute('data-hash') === rota || (detalhe?.base && a.getAttribute('data-hash') === detalhe.base);
        a.classList.toggle('text-primary', !!ativa);
        a.classList.toggle('text-ink-muted', !ativa);
      });

      // Rotas dinâmicas têm prioridade
      if (detalhe) {
        const titulo = document.getElementById('topbar-titulo');
        if (titulo && detalhe.titulo) titulo.textContent = detalhe.titulo;
        detalhe.render();
        return;
      }

      switch (rota) {
        case '#dashboard':     this.renderDashboard();     break;
        case '#alertas':       this.renderAlertas();       break;
        case '#demandas':      this.renderDemandas();      break;
        case '#cidadaos':      this.renderCidadaos();      break;
        case '#cesta-basica':  this.renderCestaBasica();   break;
        case '#saude':         this.renderSaude();         break;
        case '#projetos-lei':  this.renderProjetosLei();   break;
        case '#oficios':       this.renderOficios();       break;
        case '#fiscalizacao':  this.renderFiscalizacao();  break;
        case '#agenda':        this.renderAgenda();        break;
        case '#checklist':     this.renderChecklist();     break;
        case '#presenca':      this.renderPresenca();      break;
        case '#metas':         this.renderMetas();         break;
        case '#diario':        this.renderDiario();        break;
        case '#relatorios':    this.renderRelatorios();    break;
        case '#indicadores':   this.renderIndicadores();   break;
        case '#contatos':      this.renderContatos();      break;
        case '#comunicacao':   this.renderComunicacao();   break;
        case '#configuracoes': this.renderConfiguracoes(); break;
        case '#usuarios':      this.renderUsuarios();     break;
        default:               this.renderDashboard();
      }
    },

    /** Parseia rotas dinâmicas (#cidadao/{id}, etc.) — retorna null se não aplica. */
    _parseRotaDetalhe(rota) {
      const m = rota.match(/^#cidadao\/(.+)$/);
      if (m) {
        const id = m[1];
        return {
          modulo: 'cidadaos',
          base:   '#cidadaos',
          titulo: 'Ficha do Cidadão',
          render: () => this.renderCidadaoFicha(id),
        };
      }
      return null;
    },

    _welcomeHTML() {
      const podeCid = temPermissao('cidadaos', 'criar');
      const podeDem = temPermissao('demandas', 'criar');
      const podeAg  = temPermissao('agenda', 'criar');
      const card = (icon, titulo, sub, acao) =>

        + '<div class="space-y-3">'
        + (podeCid ? card('user-plus', 'Cadastrar a primeira pessoa', 'O coração do sistema: quem você atende.', 'm2') : '')
        + (podeDem ? card('clipboard-list', 'Registrar uma demanda', 'Um pedido ou problema de um cidadão.', 'm3') : '')
        + (podeAg  ? card('calendar-plus', 'Adicionar um compromisso', 'Reuniões, eventos e visitas na agenda.', 'm4') : '')
        + (podeCid ? card('upload', 'Importar cadastro existente', 'Já tem uma lista? Traga de uma vez.', 'm5') : '')
        + '</div></div>';
    },
    renderDashboard() {
      const d = this.state.dados;
      const demandas   = d.demandas   || [];
      const oficios    = d.oficios    || [];
      const metas      = d.metas      || [];
      const agenda     = d.agenda     || [];
      const bairros    = d.bairros    || [];
      const cidadaos   = d.cidadaos   || [];
      const hoje_str   = hoje();

      // Gabinete novo/vazio: mostra boas-vindas com atalhos grandes em vez do painel zerado.
      if (cidadaos.length === 0 && demandas.length === 0 && agenda.length === 0) {
        const cont = document.getElementById('conteudo');
        if (cont) { cont.innerHTML = this._welcomeHTML(); renderLucide(); }
        return;
      }

      // ── Cálculos principais ──────────────────────────────────
      const ativas = demandas.filter(x => x.status === 'pendente' || x.status === 'em_andamento').length;
      const total        = demandas.length;
      const pendentes    = demandas.filter(x => x.status === 'pendente').length;
      const emAndamento  = demandas.filter(x => x.status === 'em_andamento').length;

      const mesAtual = hoje_str.slice(0, 7);
      // Resolvidas no mês — decisão POR ITEM: usa o histórico de resolução; quando o
      // item não tem histórico de resolução (dado legado), aproxima pela data de abertura.
      const resolvidasMes = demandas.filter(x => {
        if (x.status !== 'resolvido') return false;
        const resolv = (x.historico || []).filter(h => h.descricao?.includes('Resolvido'));
        if (resolv.length) return resolv.some(h => h.data?.startsWith(mesAtual));
        return x.data_abertura?.startsWith(mesAtual);
      }).length;

      // Mês anterior para delta
      const mesAnt = (() => {
        const dd = new Date(); dd.setMonth(dd.getMonth() - 1);
        return dd.toISOString().slice(0, 7);
      })();
      const abertasMes  = demandas.filter(x => x.data_abertura?.startsWith(mesAtual)).length;
      const abertasAnt  = demandas.filter(x => x.data_abertura?.startsWith(mesAnt)).length;
      const delta = abertasAnt === 0 ? null : Math.round(((abertasMes - abertasAnt) / abertasAnt) * 100);

      const oficiosAguardando = oficios.filter(x => x.status === 'aguardando').length;
      const metasAndamento    = metas.filter(x => x.status === 'em_progresso').length;

      // Alertas
      const urgentesSeAcao = demandas.filter(x =>
        x.prioridade === 'urgente' && x.status === 'pendente' &&
        (!x.acoes || x.acoes.length === 0 || x.acoes.includes('nenhuma'))
      ).length;
      const paradasMais7 = demandas.filter(x =>
        (x.status === 'pendente' || x.status === 'em_andamento') &&
        diasAtras(x.data_abertura) > 7
      ).length;
      const oficiosSem15 = oficios.filter(x =>
        x.status === 'aguardando' && diasAtras(x.data_emissao) > 15
      ).length;

      // Sparkline das últimas 12 semanas (demandas abertas por semana)
      const semanas = this._demandasPorSemana(demandas, 12);
      const sparkMax = Math.max(1, ...semanas.map(s => s.valor));

      // Agenda: próximo compromisso
      const proximoEvento = [...agenda]
        .filter(e => e.data && e.data >= hoje_str)
        .sort((a,b) => (a.data + (a.hora_inicio || '')).localeCompare(b.data + (b.hora_inicio || '')))[0];

      // Meta em destaque: a mais próxima de alcançar
      const metaFoco = metas
        .filter(m => m.status !== 'concluida' && m.meta_valor)
        .map(m => ({ ...m, pct: Math.min(100, Math.round(((m.valor_atual || 0) / (m.meta_valor || 1)) * 100)) }))
        .sort((a,b) => b.pct - a.pct)[0];

      // Subtítulo editorial do gráfico principal (baseado no bairro dominante)
      const bairroDominante = (() => {
        const cont = {};
        demandas.forEach(dm => {
          const b = dm.bairro;
          if (b) cont[b] = (cont[b] || 0) + 1;
        });
        const ord = Object.entries(cont).sort((a,b) => b[1] - a[1])[0];
        if (!ord) return null;
        return { nome: ord[0], total: ord[1], pct: Math.round((ord[1] / Math.max(1, demandas.length)) * 100) };
      })();

      // ── Programas sociais (Saúde + Cesta Básica) ────────────
      const saude = d.saude || [];
      const cesta = d.cesta_basica || [];
      const saudeSolic = saude.filter(x => x.status === 'solicitado').length;
      const saudeAndam = saude.filter(x => x.status === 'andamento').length;
      const saudeAtend = saude.filter(x => x.status === 'atendido').length;
      const cestaAberto = cesta.filter(x => x.status !== 'entregue').length;
      const cestaRecebeu = cesta.filter(x => x.status === 'entregue').length;
      const cestaMes = cesta.reduce((n, s) => n + (s.entregas || []).filter(e => e.competencia === mesAtual).length, 0);

      document.getElementById('conteudo').innerHTML = `
        <!-- Cabeçalho editorial -->
        <div class="mb-8">
          <p class="editorial-kicker mb-2">Panorama do gabinete · ${esc(formatarDataExtenso())}</p>
          <div class="flex items-end justify-between gap-6 flex-wrap">
            <h1 class="display-lg max-w-[28ch]">
              ${this._saudacaoEditorial()}
            </h1>
            <div class="flex items-center gap-4 text-[12px] text-ink-muted">
              <span class="small-caps">Sessão ${new Date().getFullYear()}</span>
              <span class="h-3 w-px" style="background: var(--border)"></span>
              <a href="#alertas" class="text-ink-soft hover:text-ink transition-colors">Ver alertas &rarr;</a>
            </div>
          </div>
        </div>

        <!-- Hero composição: KPI principal + KPIs secundários -->
        <section class="grid grid-cols-12 gap-6 mb-10">
          <a href="#demandas" class="col-span-12 lg:col-span-7 card card-hover p-7 block group">
            <div class="flex items-start justify-between">
              <div>
                <p class="micro-label">Demandas ativas</p>
                <div class="flex items-baseline gap-3 mt-2">
                  <span class="display-xl tabular-nums">${ativas}</span>
                  ${delta !== null ? `
                    <span class="text-[12px] font-medium ${delta > 0 ? 'text-[#C03433]' : 'text-[#3F6B2E]'} dark:${delta > 0 ? 'text-[#F19A99]' : 'text-[#8DCD94]'} inline-flex items-center gap-1">
                      <i data-lucide="${delta > 0 ? 'trending-up' : 'trending-down'}" style="width:12px;height:12px"></i>
                      ${delta > 0 ? '+' : ''}${delta}% vs mês anterior
                    </span>` : ''}
                </div>
                <p class="text-[13px] text-ink-soft mt-2 max-w-[40ch] leading-snug">
                  ${pendentes} pendente${pendentes !== 1 ? 's' : ''} · ${emAndamento} em andamento.
                  ${abertasMes} abertura${abertasMes !== 1 ? 's' : ''} este mês.
                </p>
              </div>
              <span class="text-ink-muted group-hover:text-ink transition-colors">
                <i data-lucide="arrow-up-right" style="width:18px;height:18px"></i>
              </span>
            </div>
            <!-- Sparkline -->
            <div class="mt-7">
              <svg viewBox="0 0 400 70" preserveAspectRatio="none" class="w-full h-16" aria-label="Série de 12 semanas">
                <polyline points="${semanas.map((s,i) => `${(i/(semanas.length-1))*400},${70 - (s.valor/sparkMax)*60 - 5}`).join(' ')}"
                          fill="none" stroke="var(--primary)" stroke-width="1.25" stroke-linejoin="round" stroke-linecap="round"/>
                ${semanas.map((s,i) => `<circle cx="${(i/(semanas.length-1))*400}" cy="${70 - (s.valor/sparkMax)*60 - 5}" r="1.8" fill="var(--accent)"/>`).join('')}

    _saudacaoEditorial() {
      const h = new Date().getHours();
      const nome = (this.state.usuario_logado?.nome || '').split(' ')[0] || 'colega';
      const cumprimento = h < 12 ? 'Bom dia' : (h < 18 ? 'Boa tarde' : 'Boa noite');
      return `${cumprimento}, ${esc(nome)}<span class="text-[color:var(--accent)]">.</span>`;
    },

    _demandasPorSemana(demandas, n = 12) {
      const hojeDate = new Date();
      const buckets = [];
      for (let i = n - 1; i >= 0; i--) {
        const inicio = new Date(hojeDate);
        inicio.setDate(inicio.getDate() - i * 7 - 6);
        const fim = new Date(hojeDate);
        fim.setDate(fim.getDate() - i * 7);
        buckets.push({ inicio: dataLocal(inicio), fim: dataLocal(fim), valor: 0 });
      }
      demandas.forEach(d => {
        const data = d.data_abertura;
        if (!data) return;
        for (const b of buckets) {
          if (data >= b.inicio && data <= b.fim) { b.valor++; break; }
        }
      });
      return buckets;
    },

    _kpiSec(label, valor, href, nota = null) {
      return `
        <a href="${href}" class="card card-hover p-5 block group">
          <p class="micro-label">${label}</p>
          <div class="flex items-end justify-between mt-2">

            <span class="micro-label" style="color: var(--text-muted)">${kind === 'alerta' ? 'Alerta' : 'Status'}</span>
          </div>

          ${data.href && data.cta ? `<a href="${data.href}" class="inline-flex items-center gap-1 mt-3 text-[12px] text-accent hover:opacity-80">${esc(data.cta)} &rarr;</a>` : ''}

    _focoCardMeta(m) {

        </div>`;
    },

    // Mantido para compat — outros módulos ainda chamam this._card()
    _card(icon, label, valor, cor, href) {
      return `
        <a href="${href}" class="card card-hover p-5 block group">
          <p class="micro-label">${esc(label)}</p>

    // ── Renderiza os 5 gráficos do dashboard ──────────────────
    _renderGraficos() {
      const demandas   = this.state.dados.demandas   || [];
      const checklists = this.state.dados.checklists || [];
      const assessores = this.state.dados.assessores || [];
      const isDark     = document.documentElement.classList.contains('dark');
      const textColor  = isDark ? '#94a3b8' : '#64748b';
      const gridColor  = isDark ? '#1e293b' : '#f1f5f9';
      const rootStyle = getComputedStyle(document.documentElement);
      const primary   = rootStyle.getPropertyValue('--primary').trim()      || '#1B2A4E';
      const accent    = rootStyle.getPropertyValue('--accent').trim()       || '#B84A39';
      const muted     = rootStyle.getPropertyValue('--text-muted').trim()   || '#8A8A95';
      const border    = rootStyle.getPropertyValue('--border').trim()       || '#E5E0D5';

      // Destroi instâncias anteriores para evitar memory leak ao revisitar
      ['chart-status','chart-area','chart-evolucao','chart-bairros','chart-presenca']
        .forEach(id => {
          const inst = Chart.getChart(id);
          if (inst) inst.destroy();
        });

      Chart.defaults.color = muted;
      Chart.defaults.font.family = "'DM Sans', system-ui, sans-serif";
      Chart.defaults.font.size   = 11;
      Chart.defaults.font.weight = 500;

      // ── 1. Donut — status das demandas ──────────────────────
      const statusCounts = {
        pendente:     demandas.filter(d => d.status === 'pendente').length,
        em_andamento: demandas.filter(d => d.status === 'em_andamento').length,
        resolvido:    demandas.filter(d => d.status === 'resolvido').length,
        arquivado:    demandas.filter(d => d.status === 'arquivado').length,
      };
      new Chart(document.getElementById('chart-status'), {
        type: 'doughnut',
        data: {
          labels: ['Pendente', 'Em andamento', 'Resolvido', 'Arquivado'],
          datasets: [{
            data: Object.values(statusCounts),
            backgroundColor: [primary, accent, '#3F6B2E', border],
            borderWidth: 0,
            hoverOffset: 6,
          }],
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: {
            legend: { position: 'right', labels: { boxWidth: 12, padding: 12 } },
          },
          cutout: '65%',
        },
      });

      // ── 2. Barras — demandas por área ───────────────────────
      const areaCounts = {};
      demandas.forEach(d => { areaCounts[d.area] = (areaCounts[d.area] || 0) + 1; });
      const areaEntries = Object.entries(areaCounts)
        .sort((a, b) => b[1] - a[1]).slice(0, 8);
      new Chart(document.getElementById('chart-area'), {
        type: 'bar',
        data: {
          labels: areaEntries.map(([k]) => k.length > 18 ? k.slice(0, 16) + '…' : k),
          datasets: [{
            data: areaEntries.map(([, v]) => v),
            backgroundColor: primary,
            borderRadius: 2,
            barThickness: 14,
          }],
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { grid: { color: gridColor }, ticks: { maxRotation: 30 } },
            y: { grid: { color: gridColor }, ticks: { stepSize: 1 } },
          },
        },
      });

      // ── 3. Linha — evolução mensal abertas × resolvidas ─────
      // Últimos 6 meses
      const meses = [];
      for (let i = 5; i >= 0; i--) {
        const d = new Date();
        d.setMonth(d.getMonth() - i);
        meses.push(d.toISOString().slice(0, 7)); // "YYYY-MM"
      }
      const abertas   = meses.map(m => demandas.filter(d => d.data_abertura?.startsWith(m)).length);
      const resolvidas = meses.map(m =>
        demandas.filter(d => d.status === 'resolvido' &&
          d.historico?.some(h => h.data?.startsWith(m) && h.descricao?.includes('esolvid'))
        ).length
      );
      const labMeses = meses.map(m => {
        const [y, mo] = m.split('-');
        return new Date(+y, +mo - 1).toLocaleDateString('pt-BR', { month: 'short', year: '2-digit' });
      });
      new Chart(document.getElementById('chart-evolucao'), {
        type: 'line',
        data: {
          labels: labMeses,
          datasets: [
            {
              label: 'Abertas',
              data: abertas,
              borderColor: primary,
              backgroundColor: 'transparent',
              fill: false, tension: 0.25, pointRadius: 3, pointBackgroundColor: primary, borderWidth: 1.25,
            },
            {
              label: 'Resolvidas',
              data: resolvidas,
              borderColor: accent,
              backgroundColor: 'transparent',
              fill: false, tension: 0.25, pointRadius: 3, pointBackgroundColor: accent, borderWidth: 1.25,
            },
          ],
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { position: 'top', labels: { boxWidth: 12 } } },
          scales: {
            x: { grid: { color: gridColor } },
            y: { grid: { color: gridColor }, ticks: { stepSize: 1 }, min: 0 },
          },
        },
      });

      // ── 4. Barras horizontais — top 10 bairros ──────────────
      const bairroCounts = {};
      demandas.forEach(d => {
        if (d.bairro) bairroCounts[d.bairro] = (bairroCounts[d.bairro] || 0) + 1;
      });
      const top10 = Object.entries(bairroCounts)
        .sort((a, b) => b[1] - a[1]).slice(0, 10);
      new Chart(document.getElementById('chart-bairros'), {
        type: 'bar',
        data: {
          labels: top10.map(([k]) => k),
          datasets: [{
            data: top10.map(([, v]) => v),
            backgroundColor: accent,
            borderRadius: 2,
            barThickness: 12,
          }],
        },
        options: {
          indexAxis: 'y',
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { grid: { color: gridColor }, ticks: { stepSize: 1 } },
            y: { grid: { display: false } },
          },
        },
      });

      // ── 5. Barras — presença da equipe no mês atual ─────────
      const mesAtual = hoje().slice(0, 7);
      const presenca = assessores.map(a => ({
        nome: a.nome.split(' ')[0], // só primeiro nome
        dias: checklists.filter(c =>
          c.assessor_id === a.id && c.data?.startsWith(mesAtual)
        ).length,
      }));
      new Chart(document.getElementById('chart-presenca'), {
        type: 'bar',
        data: {
          labels: presenca.map(p => p.nome),
          datasets: [{
            label: 'Dias registrados',
            data: presenca.map(p => p.dias),
            backgroundColor: primary,
            borderRadius: 2,
            barThickness: 18,
          }],
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { grid: { display: false } },
            y: { grid: { color: gridColor }, ticks: { stepSize: 1 }, min: 0 },
          },
        },
      });
    },

    // ════════════════════════════════════════════════════════════
    // MÓDULO: FICHAS DE DEMANDA
    // ════════════════════════════════════════════════════════════

    // Estado dos filtros (preservado enquanto a seção estiver ativa)
    _demFiltros: {
      busca: '', status: '', prioridade: '', bairro: '',
      area: '', assessor: '', pagina: 1,
    },

    renderDemandas() {
      const el = document.getElementById('conteudo');
      const assessores = this.state.dados.assessores || [];
      const bairros    = this.state.dados.bairros    || [];
      const f          = this._demFiltros;

      el.innerHTML = `
        <!-- Cabeçalho da seção -->
        <div class="flex items-center justify-between mb-6">
          <div>
            <h2 class="heading-display text-xl text-slate-800 dark:text-white">

            </h2>
            <p class="text-xs text-slate-400 mt-1" id="dem-subtitulo"></p>
          </div>
          <button data-act="a31"
                  class="btn-primary px-5 py-2.5 rounded-xl text-sm font-semibold
                         flex items-center gap-2 cursor-pointer">
            <i class="fa-solid fa-plus text-xs"></i>
            Nova Demanda
          </button>
        </div>

        <!-- Barra de filtros -->
        <div class="bg-white dark:bg-slate-800 rounded-2xl border
                    border-slate-100 dark:border-slate-700/50 p-5 mb-5 shadow-card">

          <!-- Busca -->
          <div class="relative mb-4">
            <i class="fa-solid fa-magnifying-glass absolute left-3.5 top-1/2
                      -translate-y-1/2 text-slate-400 text-sm"></i>
            <input id="dem-busca" type="text"
                   value="${f.busca}"
                   placeholder="Buscar por nome do morador ou protocolo..."
                   data-input="a32"
                   aria-label="Buscar demandas"
                   class="w-full pl-10 pr-4 py-2.5 text-sm rounded-xl border
                          border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-700/50
                          text-slate-800 dark:text-white focus:outline-none
                          focus:ring-2 ring-primary focus:bg-white dark:focus:bg-slate-700
                          placeholder:text-slate-400" />
          </div>

          <!-- Selects de filtro -->
          <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-2.5">

            <select data-change="a33"
                    class="text-xs rounded-xl border border-slate-200 dark:border-slate-600
                           bg-slate-50 dark:bg-slate-700/50 text-slate-600 dark:text-slate-300
                           px-3 py-2.5 focus:outline-none focus:ring-2 ring-primary cursor-pointer">
              <option value="">Todos os status</option>
              ${Object.entries(LABELS.status_demanda).map(([k, v]) =>
                `<option value="${k}" ${f.status===k?'selected':''}>${v}</option>`).join('')}
            </select>

            <select data-change="a34"
                    class="text-xs rounded-xl border border-slate-200 dark:border-slate-600
                           bg-slate-50 dark:bg-slate-700/50 text-slate-600 dark:text-slate-300
                           px-3 py-2.5 focus:outline-none focus:ring-2 ring-primary cursor-pointer">
              <option value="">Todas as prioridades</option>
              ${Object.entries(LABELS.prioridade).map(([k, v]) =>
                `<option value="${k}" ${f.prioridade===k?'selected':''}>${v}</option>`).join('')}
            </select>

            <select data-change="a35"
                    class="text-xs rounded-xl border border-slate-200 dark:border-slate-600
                           bg-slate-50 dark:bg-slate-700/50 text-slate-600 dark:text-slate-300
                           px-3 py-2.5 focus:outline-none focus:ring-2 ring-primary cursor-pointer">
              <option value="">Todos os bairros</option>
              ${bairros.map(b =>
                `<option value="${esc(b)}" ${f.bairro===b?'selected':''}>${esc(b)}</option>`).join('')}
            </select>

            <select data-change="a36"
                    class="text-xs rounded-xl border border-slate-200 dark:border-slate-600
                           bg-slate-50 dark:bg-slate-700/50 text-slate-600 dark:text-slate-300
                           px-3 py-2.5 focus:outline-none focus:ring-2 ring-primary cursor-pointer">
              <option value="">Todas as &aacute;reas</option>
              ${LABELS.area.map(a =>
                `<option value="${a}" ${f.area===a?'selected':''}>${a}</option>`).join('')}
            </select>

            <select data-change="a37"
                    class="text-xs rounded-xl border border-slate-200 dark:border-slate-600
                           bg-slate-50 dark:bg-slate-700/50 text-slate-600 dark:text-slate-300
                           px-3 py-2.5 focus:outline-none focus:ring-2 ring-primary cursor-pointer">
              <option value="">Todos os assessores</option>
              ${assessores.map(a =>
                `<option value="${a.id}" ${f.assessor===a.id?'selected':''}>${esc(a.nome)}</option>`).join('')}
            </select>
          </div>

          <!-- Limpar filtros -->
          <div class="flex justify-end mt-3">
            <button data-act="a38"
                    class="text-xs text-slate-400 hover:text-slate-600
                           dark:hover:text-slate-300 hover:underline cursor-pointer
                           flex items-center gap-1">
              <i class="fa-solid fa-xmark"></i>Limpar filtros
            </button>
          </div>
        </div>

        <!-- Tabela -->
        <div class="bg-white dark:bg-slate-800 rounded-2xl border
                    border-slate-100 dark:border-slate-700/50 overflow-hidden shadow-card">
          <div class="overflow-x-auto">
            <table class="w-full text-sm" aria-label="Tabela de demandas">
              <thead>
                <tr class="border-b border-slate-100 dark:border-slate-700/50
                           bg-slate-50/80 dark:bg-slate-700/30 text-[11px]
                           text-slate-500 dark:text-slate-400 uppercase tracking-wider font-semibold">
                  <th scope="col" class="text-left px-5 py-3.5">Protocolo</th>
                  <th scope="col" class="text-left px-5 py-3.5">Morador</th>
                  <th scope="col" class="text-left px-5 py-3.5 hidden md:table-cell">Bairro</th>
                  <th scope="col" class="text-left px-5 py-3.5 hidden lg:table-cell">&Aacute;rea</th>
                  <th scope="col" class="text-left px-5 py-3.5">Prioridade</th>
                  <th scope="col" class="text-left px-5 py-3.5">Status</th>
                  <th scope="col" class="text-left px-5 py-3.5 hidden md:table-cell">Abertura</th>
                  <th scope="col" class="text-left px-5 py-3.5">A&ccedil;&otilde;es</th>
                </tr>
              </thead>
              <tbody id="dem-tbody"></tbody>
            </table>
          </div>
          <!-- Paginação -->
          <div id="dem-paginacao"
               class="flex items-center justify-between px-5 py-3.5 border-t
                      border-slate-100 dark:border-slate-700/50 text-xs text-slate-500
                      dark:text-slate-400">
          </div>
        </div>
      `;

      this._atualizarTabelaDemandas();

      // Event delegation para ações na tabela (performance)
      const tbodyEl = document.getElementById('dem-tbody');
      if (tbodyEl) {
        tbodyEl.addEventListener('click', (e) => {
          const btn = e.target.closest('[data-action]');
          if (!btn) return;
          const { action, id } = btn.dataset;
          if (action === 'edit')   App.abrirModalDemanda(id);
          if (action === 'print')  App._imprimirFicha(id);
          if (action === 'delete') App._excluirDemanda(id);
        });
      }
    },

    // Aplica filtros e atualiza tbody + paginação
    // Debounced search para evitar re-renders excessivos ao digitar
    _demBuscaDebounced: debounce(function(val) {
      App._demFiltros.busca = val;
      App._demFiltros.pagina = 1;
      App._atualizarTabelaDemandas();
    }, 200),

    // Re-render ciente da rota: a demanda pode ter sido editada a partir da FICHA do
    // cidadão (que tomou #conteudo e não tem #dem-tbody). Sem isso a tabela da ficha
    // ficava com dados velhos (render parcial em container inexistente = no-op).
    _demRefresh() {
      if (this.state.rota && this.state.rota.startsWith('#cidadao/')) {
        this.renderCidadaoFicha(this.state.rota.split('/')[1]);
      } else if (document.getElementById('dem-tbody')) {
        this._atualizarTabelaDemandas();
      } else {
        this.rotear();
      }
    },
    // Status em 1 toque (selo clicável na lista e na ficha) — sem abrir o modal inteiro.
    _demMudarStatus(id, novoStatus) {
      if (!temPermissao('demandas', 'editar')) { toast('Sem permissão.', 'error'); this._demRefresh(); return; }
      const d = (this.state.dados.demandas || []).find(x => x.id === id);
      if (!d || d.status === novoStatus) return;
      d.historico = [...(d.historico || []), {
        data: new Date().toISOString(),
        descricao: `Status alterado para "${LABELS.status_demanda[novoStatus] || novoStatus}"`,
        autor: this.state.usuario_logado?.nome || this.state.meta?.nome_vereador,
      }];
      d.status = novoStatus;
      try { registrarLog('editar_demanda', 'demandas', `Demanda ${d.protocolo || ''} → ${LABELS.status_demanda[novoStatus] || novoStatus}`, id); } catch (e) {}
      this.salvar();
      this._demRefresh();
      toast('Status atualizado.', 'success');
    },
    _demStatusSelectHTML(d) {
      return '<select data-act="a39" data-change="b3" data-g0="' + esc(d.id) + '"'
        + ' class="badge badge-' + esc(d.status) + ' cursor-pointer" style="border:0;appearance:auto;padding-right:1.2em" title="Tocar para mudar o status">'
        + Object.entries(LABELS.status_demanda).map(([k, v]) => '<option value="' + k + '"' + (d.status === k ? ' selected' : '') + '>' + (v || '').replace(/^[🔵🟡✅❌]\s*/, '') + '</option>').join('')
        + '</select>';
    },
    _atualizarTabelaDemandas() {
      const f        = this._demFiltros;
      const q        = f.busca.toLowerCase();
      const por_pag  = 20;
      const assessores = this.state.dados.assessores || [];

      let lista = (this.state.dados.demandas || []).filter(d => {
        if (f.busca      && !d.nome_morador?.toLowerCase().includes(q)
                         && !d.protocolo?.toLowerCase().includes(q)) return false;
        if (f.status     && d.status     !== f.status)     return false;
        if (f.prioridade && d.prioridade !== f.prioridade) return false;
        if (f.bairro     && d.bairro     !== f.bairro)     return false;
        if (f.area       && d.area       !== f.area)       return false;
        if (f.assessor   && d.assessor_id !== f.assessor)  return false;
        return true;
      });

      // Ordena: urgentes primeiro, depois por data (mais recente)
      lista.sort((a, b) => {
        const pri = { urgente: 0, alta: 1, media: 2, baixa: 3 };
        if (pri[a.prioridade] !== pri[b.prioridade])
          return pri[a.prioridade] - pri[b.prioridade];
        return new Date(b.data_abertura) - new Date(a.data_abertura);
      });

      // Atualiza subtítulo
      const sub = document.getElementById('dem-subtitulo');
      if (sub) sub.textContent = `${lista.length} demanda${lista.length !== 1 ? 's' : ''} encontrada${lista.length !== 1 ? 's' : ''}`;

      // Paginação
      const total_pag = Math.max(1, Math.ceil(lista.length / por_pag));
      f.pagina = Math.min(f.pagina, total_pag);
      const inicio = (f.pagina - 1) * por_pag;
      const pagina_lista = lista.slice(inicio, inicio + por_pag);

      // Tbody
      const tbody = document.getElementById('dem-tbody');
      if (!tbody) return;

      if (!lista.length) {
        tbody.innerHTML = `
          <tr><td colspan="8" class="text-center py-12 text-slate-400">
            <i class="fa-solid fa-inbox text-3xl mb-2 block"></i>
            Nenhuma demanda encontrada com estes filtros.
          </td></tr>`;
      } else {
        tbody.innerHTML = pagina_lista.map(d => {
          const atrasada = (d.status === 'pendente' || d.status === 'em_andamento')
                           && diasAtras(d.data_abertura) > 7;
          const assessor = assessores.find(a => a.id === d.assessor_id);
          const prioLabel = { urgente:'🔴','alta':'🟠','media':'🟡','baixa':'🟢' };

          return `
            <tr class="border-b border-slate-50 dark:border-slate-700/50
                       hover:bg-slate-50 dark:hover:bg-slate-700/30 transition-colors
                       ${atrasada ? 'bg-amber-50/40 dark:bg-amber-900/10' : ''}">
              <td class="px-4 py-3">
                <span class="font-mono text-xs text-slate-600 dark:text-slate-400">
                  ${esc(d.protocolo) || '—'}
                </span>
                ${atrasada ? `<span class="ml-1 text-amber-500" title="Parada há mais de 7 dias">
                  <i class="fa-solid fa-clock text-xs"></i></span>` : ''}
              </td>
              <td class="px-4 py-3">
                <p class="font-medium text-slate-800 dark:text-white text-sm">
                  ${esc(d.nome_morador) || '—'}
                </p>
                ${d.bairro ? `<p class="text-xs text-slate-400 md:hidden"><i data-lucide="map-pin" style="width:10px;height:10px" class="inline-block align-[-1px]"></i> ${esc(d.bairro)}</p>` : ''}
                ${assessor ? `<p class="text-xs text-slate-400">${esc(assessor.nome).split(' ')[0]}</p>` : ''}
              </td>
              <td class="px-4 py-3 hidden md:table-cell text-slate-600
                         dark:text-slate-400 text-xs">${esc(d.bairro) || '—'}</td>
              <td class="px-4 py-3 hidden lg:table-cell text-slate-600
                         dark:text-slate-400 text-xs">
                ${d.area ? (d.area.length > 20 ? esc(d.area).slice(0,18)+'…' : esc(d.area)) : '—'}
              </td>
              <td class="px-4 py-3">
                <span class="badge badge-${d.prioridade}">
                  ${prioLabel[d.prioridade] || ''} ${(LABELS.prioridade[d.prioridade] || d.prioridade || '').replace(/^[🔴🟠🟡🟢]\s*/,'')}
                </span>
              </td>
              <td class="px-4 py-3">
                ${this._demStatusSelectHTML(d)}
              </td>
              <td class="px-4 py-3 hidden md:table-cell text-slate-500
                         dark:text-slate-400 text-xs">
                ${formatarData(d.data_abertura)}
              </td>
              <td class="px-4 py-3">
                <div class="flex items-center gap-1">
                  <button data-action="edit" data-id="${d.id}"
                          title="Editar" aria-label="Editar demanda ${esc(d.protocolo)}"
                          class="w-9 h-9 rounded-lg flex items-center justify-center
                                 text-slate-400 hover:text-primary hover:bg-primary-lt
                                 cursor-pointer">
                    <i class="fa-solid fa-pen text-xs pointer-events-none"></i>
                  </button>
                  <button data-action="print" data-id="${d.id}"
                          title="Imprimir ficha" aria-label="Imprimir demanda ${esc(d.protocolo)}"
                          class="w-9 h-9 rounded-lg flex items-center justify-center
                                 text-slate-400 hover:text-slate-600 dark:hover:text-slate-300
                                 hover:bg-slate-100 dark:hover:bg-slate-700 cursor-pointer">
                    <i class="fa-solid fa-print text-xs pointer-events-none"></i>
                  </button>
                  <button data-action="delete" data-id="${d.id}"
                          title="Excluir" aria-label="Excluir demanda ${esc(d.protocolo)}"
                          class="w-9 h-9 rounded-lg flex items-center justify-center
                                 text-slate-400 hover:text-red-500 hover:bg-red-50
                                 dark:hover:bg-red-900/20 cursor-pointer">
                    <i class="fa-solid fa-trash text-xs pointer-events-none"></i>
                  </button>
                </div>
              </td>
            </tr>`;
        }).join('');
      }

      // Paginação
      const pag = document.getElementById('dem-paginacao');
      if (pag) {
        pag.innerHTML = `
          <span>${inicio + 1}–${Math.min(inicio + por_pag, lista.length)} de ${lista.length}</span>
          <div class="flex gap-1">
            <button data-act="d0" data-c0="${f.pagina - 1}"
                    ${f.pagina <= 1 ? 'disabled' : ''}
                    class="px-2 py-1 rounded border border-slate-200 dark:border-slate-600
                           disabled:opacity-40 hover:bg-slate-50 dark:hover:bg-slate-700">
              <i class="fa-solid fa-chevron-left text-xs"></i>
            </button>
            <span class="px-3 py-1 font-medium">${f.pagina} / ${total_pag}</span>
            <button data-act="d1" data-c0="${f.pagina + 1}"
                    ${f.pagina >= total_pag ? 'disabled' : ''}
                    class="px-2 py-1 rounded border border-slate-200 dark:border-slate-600
                           disabled:opacity-40 hover:bg-slate-50 dark:hover:bg-slate-700">
              <i class="fa-solid fa-chevron-right text-xs"></i>
            </button>
          </div>`;
      }
    },

    _limparFiltrosDemandas() {
      this._demFiltros = { busca:'', status:'', prioridade:'', bairro:'', area:'', assessor:'', pagina:1 };
      this.renderDemandas();
    },

    // Exclui uma demanda com confirmação
    _excluirDemanda(id) {
      if (!temPermissao('demandas','excluir')) { toast('Sem permiss\u00e3o.','error'); return; }
      confirmar('Deseja excluir esta demanda permanentemente?', async () => {
        this.state.dados.demandas = this.state.dados.demandas.filter(d => d.id !== id);
        this.salvar();
        try { await AnexoStore.excluirPorItem('demanda', id); } catch(e) {}
        this._demRefresh();
        toast('Demanda excluída.', 'info');
      }, 'danger');
    },

    // ── Impressão formatada da ficha ────────────────────────────
    _imprimirFicha(id) {
      const d        = (this.state.dados.demandas || []).find(x => x.id === id);
      if (!d) return;
      const meta     = this.state.meta;
      const assessor = (this.state.dados.assessores || []).find(a => a.id === d.assessor_id);
      const foto     = App._fotoSegura(App._fotoprevCache);
      const acoes    = Array.isArray(d.acoes) ? d.acoes : [];

      const html = `
        <div style="font-family:Arial,sans-serif;max-width:720px;margin:0 auto;color:#111">
          <div style="display:flex;align-items:center;gap:16px;border-bottom:2px solid #333;
                      padding-bottom:12px;margin-bottom:20px">
            ${foto ? `<img src="${foto}" style="width:56px;height:56px;object-fit:cover;border-radius:8px">` : ''}
            <div>
              <div style="font-size:18px;font-weight:bold">
                ${esc(meta.cargo)} ${esc(meta.nome_vereador)}
              </div>
              <div style="font-size:13px;color:#555">
                ${esc(this.state.dados.configuracoes?.partido) || ''} &nbsp;·&nbsp;
                ${esc(meta.cidade)} — ${esc(meta.estado)} &nbsp;·&nbsp;
                Mandato ${esc(this.state.dados.configuracoes?.mandato) || ''}
              </div>
            </div>
            <div style="margin-left:auto;text-align:right;font-size:12px;color:#555">
              Protocolo: <strong>${esc(d.protocolo)}</strong><br>
              Emitido em: ${new Date().toLocaleString('pt-BR')}
            </div>
          </div>

          <h2 style="font-size:15px;font-weight:bold;margin-bottom:14px;
                     border-bottom:1px solid #eee;padding-bottom:6px">
            FICHA DE ATENDIMENTO — DEMANDA
          </h2>

          <table style="width:100%;border-collapse:collapse;font-size:13px;margin-bottom:16px">
            <tr><td style="padding:5px 8px;font-weight:bold;width:35%;background:#f5f5f5">
              Morador(a)</td>
              <td style="padding:5px 8px">${esc(d.nome_morador) || '—'}</td></tr>
            <tr><td style="padding:5px 8px;font-weight:bold;background:#f5f5f5">Bairro</td>
              <td style="padding:5px 8px">${esc(d.bairro) || '—'}</td></tr>
            <tr><td style="padding:5px 8px;font-weight:bold;background:#f5f5f5">Telefone</td>
              <td style="padding:5px 8px">${esc(d.telefone) || '—'}</td></tr>
            <tr><td style="padding:5px 8px;font-weight:bold;background:#f5f5f5">E-mail</td>
              <td style="padding:5px 8px">${esc(d.email) || '—'}</td></tr>
            <tr><td style="padding:5px 8px;font-weight:bold;background:#f5f5f5">Data de Abertura</td>
              <td style="padding:5px 8px">${formatarData(d.data_abertura)}</td></tr>
            <tr><td style="padding:5px 8px;font-weight:bold;background:#f5f5f5">Área</td>
              <td style="padding:5px 8px">${esc(d.area) || '—'}</td></tr>
            <tr><td style="padding:5px 8px;font-weight:bold;background:#f5f5f5">Órgão Responsável</td>
              <td style="padding:5px 8px">${esc(d.orgao_responsavel) || '—'}</td></tr>
            <tr><td style="padding:5px 8px;font-weight:bold;background:#f5f5f5">Prioridade</td>
              <td style="padding:5px 8px">${LABELS.prioridade[d.prioridade] || esc(d.prioridade)}</td></tr>
            <tr><td style="padding:5px 8px;font-weight:bold;background:#f5f5f5">Status</td>
              <td style="padding:5px 8px">${LABELS.status_demanda[d.status] || esc(d.status)}</td></tr>
            <tr><td style="padding:5px 8px;font-weight:bold;background:#f5f5f5">Assessor(a) Responsável</td>
              <td style="padding:5px 8px">${assessor ? esc(assessor.nome) : '—'}</td></tr>
          </table>

          <div style="margin-bottom:14px">
            <div style="font-weight:bold;font-size:13px;margin-bottom:4px">Descrição do Problema</div>
            <div style="background:#f9f9f9;padding:10px;border-radius:4px;font-size:13px;
                        white-space:pre-wrap">${esc(d.descricao) || '—'}</div>
          </div>

          <div style="margin-bottom:14px">
            <div style="font-weight:bold;font-size:13px;margin-bottom:4px">Ações Tomadas</div>
            <div style="font-size:13px">${acoes.length
              ? acoes.map(a => `✔ ${esc(String(a))}`).join('<br>')
              : 'Nenhuma ação registrada ainda.'}</div>
          </div>

          ${(d.historico || []).length ? `
          <div style="margin-bottom:14px">
            <div style="font-weight:bold;font-size:13px;margin-bottom:6px">
              Histórico de Atualizações
            </div>
            ${(d.historico || []).map(h => `
              <div style="border-left:3px solid #ccc;padding:4px 10px;
                          margin-bottom:5px;font-size:12px">
                <strong>${formatarDataHora(h.data)}</strong> — ${esc(h.descricao)}
                ${h.autor ? `<span style="color:#888"> (${esc(h.autor)})</span>` : ''}
              </div>`).join('')}
          </div>` : ''}

          <div style="margin-top:40px;border-top:1px solid #ccc;padding-top:10px;
                      font-size:11px;color:#888;text-align:center">
            Documento gerado pelo Sistema de Gestão de Gabinete —
            ${esc(meta.cargo)} ${esc(meta.nome_vereador)} · ${esc(meta.cidade)}/${esc(meta.estado)}

    // Rótulo utilitário para campos de texto
    _campo(id, label, type, valor, obrigatorio = false) {
      return `
        <label class="block text-xs font-medium text-slate-600

          ${label}${obrigatorio ? ' <span class="text-red-500">*</span>' : ''}

               class="w-full text-sm rounded-lg border border-slate-200 dark:border-slate-600

                      px-3 py-2 focus:outline-none focus:ring-2 ring-primary" />`;
