    _cidPickerBuscar(ctx, term) {
      const box = document.getElementById(`picker-${ctx}-results`);
      if (!box) return;
      const t = (term || '').trim().toLowerCase();
      if (t.length < 2) { box.innerHTML = ''; return; }
      const matches = (this.state.dados.cidadaos || []).filter(c => (c.nome || '').toLowerCase().includes(t)).slice(0, 8);
      box.innerHTML = matches.length ? matches.map(c => `
        <button type="button" data-act="a149" data-c0="${esc(ctx)}" data-c1="${esc(c.id)}" class="w-full flex items-center gap-2 p-1.5 rounded-lg hover:bg-sunken text-left">
          ${this._avatarCidadao(c, 28)}
          <span class="text-[13px] truncate">${c.numero ? `#${esc(String(c.numero))} ` : ''}${esc(c.nome)}${c.bairro ? ` · <span class="text-ink-muted">${esc(c.bairro)}</span>` : ''}</span>
        </button>`).join('')
        : ('<button type="button" data-act="b5" data-c0="' + esc(ctx) + '" data-c1="' + esc(ctx) + '" class="w-full flex items-center gap-2 p-2 rounded-lg text-left text-primary hover:bg-primary-lt">'
           + '<i data-lucide="user-plus" style="width:16px;height:16px"></i><span class="text-[13px]">Cadastrar &ldquo;' + esc(term) + '&rdquo; agora</span></button>');
      renderLucide();
    },
    // Cadastro rápido na rua: cria o cidadão com só o nome e já o seleciona no picker.
    _cidPickerCriar(ctx, nome) {
      if (!temPermissao('cidadaos', 'criar')) { toast('Sem permissão para cadastrar.', 'error'); return; }
      const n = (nome || '').trim();
      if (!n) return;
      const d = this.state.dados;
      d.cidadaos = d.cidadaos || [];
      const numero = Math.max(0, ...d.cidadaos.map(x => +x.numero || 0), d.contadores?.cidadaos || 0) + 1;
      if (d.contadores) d.contadores.cidadaos = numero;
      const novo = { id: gerarUUID(), numero, nome: n, fonte: 'manual', data_cadastro: hoje(), tags: [], interacoes: [], criado_em: new Date().toISOString() };
      d.cidadaos.unshift(novo);
      try { registrarLog('criar_cidadao', 'cidadaos', `Cidadão "${n}" cadastrado (rápido)`, novo.id); } catch (e) {}
      this.salvar();
      toast(`"${n}" cadastrado(a). Edite os detalhes depois em Cidadãos.`, 'success');
      this._cidPickerEscolher(ctx, novo.id);
    },
    _cidPickerEscolher(ctx, id) {
      this._cidPickerSel[ctx] = id;
      const wrap = document.getElementById(`picker-${ctx}-wrap`);
      const c = this._cidById(id);
      if (wrap && c) { wrap.innerHTML = this._cidPickerCardHTML(ctx, c); renderLucide(); }
    },
    _cidPickerLimpar(ctx) {
      this._cidPickerSel[ctx] = null;
      const wrap = document.getElementById(`picker-${ctx}-wrap`);
      if (wrap) { wrap.innerHTML = this._cidPickerBuscaHTML(ctx); document.getElementById(`picker-${ctx}-input`)?.focus(); }
    },

    // ═══════════════════════════════════════════════════════════
    // MÓDULO CESTA BÁSICA
    // ═══════════════════════════════════════════════════════════
    _CESTA_ORIGEM: { atendimento:'Atendimento presencial', grupo_gabinete:'Grupo do gabinete', cel_gabinete:'Celular do gabinete', whatsapp:'WhatsApp', indicacao:'Indicação da vereadora', outro:'Outro' },
    _cestaFiltro: 'aberto',

    _CESTA_STATUS: { aberto: 'Em aberto', entregue: 'Entregue' },

    // Status clicável na linha (Em aberto / Entregue) — mudar para "aberto" NÃO apaga as entregas já registradas.
    _cestaStatusSelectHTML(s) {
      const cor = s.status === 'entregue' ? ['rgba(16,185,129,.14)', '#059669'] : ['var(--accent-light)', 'var(--accent)'];
      return `<select data-change="a150" data-g0="${esc(s.id)}" data-act="a39"
        class="text-[11px] font-semibold rounded-md px-2 py-1 cursor-pointer border border-hairline"
        style="background:${cor[0]};color:${cor[1]}">
        ${Object.entries(this._CESTA_STATUS).map(([k, v]) => `<option value="${k}" ${s.status === k ? 'selected' : ''} style="background:#fff;color:#111">${v}</option>`).join('')}
      </select>`;
    },

    _cestaMudarStatus(id, st) {
      if (!temPermissao('cesta_basica', 'editar')) { toast('Sem permissão.', 'error'); return; }
      const s = (this.state.dados.cesta_basica || []).find(x => x.id === id);
      if (!s) return;
      s.status = st;
      const mes = new Date().toISOString().slice(0, 7);
      s.entregas = s.entregas || [];
      if (st === 'entregue') {
        // Marcar como "entregue" registra a entrega do mês (se ainda não houver),
        // para bater com "entregas no mês" no dashboard. Marca como automática (auto)
        // para poder reverter sem apagar entregas registradas manualmente.
        if (!s.entregas.some(e => e.competencia === mes)) {
          s.entregas.push({ id: gerarUUID(), competencia: mes, data: hoje(), quantidade: 1, auto: true });
        }
      } else {
        // Reverteu o status: remove apenas a entrega AUTOMÁTICA deste mês (preserva as manuais).
        s.entregas = s.entregas.filter(e => !(e.auto && e.competencia === mes));
      }
      this.salvar();
      this.renderCestaBasica();
      toast('Status: ' + (this._CESTA_STATUS[st] || st) + '.', 'success');
    },

    renderCestaBasica() {
      const d = this.state.dados;
      const lista = d.cesta_basica || [];
      const mesAtual = new Date().toISOString().slice(0, 7);
      const emAberto = lista.filter(s => s.status !== 'entregue').length;
      // "pessoas atendidas" = pessoas DISTINTAS com cesta entregue (não nº de registros).
      const entregues = new Set(lista.filter(s => s.status === 'entregue').map(s => s.cidadao_id || s.id)).size;
      const entregasMes = lista.reduce((n, s) => n + (s.entregas || []).filter(e => e.competencia === mesAtual).length, 0);
      const filtro = this._cestaFiltro || 'todos';
      const visiveis = lista.filter(s => filtro === 'todos' ? true : filtro === 'aberto' ? s.status !== 'entregue' : s.status === 'entregue')
        .sort((a, b) => (b.data_solicitacao || '').localeCompare(a.data_solicitacao || ''));

      const aba = (k, lbl) => `<button data-act="a151" data-c0="${esc(k)}" class="px-3 py-1.5 rounded-lg text-[12.5px] ${filtro === k ? 'bg-primary text-[color:var(--primary-contrast)]' : 'text-ink-soft hover:bg-sunken'}">${lbl}</button>`;

      document.getElementById('conteudo').innerHTML = `
        <header class="mb-6 flex items-end justify-between gap-4 flex-wrap">

            <h1 class="display-lg">Cesta Básica</h1>

            <button data-act="a152" class="btn btn-ghost text-[13px]"><i data-lucide="printer" style="width:14px;height:14px"></i> Imprimir</button>
            ${temPermissao('cesta_basica','criar') ? `<button data-act="a153" class="btn btn-primary text-[13px]"><i data-lucide="plus" style="width:14px;height:14px"></i> Nova solicitação</button>` : ''}
          </div>
        </header>

        <section class="grid grid-cols-2 md:grid-cols-3 gap-3 mb-6">
          <div class="card p-4"><p class="micro-label">Em aberto</p><p class="font-display text-[26px] leading-none mt-2 tabular-nums ${emAberto ? 'text-[color:var(--accent)]' : ''}">${emAberto}</p><p class="text-[11px] text-ink-muted mt-1">aguardando entrega</p></div>
          <div class="card p-4"><p class="micro-label">Já receberam</p><p class="font-display text-[26px] leading-none mt-2 tabular-nums">${entregues}</p><p class="text-[11px] text-ink-muted mt-1">pessoas atendidas</p></div>
          <div class="card p-4"><p class="micro-label">Entregas neste mês</p><p class="font-display text-[26px] leading-none mt-2 tabular-nums">${entregasMes}</p><p class="text-[11px] text-ink-muted mt-1">competência ${mesAtual}</p></div>
        </section>

        <div class="flex items-center gap-1.5 mb-4">
          ${aba('aberto', `Em aberto (${emAberto})`)} ${aba('entregue', `Entregues (${entregues})`)} ${aba('todos', `Todas (${lista.length})`)}
        </div>

        <section class="card card-flush overflow-hidden">
          ${visiveis.length === 0 ? `
            <div class="py-12 text-center">
              <i data-lucide="package" style="width:32px;height:32px" class="text-ink-muted mx-auto mb-2"></i>
              <p class="text-[13px] text-ink-soft">Nenhuma solicitação ${filtro === 'aberto' ? 'em aberto' : filtro === 'entregue' ? 'entregue' : ''}.</p>
            </div>` : `
          <table class="table-editorial">
            <thead><tr>
              <th>Cidadão</th>
              <th class="hidden md:table-cell">Origem</th>
              <th class="hidden lg:table-cell">Solicitado em</th>
              <th class="text-center">Entregas</th>
              <th>Status</th>
              <th class="w-px"></th>
            </tr></thead>
            <tbody>
              ${visiveis.map(s => {
                const c = this._cidById(s.cidadao_id);
                const ents = s.entregas || [];
                const ult = ents.slice().sort((a,b)=>(b.competencia||'').localeCompare(a.competencia||''))[0];
                return `
                  <tr>
                    <td>
                      <div class="flex items-center gap-3 ${c ? 'cursor-pointer' : ''}" ${c ? `data-act="b6" data-c0="${esc(c.id)}"` : ''}>
                        ${this._avatarCidadao(c || { nome: s.nome_avulso || '?' }, 34)}
                        <div class="min-w-0">
                          <p class="font-medium">${c ? esc(c.nome) : esc(s.nome_avulso || '(sem vínculo)')}</p>
                          <p class="text-[11px] text-ink-muted">${c ? esc(c.bairro || c.telefone || '') : ''}</p>
                        </div>
                      </div>
                    </td>
                    <td class="hidden md:table-cell text-[12.5px]">${esc(this._CESTA_ORIGEM[s.origem] || s.origem || '—')}${s.origem_obs ? `<span class="block text-[11px] text-ink-muted">${esc(s.origem_obs)}</span>` : ''}</td>
                    <td class="hidden lg:table-cell text-[12.5px]">${this._dataBR(s.data_solicitacao)}</td>
                    <td class="text-center tabular-nums">${ents.length}${ult ? `<span class="block text-[10px] text-ink-muted">últ. ${esc(ult.competencia || '')}</span>` : ''}</td>
                    <td>${this._cestaStatusSelectHTML(s)}</td>
                    <td class="text-right pr-3 whitespace-nowrap">
                      ${temPermissao('cesta_basica','editar') ? `<button data-act="a154" data-c0="${esc(s.id)}" class="btn btn-primary text-[12px] px-3 py-1.5" title="Registrar entrega"><i data-lucide="package-check" style="width:14px;height:14px"></i> Entreguei</button>` : ''}
                      ${temPermissao('cesta_basica','editar') ? `<button data-act="a155" data-c0="${esc(s.id)}" class="btn btn-ghost text-[11px] px-2" title="Editar"><i data-lucide="pencil" style="width:14px;height:14px"></i></button>` : ''}
                      ${temPermissao('cesta_basica','excluir') ? `<button data-act="a156" data-c0="${esc(s.id)}" class="btn btn-ghost text-[11px] px-2 hover:text-red-500" title="Excluir"><i data-lucide="trash-2" style="width:14px;height:14px"></i></button>` : ''}
                    </td>
                  </tr>`;
              }).join('')}
            </tbody>
          </table>`}
        </section>`;
      renderLucide();
    },

    _abrirModalCesta(id = null) {
      const s = id ? (this.state.dados.cesta_basica || []).find(x => x.id === id) : null;
      abrirModal(`
        <div class="flex flex-col max-h-[90vh]">
          <div class="flex items-center justify-between px-6 py-4 border-b border-hairline flex-shrink-0">
            <div><p class="editorial-kicker">${s ? 'Editar' : 'Nova'} solicitação</p><h3 class="heading-display text-[18px]">Cesta Básica</h3></div>

          <div class="overflow-y-auto flex-1 px-6 py-5 space-y-5">
            <div>
              <p class="editorial-kicker mb-2">Cidadão *</p>

            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">

                <label class="micro-label mb-1 block">Origem da solicitação</label>

                </select>
              </div>
              <div>${this._campo('cesta-data','Data da solicitação','date',s?.data_solicitacao || hoje())}</div>
              <div class="col-span-2">${this._campo('cesta-origem-obs','Detalhe da origem (opcional)','text',s?.origem_obs||'')}</div>
            </div>
            <div>
              <p class="editorial-kicker mb-2">Observações</p>
              <textarea id="cesta-obs" rows="2" class="w-full text-sm">${esc(s?.observacoes||'')}</textarea>
            </div>
            ${s && (s.entregas||[]).length ? `
            <div>
              <p class="editorial-kicker mb-2">Entregas registradas</p>
              <div class="space-y-1.5">

                    <button data-act="a157" data-c0="${esc(s.id)}" data-c1="${esc(e.id)}" class="text-ink-muted hover:text-red-500"><i data-lucide="x" style="width:13px;height:13px"></i></button>

    _salvarCesta(id) {
      if (!temPermissao('cesta_basica', id ? 'editar' : 'criar')) { toast('Sem permissão.','error'); return; }
      const cidadaoId = this._cidPickerSel['cesta'];
      if (!cidadaoId) { toast('Selecione o cidadão (precisa ter cadastro).','error'); return; }
      const d = this.state.dados;
      d.cesta_basica = d.cesta_basica || [];
      const antigo = id ? d.cesta_basica.find(x => x.id === id) : null;
      const obj = {
        ...antigo,
        id: id || gerarUUID(),
        cidadao_id: cidadaoId,
        origem: document.getElementById('cesta-origem')?.value || 'atendimento',
        origem_obs: document.getElementById('cesta-origem-obs')?.value?.trim() || '',
        data_solicitacao: document.getElementById('cesta-data')?.value || hoje(),
        observacoes: document.getElementById('cesta-obs')?.value || '',
        entregas: antigo?.entregas || [],
        status: antigo?.status || 'aberto',
        criado_em: antigo?.criado_em || new Date().toISOString(),
      };
      if (id) { const i = d.cesta_basica.findIndex(x => x.id === id); if (i >= 0) d.cesta_basica[i] = obj; }
      else d.cesta_basica.unshift(obj);
      registrarLog(id ? 'editar_cesta' : 'criar_cesta', 'cesta_basica', `Solicitação de cesta básica`, obj.id);
      this.salvar(); fecharModal(); this.renderCestaBasica();
      toast(id ? 'Solicitação atualizada.' : 'Solicitação cadastrada.', 'success');
    },

    _excluirCesta(id) {
      if (!temPermissao('cesta_basica','excluir')) { toast('Sem permissão.','error'); return; }
      confirmar('Excluir esta solicitação de cesta básica?', () => {
        const d = this.state.dados;
        d.cesta_basica = (d.cesta_basica || []).filter(x => x.id !== id);
        this.salvar(); this.renderCestaBasica(); toast('Solicitação excluída.', 'info');
      }, 'danger');
    },

    _cestaRegistrarEntrega(id) {
      if (!temPermissao('cesta_basica','editar')) { toast('Sem permissão.','error'); return; }
      const s = (this.state.dados.cesta_basica || []).find(x => x.id === id);
      if (!s) return;
      const c = this._cidById(s.cidadao_id);
      abrirModal(`
        <div class="p-6">
          <p class="editorial-kicker mb-1">Registrar entrega</p>
          <h3 class="heading-display text-[18px] mb-4">${c ? esc(c.nome) : 'Cesta básica'}</h3>

            </div>
            <div>${this._campo('cesta-ent-data','Data da entrega','date',hoje())}</div>

          </div>
        </div>`, 'max-w-md');
      renderLucide();
    },

    _cestaSalvarEntrega(id) {
      if (!temPermissao('cesta_basica', 'editar')) { toast('Sem permissão.', 'error'); return; }
      const d = this.state.dados;
      const s = (d.cesta_basica || []).find(x => x.id === id);
      if (!s) return;
      s.entregas = s.entregas || [];
      s.entregas.push({
        id: gerarUUID(),
        competencia: document.getElementById('cesta-ent-comp')?.value || new Date().toISOString().slice(0,7),
        data: document.getElementById('cesta-ent-data')?.value || hoje(),
        quantidade: parseInt(document.getElementById('cesta-ent-qtd')?.value, 10) || 1,
        obs: document.getElementById('cesta-ent-obs')?.value?.trim() || '',
      });
      s.status = 'entregue';
      registrarLog('entrega_cesta', 'cesta_basica', `Entrega de cesta registrada`, id);
      this.salvar(); fecharModal(); this.renderCestaBasica(); toast('Entrega registrada.', 'success');
    },

    _cestaRemoverEntrega(id, entregaId) {
      if (!temPermissao('cesta_basica', 'editar')) { toast('Sem permissão.', 'error'); return; }
      const d = this.state.dados;
      const s = (d.cesta_basica || []).find(x => x.id === id);
      if (!s) return;
      s.entregas = (s.entregas || []).filter(e => e.id !== entregaId);
      if (!s.entregas.length) s.status = 'aberto';
      this.salvar(); this.renderCestaBasica(); fecharModal(); this._abrirModalCesta(id);
    },

    // ═══════════════════════════════════════════════════════════
    // MÓDULO SAÚDE
    // ═══════════════════════════════════════════════════════════
    _SAUDE_TIPO: { remocao:'Remoção/transferência hospitalar', consulta:'Consulta', exame:'Exame', medicamento:'Medicamento', cirurgia:'Cirurgia', outro:'Outro' },
    _SAUDE_STATUS: { solicitado:'Solicitado', andamento:'Em andamento', atendido:'Atendido' },
    _saudeFiltro: 'solicitado',

    _saudeToggleOutro(v) {
      const w = document.getElementById('saude-outro-wrap');
      if (w) w.classList.toggle('hidden', v !== 'outro');

    // Rótulo do tipo: se for "Outro" e tiver especificação, mostra o texto digitado.
    _saudeTipoLabel(x) {
      if (x && x.tipo === 'outro' && x.tipo_outro) return x.tipo_outro;
      return this._SAUDE_TIPO[x && x.tipo] || (x && x.tipo) || '—';
    },

    _saudeStatusBadge(st) {
      const map = {
        solicitado: ['var(--accent-light)', 'var(--accent)', 'Solicitado'],
        andamento:  ['rgba(245,158,11,.14)', '#b45309', 'Em andamento'],
        atendido:   ['rgba(16,185,129,.12)', '#059669', 'Atendido'],
      };
      const [bg, fg, lbl] = map[st] || map.solicitado;
      return `<span class="inline-block text-[10px] uppercase tracking-widest font-semibold px-2 py-0.5 rounded-full" style="background:${bg};color:${fg}">${lbl}</span>`;
    },

    // Seletor de status direto na linha (muda na hora, sem abrir "Editar").
    _saudeStatusSelectHTML(x) {
      const cor = {
        solicitado: ['var(--accent-light)', 'var(--accent)'],
        andamento:  ['rgba(245,158,11,.16)', '#b45309'],
        atendido:   ['rgba(16,185,129,.14)', '#059669'],
      }[x.status] || ['var(--accent-light)', 'var(--accent)'];
      return `<select data-change="a159" data-g0="${esc(x.id)}" data-act="a39"
        class="text-[11px] font-semibold rounded-md px-2 py-1 cursor-pointer border border-hairline"
        style="background:${cor[0]};color:${cor[1]}">
        ${Object.entries(this._SAUDE_STATUS).map(([k, v]) => `<option value="${k}" ${x.status === k ? 'selected' : ''} style="background:#fff;color:#111">${v}</option>`).join('')}
      </select>`;
    },

    _saudeMudarStatus(id, st) {
      if (!temPermissao('saude', 'editar')) { toast('Sem permissão.', 'error'); return; }
      const x = (this.state.dados.saude || []).find(y => y.id === id);
      if (!x) return;
      x.status = st;
      this.salvar();
      this.renderSaude();
      toast('Status: ' + (this._SAUDE_STATUS[st] || st) + '.', 'success');
    },

      document.getElementById('conteudo').innerHTML = `
        <header class="mb-6 flex items-end justify-between gap-4 flex-wrap">
          <div><p class="editorial-kicker mb-1">Atendimento</p><h1 class="display-lg">Saúde</h1></div>

          <div class="card p-4"><p class="micro-label">Em andamento</p><p class="font-display text-[26px] leading-none mt-2 tabular-nums">${cont('andamento')}</p></div>
          <div class="card p-4"><p class="micro-label">Atendidos</p><p class="font-display text-[26px] leading-none mt-2 tabular-nums">${cont('atendido')}</p></div>

          ${visiveis.length === 0 ? `

              ${visiveis.map(x => {
                const c = this._cidById(x.cidadao_id);
                return `
                  <tr>
                    <td>
                      <div class="flex items-center gap-3 ${c ? 'cursor-pointer' : ''}" ${c ? `data-act="b7" data-c0="${esc(c.id)}"` : ''}>
                        ${this._avatarCidadao(c || { nome: '?' }, 34)}

                    <td>${this._saudeStatusSelectHTML(x)}</td>
                    <td class="text-right pr-3 whitespace-nowrap">
                      ${temPermissao('saude','editar') ? `<button data-act="a163" data-c0="${esc(x.id)}" class="btn btn-ghost text-[11px] px-2" title="Editar"><i data-lucide="pencil" style="width:14px;height:14px"></i></button>` : ''}
                      ${temPermissao('saude','excluir') ? `<button data-act="a164" data-c0="${esc(x.id)}" class="btn btn-ghost text-[11px] px-2 hover:text-red-500" title="Excluir"><i data-lucide="trash-2" style="width:14px;height:14px"></i></button>` : ''}
                    </td>
                  </tr>`;
              }).join('')}
            </tbody>
          </table>`}
        </section>`;
      renderLucide();
    },

      abrirModal(`
        <div class="flex flex-col max-h-[90vh]">
          <div class="flex items-center justify-between px-6 py-4 border-b border-hairline flex-shrink-0">
            <div><p class="editorial-kicker">${x ? 'Editar' : 'Novo'} pedido</p><h3 class="heading-display text-[18px]">Saúde</h3></div>
            <button data-act="a0" class="w-8 h-8 rounded-md flex items-center justify-center text-ink-muted hover:bg-sunken"><i data-lucide="x" style="width:16px;height:16px"></i></button>
          </div>

    _salvarSaude(id) {

      const cidadaoId = this._cidPickerSel['saude'];

      const antigo = id ? d.saude.find(y => y.id === id) : null;

        id: id || gerarUUID(),

        tipo: document.getElementById('saude-tipo')?.value || 'consulta',

        observacoes: document.getElementById('saude-obs')?.value || '',
        criado_em: antigo?.criado_em || new Date().toISOString(),

      if (id) { const i = d.saude.findIndex(y => y.id === id); if (i >= 0) d.saude[i] = obj; }

    // ═══════════════════════════════════════════════════════════

    // ═══════════════════════════════════════════════════════════
    _avatarPrint(c, px) {
      const f = this._fotoSegura(c && c.foto_thumb);
      if (f) return `<img src="${f}" style="width:${px}px;height:${px}px;object-fit:cover;border-radius:50%;border:1px solid #ddd">`;
      return `<span style="display:inline-flex;align-items:center;justify-content:center;width:${px}px;height:${px}px;border-radius:50%;background:#eee;color:#666;font-weight:bold;font-size:${Math.round(px * 0.4)}px">${esc(this._iniciais(c && c.nome))}</span>`;
    },
    _cabecalhoImpressao(subtitulo) {
      const meta = this.state.meta;
      const foto = this._fotoSegura(App._fotoprevCache);
      return `<div style="display:flex;align-items:center;gap:16px;border-bottom:2px solid #333;padding-bottom:12px;margin-bottom:20px">
        ${foto ? `<img src="${foto}" style="width:52px;height:52px;object-fit:cover;border-radius:8px">` : ''}
        <div><div style="font-size:18px;font-weight:bold">${esc(meta.cargo)} ${esc(meta.nome_vereador)}</div>
          <div style="font-size:13px;color:#555">${esc(this.state.dados.configuracoes?.partido) || ''} · ${esc(meta.cidade)} — ${esc(meta.estado)}</div></div>
        <div style="margin-left:auto;text-align:right;font-size:12px;color:#555">${esc(subtitulo || '')}<br>Emitido em ${new Date().toLocaleString('pt-BR')}</div>
      </div>`;
    },
    _rodapeImpressao() {
      const meta = this.state.meta;
      return `<div style="margin-top:30px;border-top:1px solid #ccc;padding-top:10px;font-size:11px;color:#888;text-align:center">Documento gerado pelo Sistema de Gestão de Gabinete — ${esc(meta.cargo)} ${esc(meta.nome_vereador)} · ${esc(meta.cidade)}/${esc(meta.estado)}</div>`;
    },
    _abrirImpressao(titulo, corpoHtml) {
      const fullHtml = `<!DOCTYPE html><html><head><meta charset="utf-8"><title>${esc(titulo)}</title>
        <style>@media print{body{margin:0}} body{margin:20px;font-family:Arial,Helvetica,sans-serif;color:#111} table{border-collapse:collapse;width:100%} td,th{vertical-align:middle}</style>
        </head><body><div style="max-width:760px;margin:0 auto">${corpoHtml}</div></body></html>`;
      const blob = new Blob([fullHtml], { type: 'text/html' });
      const url = URL.createObjectURL(blob);
      const win = window.open(url, '_blank', 'width=820,height=900');
      setTimeout(() => { try { win.print(); } catch (e) {} URL.revokeObjectURL(url); }, 600);
    },

    _imprimirFichaCidadao(id) {

      const saudes = (this.state.dados.saude || []).filter(s => s.cidadao_id === id);
      const dems   = (this.state.dados.demandas || []).filter(s => s.cidadao_id === id);
      const corpo = `
        ${this._cabecalhoImpressao('Ficha do cidadão' + (c.numero ? ' #' + c.numero : ''))}

        </div>
        <table style="font-size:13px;margin-bottom:16px">
          ${linha('CPF', c.cpf)}${linha('RG', c.rg)}
          ${linha('Nascimento', c.data_nascimento ? this._dataBR(c.data_nascimento) : '')}

    _mapaInst: null,

    _abrirMapaCidadaos() {
      const ids = this._cidListaAtualIds || (this.state.dados.cidadaos || []).map(c => c.id);

      const tt = document.getElementById('topbar-titulo'); if (tt) tt.textContent = 'Cidadãos no mapa';
      renderLucide();
      setTimeout(() => this._mapaRender(cidadaos), 80);
    },

    // Posição do cidadão: coords geocodificadas (cache) ou aproximação pela seção eleitoral.
    _mapaPos(c) {
      if (typeof c.lat === 'number' && typeof c.lng === 'number') return { lat: c.lat, lng: c.lng, aprox: false };
      const loc = this._colegioPorSecao(c.secao_eleitoral);
      if (loc && loc.lat && loc.lng) {
        const seed = parseInt((c.id || '0').replace(/\D/g, '').slice(0, 6) || '0', 10);
        const jit = ((seed % 200) - 100) / 100 * 0.0035;
        return { lat: loc.lat + jit, lng: loc.lng - jit, aprox: true };
      }
      return null;
    },

    _mapaRender(cidadaos) {
      const st = document.getElementById('mapa-status');
      if (!window.L) { if (st) st.textContent = 'A biblioteca de mapa não carregou.'; return; }
      const box = document.getElementById('mapa-box');
      if (!box) return;
      if (this._mapaInst) { try { this._mapaInst.remove(); } catch (e) {} this._mapaInst = null; }
      const map = L.map(box).setView([-23.851, -46.139], 12); // Bertioga
      this._mapaInst = map;
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19, attribution: '© OpenStreetMap' }).addTo(map);
      const pts = [];
      let semPos = 0, aprox = 0;
      cidadaos.forEach(c => {
        const p = this._mapaPos(c);
        if (!p) { semPos++; return; }
        if (p.aprox) aprox++;
        const icon = L.divIcon({
          html: `<div style="width:36px;height:36px;border-radius:50%;overflow:hidden;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.45)">${this._avatarCidadao(c, 36)}</div>`,
          className: '', iconSize: [36, 36], iconAnchor: [18, 18],
        });
        const m = L.marker([p.lat, p.lng], { icon }).addTo(map);
        m.bindPopup(`<strong>${esc(c.nome)}</strong>${c.bairro ? '<br>' + esc(c.bairro) : ''}${c.endereco ? '<br>' + esc(c.endereco) : ''}${p.aprox ? '<br><em style="color:#999">posição aproximada (seção eleitoral)</em>' : ''}`);
        pts.push([p.lat, p.lng]);
      });
      if (pts.length) map.fitBounds(pts, { padding: [40, 40], maxZoom: 15 });
      if (st) st.textContent = `${pts.length} no mapa${aprox ? ` · ${aprox} aproximado(s) pela seção` : ''}${semPos ? ` · ${semPos} sem localização` : ''}. O mapa precisa de internet para carregar.`;
    },

    async _mapaGeocodar() {
      const ids = this._cidListaAtualIds || [];
      const alvo = (this.state.dados.cidadaos || []).filter(c => ids.includes(c.id) && c.endereco && typeof c.lat !== 'number');
      if (!alvo.length) { toast('Nada a localizar (sem endereço ou já localizados).', 'info'); return; }
      // LGPD: pede consentimento antes de enviar endereços a um serviço EXTERNO (OSM).
      confirmar(
        `Para marcar no mapa, os endereços de <strong>${alvo.length} cidadão(s)</strong> serão enviados ao serviço de mapas OpenStreetMap (servidor na internet). Os nomes não são enviados, só os endereços. Deseja continuar?`,
        async () => {
          const st = document.getElementById('mapa-status');
          let ok = 0;
          for (let i = 0; i < alvo.length; i++) {
            const c = alvo[i];
            if (st) st.textContent = `Localizando ${i + 1}/${alvo.length}…`;
            try {
              const q = `${c.endereco}, ${c.bairro || ''}, Bertioga, SP, Brasil`;
              const r = await fetch('https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=br&q=' + encodeURIComponent(q));
              const j = await r.json();
              if (j && j[0]) { c.lat = parseFloat(j[0].lat); c.lng = parseFloat(j[0].lon); ok++; }
            } catch (e) {}
            await new Promise(res => setTimeout(res, 1100)); // respeita o limite do Nominatim (1/s)
          }
          this.salvar();
          toast(`${ok} endereço(s) localizado(s).`, 'success');
          this._abrirMapaCidadaos();
        },
        'primary', 'Enviar e localizar', 'Cancelar'
      );
    },

    _salvarInteracao(cidadaoId) {
      if (!temPermissao('cidadaos','editar')) { toast('Sem permissão.','error'); return; }
      const tipo = document.getElementById('int-tipo')?.value || 'ligacao';
      const data = document.getElementById('int-data')?.value || hoje();
      const descricao = document.getElementById('int-desc')?.value?.trim() || '';
      const criarDiario = document.getElementById('int-diario')?.checked || false;
      if (!descricao) { toast('Descreva brevemente a interação.', 'error'); return; }

      const d = this.state.dados;
      const c = (d.cidadaos || []).find(x => x.id === cidadaoId);
      if (!c) return;
      if (!c.interacoes) c.interacoes = [];

      const u = this.state.usuario_logado;
      const interacao = {
        id: gerarUUID(),
        data, tipo, descricao,
        usuario_id: u?.id || null,
        usuario_nome: u?.nome || '',
      };
      c.interacoes.unshift(interacao);

      if (criarDiario) {
        if (!d.diario) d.diario = [];
        d.diario.unshift({
          id: gerarUUID(),
          titulo: `${this._INTERACAO_TIPOS[tipo]} — ${c.nome}`,
          data, categoria: 'reuniao', descricao,
          assessor: u?.nome || '',
        });
      }

      this.salvar();
      registrarLog('registrar_contato', 'cidadaos', `${this._INTERACAO_TIPOS[tipo]} com ${c.nome}`, cidadaoId);
      fecharModal();
      toast('Contato registrado.', 'success');
      this.renderCidadaoFicha(cidadaoId);
    },

    _excluirInteracao(cidadaoId, interacaoId) {
      if (!temPermissao('cidadaos','editar')) { toast('Sem permissão.','error'); return; }
      confirmar('Remover este registro da timeline?', () => {
        const c = (this.state.dados.cidadaos || []).find(x => x.id === cidadaoId);
        if (!c) return;
        c.interacoes = (c.interacoes || []).filter(i => i.id !== interacaoId);
        this.salvar();
        this.renderCidadaoFicha(cidadaoId);
        toast('Registro removido.', 'info');
      }, 'danger');
    },

    // ── Autocomplete helper ────────────────────────────────────
    _cidAutocompleteAttach(inputId, listaId, onPick) {
      const input = document.getElementById(inputId);
      const lista = document.getElementById(listaId);
      if (!input || !lista) return;
      const cidadaos = this.state.dados.cidadaos || [];
      const fechar = () => { lista.innerHTML = ''; lista.classList.add('hidden'); };
      const render = () => {
        const q = input.value.trim().toLowerCase();
        if (!q || q.length < 2) { fechar(); return; }
        const matches = cidadaos.filter(c =>
          (c.nome || '').toLowerCase().includes(q) ||
          (c.telefone || '').includes(q) ||
          (c.cpf || '').includes(q)
        ).slice(0, 6);
        if (!matches.length) { fechar(); return; }
        lista.classList.remove('hidden');
        lista.innerHTML = matches.map(c => `
          <button type="button" data-cid="${c.id}" class="w-full text-left px-3 py-2 text-[12.5px] hover:bg-sunken border-b border-hairline last:border-b-0">
            <span class="font-medium text-ink">${esc(c.nome)}</span>
            <span class="text-ink-muted text-[11px] ml-1">${esc(c.bairro||'')}${c.telefone?' · '+esc(c.telefone):''}</span>
          </button>`).join('');
        lista.querySelectorAll('button[data-cid]').forEach(btn => {
          btn.addEventListener('click', () => {
            const c = cidadaos.find(x => x.id === btn.dataset.cid);
            if (c) onPick(c);
            fechar();
          });
        });
      };
      input.addEventListener('input', render);
      input.addEventListener('blur', () => setTimeout(fechar, 200));
    },

      }
      if (/\{\{\s*evento\./.test(txt)) {
        const evs = App.state.dados.agenda || [];
        const cur = ctx.evento ? (evs.find(e => e.titulo === ctx.evento.titulo) || {}).id || '' : '';
        const opts = evs.map(e => '<option value="' + esc(e.id) + '"' + (cur === e.id ? ' selected' : '') + '>'

      if (/\{\{\s*autoridade\.cargo/.test(txt))   livres.push(['autoridade_cargo',   'Cargo da autoridade',   (ctx.autoridade && ctx.autoridade.cargo)   || '']);
      if (/\{\{\s*assunto\s*\}\}/.test(txt))      livres.push(['assunto',            'Assunto',                ctx.assunto || '']);
      if (/\{\{\s*detalhes\s*\}\}/.test(txt))     livres.push(['detalhes',           'Detalhes',               ctx.detalhes || '']);

      if (/\{\{\s*link\s*\}\}/.test(txt))         livres.push(['link',               'Link',                   ctx.link || '']);

      if (/\{\{\s*mobilizacao\.objetivo/.test(txt))livres.push(['mobilizacao_objetivo','Objetivo da mobilização',(ctx.mobilizacao && ctx.mobilizacao.objetivo) || '']);
      if (/\{\{\s*mobilizacao\.link/.test(txt))   livres.push(['mobilizacao_link',   'Link da mobilização',   (ctx.mobilizacao && ctx.mobilizacao.link)     || '']);
      livres.forEach(([key, label, val]) => {

    _campVincularContexto(tipo, id) {

      if (tipo === 'pl') {
        const p = (App.state.dados.projetos_lei || []).find(x => x.id === id);
        if (p) this._campAtual.extra_contexto.pl = { titulo: p.titulo || '', ementa: p.ementa || '', numero: p.numero || '', ano: p.ano || '' };
      } else if (tipo === 'demanda') {
        const d = (App.state.dados.demandas || []).find(x => x.id === id);
        if (d) this._campAtual.extra_contexto.demanda = { protocolo: d.protocolo || '', assunto: d.assunto || '', status: d.status || '', area: d.area || '' };
      } else if (tipo === 'evento') {
        const e = (App.state.dados.agenda || []).find(x => x.id === id);
        if (e) this._campAtual.extra_contexto.evento = { titulo: e.titulo || '', data: e.data || '', local: e.local || '', descricao: e.descricao || '' };

      App._campRender();

        mobilizacao_objetivo:['mobilizacao', 'objetivo'],

      const m = mapeamento[key]; if (!m) return;

    _campInserirVar(token) {
      const ta = document.getElementById('camp-corpo');
      if (!ta) return;
      const s = ta.selectionStart != null ? ta.selectionStart : ta.value.length;
      const e = ta.selectionEnd != null ? ta.selectionEnd : ta.value.length;
      ta.value = ta.value.slice(0, s) + token + ta.value.slice(e);

      try { ta.setSelectionRange(pos, pos); } catch (_) {}

    _campSugerirModo() {
      const c = this._campAtual;

      if (c.canal === 'carta') return 'docx';

        if (temVar && total > 50) return 'fila';

        if (['audiencia','mobilizacao'].includes(cat) && total > 100) return 'grupo';

    _campIniciarDisparo() {
      const c = this._campAtual;
      // LGPD: reavalia o opt-out VIVO de cada destinatário no momento do disparo (o
      // snapshot pode estar velho — alguém pode ter pedido para sair depois de adicionado).
      const _cidx = {}; (App.state.dados.cidadaos || []).forEach(x => { _cidx[x.id] = x; });
      (c.destinatarios || []).forEach(d => { const ci = _cidx[d.cidadao_id]; if (ci) d.opt_out = !!ci.opt_out_comunicacao; });
      // Valida que há destinatário elegível ANTES de marcar a campanha como iniciada/
      // persistir — senão sobra uma "campanha fantasma em andamento" e o usuário trava.
      const aptos = (c.destinatarios || []).filter(d => !d.opt_out);
      const elegiveis = c.canal === 'email' ? aptos.filter(d => d.email_cache)
                      : c.canal === 'carta' ? aptos
                      : aptos.filter(d => d.telefone_e164);
      if (!elegiveis.length) {
        toast(c.canal === 'email' ? 'Nenhum destinatário com e-mail.'
            : c.canal === 'carta' ? 'Nenhum destinatário válido (todos sem dados ou opt-out).'
            : 'Nenhum destinatário com telefone.', 'error', 5000);
        return;
      }
      c.estado = 'em_andamento';
      c.iniciado_em = new Date().toISOString();
      c.total = (c.destinatarios || []).length;
      c.disparado_por = (App.state.usuario_logado && App.state.usuario_logado.id) || '';
      if (!App.state.dados.campanhas.some(x => x.id === c.id)) {
        App.state.dados.campanhas.push(c);
      }
      App.salvar();
      if (c.canal === 'whatsapp' && c.modo_envio === 'lista_transmissao') return App._dispLista();
      if (c.canal === 'whatsapp' && c.modo_envio === 'grupo')             return App._dispGrupo();
      if (c.canal === 'email'    && c.modo_envio === 'mailto_bcc')        return App._dispMailtoBCC();
      if (c.canal === 'email'    && c.modo_envio === 'csv')               return App._dispCSV();
      if (c.canal === 'carta')                                            return App._dispCarta();
      // Padrão: fila

    _dispFila() {
      this._renderFila();
      // Keyboard shortcuts (remove qualquer listener anterior — evita vazar e duplicar)
      this._filaCleanup();
      this._filaTeclas = (e) => {
        if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
        if (e.key === 'Enter')        { e.preventDefault(); App._filaMarcar('enviado'); }
        else if (e.key === 'ArrowRight') { e.preventDefault(); App._filaMarcar('pulado'); }
        else if (e.key === 'Escape')  { e.preventDefault(); App._filaPausar(); }
      };
      document.addEventListener('keydown', this._filaTeclas);
    },
    // Remove o atalho de teclado da fila — chamado ao sair (rotear/bloquear/pausar/fim)
    // para o listener não sobreviver e operar sobre estado morto (clobber/crash).
    _filaCleanup() {
      if (this._filaTeclas) { document.removeEventListener('keydown', this._filaTeclas); this._filaTeclas = null; }
    },

        const ic = d.status === 'enviado' ? '✓' : d.status === 'pulado' ? '⏭' : (d.opt_out ? '⛔' : '·');
        const cls = d.opt_out ? 'line-through text-slate-400' : (d.status === 'enviado' ? 'text-emerald-600' : (d.status === 'pulado' ? 'text-slate-400' : ''));

        + '</div></div>';
      // Safe: dados via esc(); URL via encodeURIComponent; preview de corpo livre em textContent abaixo
      document.getElementById('conteudo').innerHTML = html;
      if (idx >= 0) {
        const d = dests[idx];
        const ci = cidadaos.find(x => x.id === d.cidadao_id) || {};

    _filaMarcar(novo) {
      const c = this._campAtual;
      if (!c) { this._filaCleanup(); return; } // estado morto (saiu da fila) → ignora a tecla
      const dests = c.destinatarios || [];
      const idx = dests.findIndex(d => d.status === 'pendente' && !d.opt_out && d.telefone_e164);
      if (idx < 0) return;
      const d = dests[idx];
      d.status = novo;
      d.enviado_em = new Date().toISOString();
      if (novo === 'enviado') {
        c.enviados = (c.enviados || 0) + 1;
        App._disparoLogHistorico(c, d);
      } else if (novo === 'pulado') {
        c.pulados = (c.pulados || 0) + 1;
      }
      App.salvar();
      App._renderFila();

    async _dispCarta() {
      const c = this._campAtual;
      const dests = c.destinatarios || [];
      if (!dests.length) { toast('Sem destinatários.','error'); return; }
      if (typeof docx === 'undefined' || !docx.Document || !docx.Packer) {
        toast('Lib docx.js não carregada — verifique a aba Ofícios primeiro.','error');
        return;
      }
      const tmpl = (App.state.dados.mensagens_templates || []).find(t => t.id === c.template_id);
      const corpo = c.corpo_custom || '';
      const assunto = (tmpl && tmpl.assunto) || c.nome || '';
      const cidadaos = App.state.dados.cidadaos || [];
      const elegiveis = dests.filter(d => !d.opt_out);
      if (!elegiveis.length) { toast('Todos opt-out.','error'); return; }
      const sections = elegiveis.map(d => {
        const ci = cidadaos.find(x => x.id === d.cidadao_id) || {};
        const corpoRender = Mensagens.renderizar(corpo, Object.assign({ cidadao: ci }, c.extra_contexto || {}));
        const endereco = ci.endereco || (ci.bairro || '');
        const paragrafos = [
          new docx.Paragraph({ children: [new docx.TextRun({ text: ci.nome || '—', bold: true })] }),
          new docx.Paragraph({ children: [new docx.TextRun(endereco)] }),
          new docx.Paragraph({ children: [new docx.TextRun('')] }),
          new docx.Paragraph({ children: [new docx.TextRun({ text: assunto, bold: true })] }),
          new docx.Paragraph({ children: [new docx.TextRun('')] }),
        ];
        String(corpoRender).split(/\n/).forEach(linha => {
          paragrafos.push(new docx.Paragraph({ children: [new docx.TextRun(linha)] }));
        });
        return { properties: {}, children: paragrafos };
      });
      let doc;
      try {
        doc = new docx.Document({ sections });
      } catch (e) {
        toast('Falha ao montar documento: ' + e.message, 'error');
        return;
      }
      let blob;
      try {
        blob = await docx.Packer.toBlob(doc);
      } catch (e) {
        toast('Falha ao gerar arquivo: ' + e.message, 'error');
        return;
      }
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'cartas_' + c.id.slice(0, 8) + '.docx';
      document.body.appendChild(a); a.click(); a.remove();
      URL.revokeObjectURL(a.href);
      elegiveis.forEach(d => {
        d.status = 'enviado'; d.enviado_em = new Date().toISOString();
        App._disparoLogHistorico(c, d);
        c.enviados = (c.enviados || 0) + 1;
      });
      c.estado = 'finalizada';
      c.finalizado_em = new Date().toISOString();
      App.salvar();
      toast('Cartas geradas: ' + c.enviados + '.','success');
      location.hash = '#comunicacao';
      App._comuRenderAba();
    },

    _impParseCSV(texto) {
      const linhas = texto.split(/\r?\n/).filter(l => l.trim());
      if (!linhas.length) return { cols: [], rows: [] };
      const sep = (linhas[0].split(';').length > linhas[0].split(',').length) ? ';' : ',';
      const splitter = new RegExp('("(?:[^"]|"")*"|[^"' + sep + ']+)', 'g');
      const split = l => (l.match(splitter) || []).map(s => s.replace(/^"|"$/g, '').replace(/""/g, '"'));
      const cols = split(linhas[0]);
      const rows = linhas.slice(1).map(l => {
        const parts = split(l);
        const obj = {};
        cols.forEach((c, i) => obj[c.trim()] = (parts[i] || '').trim());
        return obj;
      });
      return { cols, rows };
    },
    async _impArquivoCSV(file) {
      if (!file) return;
      // Limite de tamanho — reduz risco de ReDoS/estouro ao processar arquivo malicioso.
      if (file.size > 25 * 1024 * 1024) { toast('Arquivo muito grande (máx. 25 MB).', 'error', 5000); return; }
      let parsed;
      const nome = (file.name || '').toLowerCase();
      if (nome.endsWith('.xlsx') || nome.endsWith('.xls')) {
        try {
          if (!window.XLSX) {
            await new Promise((resolve, reject) => {
              const s = document.createElement('script');
              s.src = './vendor/xlsx.full.min.js';
              s.onload = resolve;
              s.onerror = reject;
              document.head.appendChild(s);
            });
          }
          const buf = await file.arrayBuffer();
          const wb = XLSX.read(buf, { type: 'array' });
          const sheet = wb.Sheets[wb.SheetNames[0]];
          const json = XLSX.utils.sheet_to_json(sheet, { defval: '' });
          const cols = json.length ? Object.keys(json[0]) : [];
          parsed = { cols, rows: json };
        } catch (err) {
          toast('Falha ao ler Excel: ' + (err && err.message), 'error');
          return;
        }
      } else {
        const texto = await file.text();
        parsed = this._impParseCSV(texto);
      }
      this._impCSVAtual = parsed;
      this._impCSVMapear();
    },
    _impCSVMapear() {
      const data = this._impCSVAtual || { cols: [], rows: [] };
      const cols = data.cols, rows = data.rows;
      if (!cols.length) { toast('Arquivo vazio.','error'); return; }
      const sugerir = pal => cols.find(c => pal.test(c.toLowerCase())) || '';
      const auto = {
        nome:     sugerir(/(nome|name)/),
        telefone: sugerir(/(telefone|celular|phone|fone)/),
        email:    sugerir(/(email|e-mail)/),
        bairro:   sugerir(/bairro/),
        endereco: sugerir(/(endere|address)/),
      };
      const sel = campo => cols.map(c => '<option value="' + esc(c) + '"' + (auto[campo] === c ? ' selected' : '') + '>' + esc(c) + '</option>').join('');
      const campos = ['nome','telefone','email','bairro','endereco'];
      const camposHtml = campos.map(k => '<label class="block">' + esc(k) + '<select data-map="' + esc(k) + '" class="w-full rounded-xl border bg-slate-50 px-2 py-1 text-sm"><option value="">—</option>' + sel(k) + '</select></label>').join('');
      const head = cols.map(c => '<th class="px-2 py-1 text-left text-slate-500">' + esc(c) + '</th>').join('');
      const body = rows.slice(0, 10).map(r => '<tr>' + cols.map(c => '<td class="px-2 py-1">' + esc(r[c] || '') + '</td>').join('') + '</tr>').join('');
      const html = '<h3 class="font-semibold mb-2">Mapear colunas</h3>'
                 + '<div class="grid grid-cols-2 md:grid-cols-5 gap-3 text-sm mb-3">' + camposHtml + '</div>'
                 + '<div class="text-xs text-slate-500 mb-2">Pré-visualização (' + rows.length + ' linhas) — primeiras 10:</div>'
                 + '<div class="border rounded-xl overflow-auto max-h-64"><table class="text-xs w-full"><thead><tr>' + head + '</tr></thead><tbody>' + body + '</tbody></table></div>'
                 + '<div class="mt-3 flex gap-2"><button data-act="a207" class="btn-primary rounded-xl px-4 py-2 text-sm">Importar ' + rows.length + ' contatos</button></div>';
      // Safe: column names e dados passam por esc()
      document.getElementById('imp-resultado').innerHTML = html;
    },
    _impCSVConfirmar() {
      const map = {};
      document.querySelectorAll('[data-map]').forEach(s => map[s.dataset.map] = s.value);
      if (!map.nome) { toast('Mapeie pelo menos a coluna Nome.','error'); return; }

            tags: ['importado-csv'],

            consentimento_em: new Date().toISOString(),
            criado_em: new Date().toISOString(),
          };
          cidadaos.push(novo);
          if (fone.e164) indexFone.set(fone.e164, novo);
          novos++;
        }
      });
      App.salvar();
      toast(novos + ' novos, ' + mesclados + ' mesclados.','success');
      this._impCSVAtual = null;
      document.getElementById('imp-resultado').textContent = '';
    },
    async _impArquivoVCF(file) {
      if (!file) return;
      const texto = await file.text();
      const cards = texto.split(/BEGIN:VCARD/i).slice(1);
      const out = cards.map(b => {
        const fn  = (b.match(/\nFN:(.+)/i)         || [,''])[1].trim();
        const tel = (b.match(/\nTEL[^:]*:(.+)/i)   || [,''])[1].trim();
        const eml = (b.match(/\nEMAIL[^:]*:(.+)/i) || [,''])[1].trim();
        return { nome: fn, telefone: tel, email: eml };
      }).filter(c => c.nome || c.telefone);
      if (!out.length) { toast('Nenhum contato encontrado.','error'); return; }
      this._impVCFAtual = out;
      const head = '<thead><tr class="text-slate-500 text-[11px] uppercase"><th class="px-2 py-1 text-left">Nome</th><th class="px-2 py-1 text-left">Telefone</th><th class="px-2 py-1 text-left">E-mail</th></tr></thead>';
      const body = out.slice(0, 30).map(c => '<tr><td class="px-2 py-1">' + esc(c.nome) + '</td><td class="px-2 py-1">' + esc(c.telefone) + '</td><td class="px-2 py-1">' + esc(c.email) + '</td></tr>').join('');
      const html = '<h3 class="font-semibold mb-2">' + out.length + ' contatos encontrados</h3>'
                 + '<table class="text-sm w-full border rounded-xl overflow-hidden">' + head + '<tbody>' + body + '</tbody></table>'
                 + '<button data-act="a208" class="btn-primary rounded-xl px-4 py-2 text-sm mt-3">Importar ' + out.length + ' contatos</button>';
      // Safe: campos vCard passam por esc()
      document.getElementById('imp-resultado').innerHTML = html;
    },
    _impVCFConfirmar() {
      const dddDef = App.state.dados.configuracoes?.comunicacao?.ddd_padrao || DDD_POR_ESTADO[App.state.meta?.estado] || '';
      const cidadaos = App.state.dados.cidadaos || [];

      let novos = 0, mesclados = 0;
      (this._impVCFAtual || []).forEach(c => {
        const fone = normalizarTelefone(c.telefone, dddDef);

        const novo = {
          id: gerarUUID(),

          consentimento_em: new Date().toISOString(),
          criado_em: new Date().toISOString(),
        };
        cidadaos.push(novo);
        if (fone.e164) indexFone.set(fone.e164, novo);
        novos++;
      });

    _impColarTelefones() {
      const inp = document.getElementById('imp-telefones');
      const texto = inp ? inp.value : '';
      const matches = texto.match(/(\+?55\s*)?\(?\d{2}\)?[\s.-]*9?\d{4}[\s.-]*\d{4}/g) || [];
      if (!matches.length) { toast('Nenhum telefone encontrado.','error'); return; }
      const dddDef = App.state.dados.configuracoes?.comunicacao?.ddd_padrao || DDD_POR_ESTADO[App.state.meta?.estado] || '';
      const cidadaos = App.state.dados.cidadaos || [];
      const indexFone = new Map(cidadaos.filter(c => c.telefone_e164).map(c => [c.telefone_e164, c]));
      let novos = 0, dupes = 0, invalidos = 0;
      matches.forEach(raw => {
        const fone = normalizarTelefone(raw, dddDef);
        if (!fone.valido) { invalidos++; return; }
        if (indexFone.has(fone.e164)) { dupes++; return; }
        const novo = {
          id: gerarUUID(),
          nome: 'Cidadão sem nome ' + (cidadaos.length + 1),
          telefone: raw,
          telefone_e164: fone.e164,
          telefone_invalido: false,
          telefone_tipo: fone.tipo,
          tags: ['importado-papel'],
          opt_out_comunicacao: false,
          consentimento_em: new Date().toISOString(),
          criado_em: new Date().toISOString(),
        };
        cidadaos.push(novo);
        indexFone.set(fone.e164, novo);
        novos++;
      });
      App.salvar();
      toast(novos + ' novos · ' + dupes + ' duplicados · ' + invalidos + ' inválidos.','success');
      if (inp) inp.value = '';
    },

    _histExportarCSV() {
      const cidadaos = new Map((App.state.dados.cidadaos || []).map(c => [c.id, c]));
      const tmpls    = new Map((App.state.dados.mensagens_templates || []).map(t => [t.id, t]));
      const linhas = [['Data','Canal','Cidadao','Template','Mensagem','Por']];
      (App.state.dados.historico_mensagens || []).forEach(h => {
        const c = cidadaos.get(h.cidadao_id);
        const t = tmpls.get(h.template_id);
        linhas.push([
          h.enviado_em ? formatarDataHora(h.enviado_em) : '',
          (Mensagens.CANAIS[h.canal] || {}).label || h.canal || '',
          (c && c.nome) || '—',
          (t && t.nome) || '—',
          h.mensagem_texto || '',
          h.enviado_por || '',
        ]);
      });
      const csv = linhas.map(l => l.map(v => { let s = String(v == null ? '' : v); if (/^[=+\-@\t\r]/.test(s)) s = "'" + s; return '"' + s.replace(/"/g, '""') + '"'; }).join(',')).join('\n');
      const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'historico_comunicacao_' + new Date().toISOString().slice(0, 10) + '.csv';
      document.body.appendChild(a); a.click(); a.remove();
      URL.revokeObjectURL(url);
      toast('CSV exportado.','success');
    },
    _histArquivarAntigos() {
      const limite = new Date();
      limite.setFullYear(limite.getFullYear() - 1);
      const limiteIso = limite.toISOString();
      const hist = App.state.dados.historico_mensagens || [];
      const antigos = hist.filter(h => (h.enviado_em || '') < limiteIso);
      if (!antigos.length) { toast('Não há registros com mais de 1 ano.','info'); return; }
      confirmar('Arquivar ' + antigos.length + ' registros (mais de 1 ano)? O arquivo .json será baixado e removido do sistema.', () => {
        const blob = new Blob([JSON.stringify(antigos, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'historico_arquivado_' + new Date().toISOString().slice(0, 10) + '.json';
        document.body.appendChild(a); a.click(); a.remove();
        URL.revokeObjectURL(url);
        App.state.dados.historico_mensagens = hist.filter(h => (h.enviado_em || '') >= limiteIso);
        App.salvar();
        toast(antigos.length + ' arquivados.','success');
        App._comuRenderAba();
      });
    },

      const out = Mensagens.renderizar(corpo, { cidadao: ex });

    _tmplInserirVar(token) {
      const ta = document.getElementById('tmpl-corpo'); if (!ta) return;
      const ini = ta.selectionStart, fim = ta.selectionEnd;
      ta.value = ta.value.slice(0, ini) + token + ta.value.slice(fim);
      ta.focus(); ta.selectionEnd = ini + token.length;
      this._tmplAtualizarPreview();
    },
    _tmplSalvar(id, editando) {
      const d = this._tmplLerForm();
      if (!d.nome.trim())   { toast('Nome obrigatório.','error'); return; }
      if (!d.canais.length) { toast('Escolha pelo menos um canal.','error'); return; }
      if (!d.corpo.trim())  { toast('Corpo obrigatório.','error'); return; }
      const lista = App.state.dados.mensagens_templates;
      if (editando) {
        const i = lista.findIndex(t => t.id === id);
        if (i >= 0) lista[i] = Object.assign(lista[i], d, { atualizado_em: new Date().toISOString() });
      } else {
        lista.push(Object.assign({ id, padrao: false, criado_em: new Date().toISOString() }, d));
      }
      App.salvar(); toast('Template salvo.','success'); fecharModal && fecharModal(); App._comuRenderAba();
    },

    renderFiscalizacao() {
      const fisc = this.state.dados.fiscalizacoes||[];
      const cores = {anunciado:'bg-slate-100 text-slate-600',em_licitacao:'bg-blue-50 text-blue-600',em_andamento:'bg-amber-50 text-amber-600',paralisado:'bg-red-50 text-red-600',concluido:'bg-emerald-50 text-emerald-600',cancelado:'bg-slate-100 text-slate-500'};
      document.getElementById('conteudo').innerHTML = `
        <div class="flex items-center justify-between mb-6">
          <h2 class="heading-display text-xl text-slate-800 dark:text-white">Fiscalização do Executivo</h2>
          <button data-act="a212" class="btn-primary px-5 py-2.5 rounded-xl text-sm font-semibold flex items-center gap-2 cursor-pointer"><i class="fa-solid fa-plus text-xs"></i>Nova Fiscalização</button>
        </div>
        ${fisc.length===0?'<div class="flex flex-col items-center py-16 text-slate-400 gap-3"><i class="fa-solid fa-magnifying-glass-chart text-4xl"></i><p class="text-sm">Nenhuma fiscalização cadastrada.</p></div>':
        `<div class="space-y-3">${fisc.map(f => `
          <div class="bg-white dark:bg-slate-800 rounded-2xl border border-slate-100 dark:border-slate-700/50 p-5 shadow-card card-hover">
            <div class="flex items-start justify-between mb-2">
              <div><p class="font-semibold text-slate-800 dark:text-white text-sm">${esc(f.nome)}</p><p class="text-xs text-slate-400">${esc(f.secretaria||'')} · ${esc(f.bairro||'')}</p></div>
              <div class="flex items-center gap-2">
                <span class="badge text-xs px-2 py-0.5 rounded-full ${cores[f.status]||''}">${LABELS.status_fiscalizacao[f.status]||f.status}</span>
                <button data-act="a213" data-c0="${esc(f.id)}" class="w-9 h-9 rounded-lg flex items-center justify-center text-slate-400 hover:text-primary cursor-pointer"><i class="fa-solid fa-pen text-xs"></i></button>
                <button data-act="a214" data-c0="${esc(f.id)}" class="w-9 h-9 rounded-lg flex items-center justify-center text-slate-400 hover:text-red-500 cursor-pointer"><i class="fa-solid fa-trash text-xs"></i></button>
              </div>
            </div>
            ${f.valor_estimado?`<p class="text-xs text-slate-500 mb-1"><i class="fa-solid fa-coins mr-1"></i>R$ ${esc(f.valor_estimado)}</p>`:''}
            ${f.prazo_previsto?`<p class="text-xs text-slate-500 mb-2"><i class="fa-solid fa-calendar mr-1"></i>Prazo: ${formatarData(f.prazo_previsto)}</p>`:''}
            ${(f.timeline||[]).length?`<div class="border-l-2 border-slate-200 dark:border-slate-700 pl-3 space-y-1 mt-2">${f.timeline.slice(-3).map(t=>`<div class="text-xs text-slate-500"><strong>${formatarData(t.data)}</strong> — ${esc(t.descricao)}</div>`).join('')}</div>`:''}
          </div>`).join('')}</div>`}`;
    },

    _abrirModalFisc(id=null) {
      const f = id?(this.state.dados.fiscalizacoes||[]).find(x=>x.id===id):null;
      const bairros = this.state.dados.bairros||[];
      abrirModal(`<div class="p-6 space-y-4">
        <h3 class="font-bold text-slate-800 dark:text-white"><i class="fa-solid fa-magnifying-glass-chart mr-2 text-primary"></i>${f?'Editar Fiscalização':'Nova Fiscalização'}</h3>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
          <div class="col-span-2">${this._campo('fi-nome','Nome do projeto/obra *','text',f?.nome||'',true)}</div>
          <div>${this._campo('fi-sec','Secretaria responsável','text',f?.secretaria||'')}</div>
          <div><label class="block text-xs font-medium text-slate-600 dark:text-slate-400 mb-1">Bairro</label>
            <select id="fi-bairro" class="w-full text-sm rounded-xl border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 text-slate-800 dark:text-white px-3 py-2">
              <option value="">—</option>${bairros.map(b=>`<option value="${esc(b)}" ${f?.bairro===b?'selected':''}>${esc(b)}</option>`).join('')}
            </select></div>
          <div><label class="block text-xs font-medium text-slate-600 dark:text-slate-400 mb-1">Status</label>
            <select id="fi-status" class="w-full text-sm rounded-xl border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 text-slate-800 dark:text-white px-3 py-2">
              ${Object.entries(LABELS.status_fiscalizacao).map(([k,v])=>`<option value="${k}" ${(f?.status||'anunciado')===k?'selected':''}>${v}</option>`).join('')}
            </select></div>
          <div>${this._campo('fi-valor','Valor estimado (R$)','text',f?.valor_estimado||'')}</div>
          <div>${this._campo('fi-prazo','Prazo previsto','date',f?.prazo_previsto||'')}</div>
          <div class="col-span-2"><label class="block text-xs font-medium text-slate-600 dark:text-slate-400 mb-1">Observações</label>
            <textarea id="fi-obs" rows="2" class="w-full text-sm rounded-xl border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 text-slate-800 dark:text-white px-3 py-2 resize-none">${esc(f?.observacoes||'')}</textarea></div>
          ${f?`<div class="col-span-2">${this._campo('fi-upd','Nova atualização (timeline)','text','')}</div>`:''}
        </div>
        ${f?.id ? this._renderAnexos('fiscalizacao', f.id, {
          titulo: 'Anexos',
          subtitulo: 'Fotos da obra, licitações, atas, ofícios e documentos oficiais.'
        }) : ''}
        <div class="flex justify-end gap-2 pt-2">
          <button data-act="a0" class="px-4 py-2 rounded-xl text-sm border border-slate-200 dark:border-slate-600 text-slate-600 cursor-pointer">Cancelar</button>
          <button data-act="d21" data-c0="${esc(id||'')}" class="btn-primary px-5 py-2 rounded-xl text-sm font-semibold cursor-pointer">${f?'Salvar':'Criar'}</button>
        </div></div>`,'max-w-lg');
      renderLucide();
      if (f?.id) App._anxMontar('fiscalizacao', f.id);
    },

    _salvarFisc(id) {
      if (!temPermissao('fiscalizacao', id ? 'editar' : 'criar')) { toast('Sem permiss\u00e3o.','error'); return; }
      const nome = document.getElementById('fi-nome')?.value?.trim();
      if (!nome) { toast('Informe o nome.','error'); return; }
      const antigo = id?(this.state.dados.fiscalizacoes||[]).find(x=>x.id===id):null;
      const timeline = antigo?.timeline||[{data:hoje(),descricao:'Registro criado no sistema.'}];
      const upd = document.getElementById('fi-upd')?.value?.trim();
      if (upd) timeline.push({data:hoje(),descricao:upd});
      const obj = { id:id||gerarUUID(), nome, secretaria:document.getElementById('fi-sec')?.value?.trim()||'', bairro:document.getElementById('fi-bairro')?.value||'', status:document.getElementById('fi-status')?.value||'anunciado', valor_estimado:document.getElementById('fi-valor')?.value?.trim()||'', prazo_previsto:document.getElementById('fi-prazo')?.value||'', observacoes:document.getElementById('fi-obs')?.value||'', timeline, demandas_ids:antigo?.demandas_ids||[] };
      const d = this.state.dados;
      if (id) { const idx=d.fiscalizacoes.findIndex(x=>x.id===id); if(idx>=0) d.fiscalizacoes[idx]=obj; }
      else d.fiscalizacoes.unshift(obj);
      this.salvar(); fecharModal(); this.renderFiscalizacao();
      toast(id?'Fiscalização atualizada!':'Fiscalização criada!','success');
    },

    _excluirFisc(id) { if (!temPermissao('fiscalizacao','excluir')) { toast('Sem permiss\u00e3o.','error'); return; } confirmar('Excluir esta fiscalização?',async ()=>{ this.state.dados.fiscalizacoes=this.state.dados.fiscalizacoes.filter(x=>x.id!==id); this.salvar(); try { await AnexoStore.excluirPorItem('fiscalizacao', id); } catch(e) {} this.renderFiscalizacao(); toast('Fiscalização excluída.','info'); },'danger'); },

    // ════════════════════════════════════════════════════════════
    // MÓDULO 8: DIÁRIO DO MANDATO (#diario)

    _diaCat: '',

    renderDiario() {
      const diario = this.state.dados.diario||[];
      const cat = this._diaCat;
      const lista = diario.filter(e => !cat || e.categoria===cat).sort((a,b)=>b.data.localeCompare(a.data));
      const icones = {reuniao:'fa-handshake text-blue-500',conquista:'fa-trophy text-amber-500',articulacao:'fa-puzzle-piece text-indigo-500',evento:'fa-star text-purple-500',nota:'fa-sticky-note text-slate-400'};

      document.getElementById('conteudo').innerHTML = `
        <div class="flex items-center justify-between mb-6">
          <h2 class="heading-display text-xl text-slate-800 dark:text-white">Diário do Mandato</h2>
          <button data-act="a215" class="btn-primary px-5 py-2.5 rounded-xl text-sm font-semibold flex items-center gap-2 cursor-pointer"><i class="fa-solid fa-plus text-xs"></i>Nova Entrada</button>
        </div>
        <div class="flex gap-2 mb-5 flex-wrap">
          ${['',  ...Object.keys(LABELS.categoria_diario)].map(s => `
            <button data-act="a216" data-c0="${esc(s)}" class="px-3 py-1.5 rounded-full text-xs font-medium border cursor-pointer ${(App._diaCat||'')===s?'bg-primary text-white border-transparent':'border-slate-200 dark:border-slate-600 text-slate-500 hover:border-slate-300'}">

            </button>`).join('')}
        </div>
        ${lista.length===0?'<div class="flex flex-col items-center py-16 text-slate-400 gap-3"><i class="fa-solid fa-book text-4xl"></i><p class="text-sm">Nenhuma entrada no diário.</p></div>':
        `<div class="space-y-3">${lista.map(e => `
          <div class="bg-white dark:bg-slate-800 rounded-2xl border border-slate-100 dark:border-slate-700/50 p-5 shadow-card">
            <div class="flex items-start gap-3">
              <div class="w-9 h-9 rounded-xl bg-slate-50 dark:bg-slate-700 flex items-center justify-center flex-shrink-0">
                <i class="fa-solid ${icones[e.categoria]||'fa-sticky-note text-slate-400'} text-sm"></i>
              </div>
              <div class="flex-1">
                <div class="flex items-start justify-between">
                  <div><p class="font-semibold text-slate-800 dark:text-white text-sm">${esc(e.titulo)}</p><p class="text-[11px] text-slate-400">${formatarData(e.data)} · ${LABELS.categoria_diario[e.categoria]||e.categoria}${e.assessor?' · '+esc(e.assessor):''}</p></div>
                  <div class="flex gap-1">
                    <button data-act="a217" data-c0="${esc(e.id)}" class="w-9 h-9 rounded-lg flex items-center justify-center text-slate-400 hover:text-primary cursor-pointer"><i class="fa-solid fa-pen text-xs"></i></button>
                    <button data-act="a218" data-c0="${esc(e.id)}" class="w-9 h-9 rounded-lg flex items-center justify-center text-slate-400 hover:text-red-500 cursor-pointer"><i class="fa-solid fa-trash text-xs"></i></button>
                  </div>
                </div>
                ${e.descricao?`<p class="text-sm text-slate-600 dark:text-slate-300 mt-2 whitespace-pre-wrap">${esc(e.descricao)}</p>`:''}
              </div>
            </div>
          </div>`).join('')}</div>`}`;
    },

    _abrirModalDiario(id=null) {
      const e = id?(this.state.dados.diario||[]).find(x=>x.id===id):null;
      const assessores = this.state.dados.assessores||[];
      abrirModal(`<div class="p-6 space-y-4">

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
          <div class="col-span-2">${this._campo('di-titulo','Título *','text',e?.titulo||'',true)}</div>
          <div>${this._campo('di-data','Data','date',e?.data||hoje())}</div>
          <div><label class="block text-xs font-medium text-slate-600 dark:text-slate-400 mb-1">Categoria</label>
            <select id="di-cat" class="w-full text-sm rounded-xl border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 text-slate-800 dark:text-white px-3 py-2">
              ${Object.entries(LABELS.categoria_diario).map(([k,v])=>`<option value="${k}" ${(e?.categoria||'nota')===k?'selected':''}>${v}</option>`).join('')}

            <textarea id="di-desc" rows="4" class="w-full text-sm rounded-xl border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 text-slate-800 dark:text-white px-3 py-2 resize-none">${esc(e?.descricao||'')}</textarea></div>
          <div><label class="block text-xs font-medium text-slate-600 dark:text-slate-400 mb-1">Registrado por</label>

              <option value="">—</option>${assessores.map(a=>`<option value="${esc(a.nome)}" ${e?.assessor===a.nome?'selected':''}>${esc(a.nome)}</option>`).join('')}

        ${e?.id ? this._renderAnexos('diario', e.id, {

          accept: 'image/*,video/*'

        <div class="flex justify-end gap-2 pt-2">

          <button data-act="d22" data-c0="${esc(id||'')}" class="btn-primary px-5 py-2 rounded-xl text-sm font-semibold cursor-pointer">${e?'Salvar':'Criar'}</button>
        </div></div>`,'max-w-md');
      renderLucide();
      if (e?.id) App._anxMontar('diario', e.id);
    },

    _salvarDiario(id) {
      if (!temPermissao('diario', id ? 'editar' : 'criar')) { toast('Sem permiss\u00e3o.','error'); return; }
      const titulo = document.getElementById('di-titulo')?.value?.trim();
      if (!titulo) { toast('Informe o título.','error'); return; }
      const obj = { id:id||gerarUUID(), titulo, data:document.getElementById('di-data')?.value||hoje(), categoria:document.getElementById('di-cat')?.value||'nota', descricao:document.getElementById('di-desc')?.value||'', assessor:document.getElementById('di-ass')?.value||'' };
      const d = this.state.dados;
      if (id) { const idx=d.diario.findIndex(x=>x.id===id); if(idx>=0) d.diario[idx]=obj; }
      else d.diario.unshift(obj);
      this.salvar(); fecharModal(); this.renderDiario();
      toast(id?'Entrada atualizada!':'Entrada criada!','success');

    _excluirDiario(id) { if (!temPermissao('diario','excluir')) { toast('Sem permiss\u00e3o.','error'); return; } confirmar('Excluir esta entrada?',async ()=>{ this.state.dados.diario=this.state.dados.diario.filter(x=>x.id!==id); this.salvar(); try { await AnexoStore.excluirPorItem('diario', id); } catch(e) {} this.renderDiario(); toast('Entrada excluída.','info'); },'danger'); },

    // ════════════════════════════════════════════════════════════
    // MÓDULO 9: INDICADORES POR BAIRRO (#indicadores)
    // ════════════════════════════════════════════════════════════

    renderIndicadores() {
      const d = this.state.dados;
      const bairros = d.bairros||[];
      const demandas = d.demandas||[];
      const fiscalizacoes = d.fiscalizacoes||[];
      const agenda = d.agenda||[];

      const stats = bairros.map(b => {
        const dem = demandas.filter(x=>x.bairro===b);
        const res = dem.filter(x=>x.status==='resolvido').length;
        const obras = fiscalizacoes.filter(x=>x.bairro===b).length;
        const visitas = agenda.filter(x=>x.tipo==='Visita a Bairro'&&(x.local||'').toLowerCase().includes(b.toLowerCase())).length;
        return { nome:b, total:dem.length, resolvidas:res, pendentes:dem.length-res, taxa:dem.length?Math.round(res/dem.length*100):0, obras, visitas };
      }).sort((a,b)=>b.total-a.total);

      document.getElementById('conteudo').innerHTML = `
        <h2 class="heading-display text-xl text-slate-800 dark:text-white mb-6">Indicadores por Bairro</h2>
        ${stats.length===0?'<p class="text-sm text-slate-400 text-center py-16">Nenhum bairro cadastrado.</p>':
        `<div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
          ${stats.map(s => `
            <div class="bg-white dark:bg-slate-800 rounded-2xl border border-slate-100 dark:border-slate-700/50 p-5 shadow-card card-hover cursor-pointer" data-act="a219" data-c0="${esc(s.nome)}">
              <div class="flex items-center justify-between mb-3">
                <p class="font-semibold text-slate-800 dark:text-white text-sm">${esc(s.nome)}</p>
                <span class="text-xs font-bold ${s.taxa>=70?'text-emerald-600':s.taxa>=40?'text-amber-600':'text-red-500'}">${s.taxa}%</span>
              </div>
              <div class="h-2 bg-slate-100 dark:bg-slate-700 rounded-full mb-3">
                <div class="h-2 rounded-full ${s.taxa>=70?'bg-emerald-500':s.taxa>=40?'bg-amber-500':'bg-red-500'}" style="width:${s.taxa}%"></div>
              </div>
              <div class="grid grid-cols-4 gap-2 text-center text-xs">
                <div><p class="font-bold text-slate-800 dark:text-white">${s.total}</p><p class="text-slate-400">Total</p></div>
                <div><p class="font-bold text-emerald-600">${s.resolvidas}</p><p class="text-slate-400">Resolv.</p></div>
                <div><p class="font-bold text-slate-800 dark:text-white">${s.obras}</p><p class="text-slate-400">Obras</p></div>
                <div><p class="font-bold text-slate-800 dark:text-white">${s.visitas}</p><p class="text-slate-400">Visitas</p></div>
              </div>
            </div>`).join('')}
        </div>`}`;
    },

    _detalharBairro(nome) {
      const d = this.state.dados;
      const dem = (d.demandas||[]).filter(x=>x.bairro===nome);
      const fisc = (d.fiscalizacoes||[]).filter(x=>x.bairro===nome);
      abrirModal(`<div class="p-6 space-y-4">
        <h3 class="font-bold text-slate-800 dark:text-white"><i class="fa-solid fa-map-pin mr-2 text-primary"></i>${esc(nome)}</h3>
        <div class="grid grid-cols-3 gap-3 text-center">
          <div class="bg-slate-50 dark:bg-slate-700 rounded-xl p-3"><p class="text-2xl font-bold text-slate-800 dark:text-white">${dem.length}</p><p class="text-xs text-slate-400">Demandas</p></div>
          <div class="bg-slate-50 dark:bg-slate-700 rounded-xl p-3"><p class="text-2xl font-bold text-emerald-600">${dem.filter(x=>x.status==='resolvido').length}</p><p class="text-xs text-slate-400">Resolvidas</p></div>
          <div class="bg-slate-50 dark:bg-slate-700 rounded-xl p-3"><p class="text-2xl font-bold text-slate-800 dark:text-white">${fisc.length}</p><p class="text-xs text-slate-400">Fiscalizações</p></div>
        </div>
        ${dem.length?`<div><p class="text-xs font-semibold text-slate-400 uppercase mb-2">Demandas</p><div class="space-y-1 max-h-48 overflow-y-auto">${dem.map(x=>`<div class="flex justify-between text-xs p-2 border-b border-slate-50 dark:border-slate-700"><span class="text-slate-600 dark:text-slate-300">${esc(x.protocolo)} — ${esc(x.nome_morador)}</span><span class="badge badge-${x.status} text-[10px]">${(LABELS.status_demanda[x.status]||'').replace(/^[^a-zA-Z]*/,'')}</span></div>`).join('')}</div></div>`:''}
        <div class="flex justify-end"><button data-act="a0" class="px-4 py-2 rounded-xl text-sm border border-slate-200 dark:border-slate-600 text-slate-600 cursor-pointer">Fechar</button></div>
      </div>`,'max-w-lg');
    },

        document.getElementById('conteudo').innerHTML = `

            <button data-act="a220"
                    class="btn-primary px-4 py-2.5 rounded-xl text-sm font-semibold
                           flex items-center gap-2 cursor-pointer">
              <i class="fa-solid fa-user-plus"></i> Novo Usu&aacute;rio
            </button>
          </div>

          <!-- Lista de usuários -->
          <div class="space-y-3">
            ${usuarios.map(u => `
              <div class="bg-white dark:bg-slate-800 rounded-2xl border

    // Salvar usuário (criar ou editar)
    _salvarUsuario(id) {
      if (!isAdmin()) { toast('Acesso restrito.','error'); return; }
      const nome  = document.getElementById('usr-nome')?.value?.trim();
      const login = (document.getElementById('usr-login')?.value?.trim() || '').toLowerCase();
      const senha = document.getElementById('usr-senha')?.value || '';

      if (!nome || !login) {
        toast('Preencha nome e login.', 'error');
        return;
      }
      if (login.length < 3) {
        toast('Login deve ter pelo menos 3 caracteres.', 'error');
        return;
      }

      const usuarios = this.state.dados.usuarios || [];
      const isNovo = !id;

      // Validação de login único (case-insensitive)
      const loginDuplicado = usuarios.find(u =>
        u.login.toLowerCase() === login && u.id !== id
      );
      if (loginDuplicado) {
        toast('J\u00e1 existe um usu\u00e1rio com este login.', 'error');
        return;
      }

      if (isNovo) {
        if (!senha || senha.length < 4) {
          toast('Defina uma senha com pelo menos 4 caracteres.', 'error');
          return;
        }
        const novo = {
          id:         gerarUUID(),
          nome,
          login,
          senha_hash: hashSenha(senha),
          tipo:       'assessor',
          ativo:      true,
          permissoes: window._tmpPermissoes || PERFIS_PERMISSAO.apenas_visualizacao.gerar(),
          criado_em:  new Date().toISOString(),
        };
        this.state.dados.usuarios.push(novo);
        registrarLog('criar_usuario', 'usuarios', `Usu\u00e1rio "${nome}" criado`, novo.id);
        toast(`Usu\u00e1rio "${esc(nome)}" criado com sucesso!`, 'success');
      } else {
        const idx = usuarios.findIndex(u => u.id === id);
        if (idx < 0) return;
        const anterior = usuarios[idx];
        anterior.nome       = nome;
        anterior.login      = login;
        anterior.permissoes = window._tmpPermissoes || anterior.permissoes;
        if (senha && senha.length >= 4) {
          anterior.senha_hash = hashSenha(senha);
        }
        registrarLog('editar_usuario', 'usuarios', `Usu\u00e1rio "${nome}" atualizado`, id);
        toast(`Usu\u00e1rio "${esc(nome)}" atualizado!`, 'success');
      }

      this.salvar();
      fecharModal();
      this.renderUsuarios();
    },

    // Ativar/desativar usuário
    _toggleAtivoUsuario(id) {
      if (!isAdmin()) { toast('Acesso restrito.','error'); return; }
      const u = (this.state.dados.usuarios || []).find(x => x.id === id);
      if (!u || u.tipo === 'vereador') return;
      const acao = u.ativo ? 'desativar' : 'ativar';
      confirmar(
        `Deseja ${acao} o usu\u00e1rio <strong>${esc(u.nome)}</strong>?`,
        () => {
          u.ativo = !u.ativo;
          registrarLog(`${acao}_usuario`, 'usuarios', `Usu\u00e1rio "${u.nome}" ${acao === 'desativar' ? 'desativado' : 'ativado'}`, id);
          this.salvar();
          this.renderUsuarios();
          toast(`Usu\u00e1rio ${acao === 'desativar' ? 'desativado' : 'ativado'}.`, 'info');
        },
        acao === 'desativar' ? 'danger' : 'primary'
      );
    },

    // Excluir usuário (confirmação dupla)
    _excluirUsuario(id) {
      if (!isAdmin()) { toast('Acesso restrito.','error'); return; }
      const u = (this.state.dados.usuarios || []).find(x => x.id === id);
      if (!u || u.tipo === 'vereador') return;
      confirmar(
        `\u26a0\ufe0f Deseja <strong>excluir permanentemente</strong> o usu\u00e1rio <strong>${esc(u.nome)}</strong>?<br><br>Esta a\u00e7\u00e3o n\u00e3o pode ser desfeita. Considere <em>desativar</em> em vez de excluir.`,
        () => {
          // Segunda confirmação
          confirmar(
            `Confirma\u00e7\u00e3o final: excluir <strong>${esc(u.nome)}</strong> permanentemente?`,
            () => {
              this.state.dados.usuarios = this.state.dados.usuarios.filter(x => x.id !== id);
              registrarLog('excluir_usuario', 'usuarios', `Usu\u00e1rio "${u.nome}" exclu\u00eddo`, id);
              this.salvar();
              this.renderUsuarios();
              toast('Usu\u00e1rio exclu\u00eddo permanentemente.', 'info');
            },
            'danger'
          );
        },
        'danger'
      );
    },
