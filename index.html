    // Salva nova demanda ou atualiza existente
    _salvarDemanda(id) {
      if (!temPermissao('demandas', id ? 'editar' : 'criar')) { toast('Sem permiss\u00e3o.','error'); return; }
      const v = (sel) => document.getElementById(sel)?.value?.trim() || '';
      const nome     = v('dem-nome_morador');
      const bairro   = v('dem-bairro');
      const descricao= v('dem-descricao');
      const area     = v('dem-area');
      const status   = v('dem-status');
      const prioridade = v('dem-prioridade');

      if (!nome || !bairro || !descricao || !area || !status || !prioridade) {
        toast('Preencha os campos obrigatórios (*)', 'error');
        return;
      }

      const acoes = Array.from(
        document.querySelectorAll('input[name="dem-acao"]:checked')
      ).map(el => el.value);

      const dados  = this.state.dados;
      const isNovo = !id;

      if (isNovo) {
        // Gera protocolo sequencial
        dados.contadores.demandas = (dados.contadores.demandas || 0) + 1;
        const protocolo = `${new Date().getFullYear()}-${String(dados.contadores.demandas).padStart(4,'0')}`;

        const nova = {
          id:                  gerarUUID(),
          protocolo,
          nome_morador:        nome,
          bairro:              v('dem-bairro'),
          telefone:            v('dem-telefone'),
          email:               v('dem-email'),
          data_abertura:       hoje(),
          descricao,
          area,
          orgao_responsavel:   v('dem-orgao'),
          prioridade,
          acoes,
          assessor_id:         v('dem-assessor'),
          observacoes_internas:v('dem-obs'),
          status,
          cidadao_id:          v('dem-cid-id') || null,
          historico: [{
            data:      new Date().toISOString(),
            descricao: 'Demanda registrada.',
            autor:     this.state.usuario_logado?.nome || this.state.meta.nome_vereador,
          }],
        };
        dados.demandas.unshift(nova);
        registrarLog('criar_demanda', 'demandas', `Demanda ${protocolo} criada`, nova.id);
        toast(`Demanda ${protocolo} criada!`, 'success');
      } else {
        const idx = dados.demandas.findIndex(x => x.id === id);
        if (idx < 0) return;
        const anterior = dados.demandas[idx];
        const mudancas = [];

        if (anterior.status !== status)
          mudancas.push(`Status alterado para "${LABELS.status_demanda[status] || status}"`);
        if (anterior.prioridade !== prioridade)
          mudancas.push(`Prioridade alterada para "${LABELS.prioridade[prioridade] || prioridade}"`);

        dados.demandas[idx] = {
          ...anterior,
          nome_morador:        nome,
          bairro:              v('dem-bairro'),
          telefone:            v('dem-telefone'),
          email:               v('dem-email'),
          descricao,
          area,
          orgao_responsavel:   v('dem-orgao'),
          prioridade,
          acoes,
          assessor_id:         v('dem-assessor'),
          observacoes_internas:v('dem-obs'),
          status,
          cidadao_id:          v('dem-cid-id') || anterior.cidadao_id || null,
          historico: [
            ...(anterior.historico || []),
            ...(mudancas.length ? [{
              data:      new Date().toISOString(),
              descricao: mudancas.join(' | '),
              autor:     this.state.usuario_logado?.nome || this.state.meta.nome_vereador,
            }] : []),
          ],
        };
        registrarLog('editar_demanda', 'demandas', `Demanda ${anterior.protocolo} atualizada`, id);
        toast('Demanda atualizada!', 'success');
      }

      this.salvar();
      fecharModal();
      this._demRefresh();
    },

                      const total = TAREFAS_KEYS.length;
                      const feitas = TAREFAS_KEYS.filter(k => c.tarefas?.[k]).length;
                      const pct = Math.round((feitas/total)*100);
                      return `

    _salvarChecklist() {
      if (!temPermissao('checklist','criar')) { toast('Sem permiss\u00e3o.','error'); return; }
      const assessor_id = document.getElementById('ck-assessor')?.value;
      if (!assessor_id) { toast('Selecione o(a) assessor(a).', 'error'); return; }

      const TAREFAS_KEYS = ['mensagens','demandas','atualizacoes',
                            'informou_vereador','acompanhou_antiga','prazos','agenda'];
      const tarefas = {};
      TAREFAS_KEYS.forEach(k => {
        tarefas[k] = document.getElementById(`ck-${k}`)?.checked || false;
      });

      const novo = {
        id:           gerarUUID(),
        data:         hoje(),
        assessor_id,
        hora_entrada: document.getElementById('ck-entrada')?.value || '',
        hora_saida:   document.getElementById('ck-saida')?.value   || '',
        modalidade:   document.getElementById('ck-modalidade')?.value || 'presencial',
        tarefas,
        observacoes:    document.getElementById('ck-obs')?.value   || '',
        intercorrencias:document.getElementById('ck-inter')?.value || '',
      };

      this.state.dados.checklists.push(novo);
      this.salvar();
      toast('Checklist registrado!', 'success');
      this.renderChecklist();
    },

    _excluirChecklist(id) {
      if (!temPermissao('checklist','excluir')) { toast('Sem permiss\u00e3o.','error'); return; }
      confirmar('Excluir este registro de checklist?', () => {
        this.state.dados.checklists = this.state.dados.checklists.filter(c => c.id !== id);
        this.salvar();
        this.renderChecklist();
        toast('Registro excluído.', 'info');
      }, 'danger');
    },

                  <!-- Incremento rápido -->

                    <button data-act="a49" data-c0="${esc(m.id)}"

                                   hover:bg-slate-50 dark:hover:bg-slate-700 font-bold text-sm">
                      −

                    <input type="number" value="${m.progresso}" min="0"

    _filtroMetas: '',

    _incrementarMeta(id, delta) {
      const m = (this.state.dados.metas||[]).find(x => x.id === id);
      if (!m) return;
      m.progresso = Math.max(0, Math.min(m.meta_numerica, (m.progresso||0) + delta));
      if (m.progresso >= m.meta_numerica) m.status = 'concluida';
      else if (m.progresso > 0 && m.status === 'nao_iniciada') m.status = 'em_progresso';
      this.salvar();
      this.renderMetas();
    },

    _setProgressoMeta(id, val) {
      const m = (this.state.dados.metas||[]).find(x => x.id === id);
      if (!m) return;
      m.progresso = Math.max(0, Math.min(m.meta_numerica, val||0));
      if (m.progresso >= m.meta_numerica) m.status = 'concluida';
      else if (m.progresso > 0 && m.status === 'nao_iniciada') m.status = 'em_progresso';
      this.salvar();
      this.renderMetas();
    },

    _excluirMeta(id) {
      if (!temPermissao('metas','excluir')) { toast('Sem permiss\u00e3o.','error'); return; }
      confirmar('Excluir esta meta permanentemente?', () => {
        this.state.dados.metas = this.state.dados.metas.filter(m => m.id !== id);
        this.salvar();
        this.renderMetas();
        toast('Meta excluída.', 'info');
      }, 'danger');
    },

                      class="w-full text-sm rounded-lg border border-slate-200
                             dark:border-slate-600 bg-slate-50 dark:bg-slate-700
                             text-slate-800 dark:text-white px-3 py-2
                             focus:outline-none focus:ring-2 ring-primary">
                ${LABELS.meta_categoria.map(c =>
                  `<option ${m?.categoria===c?'selected':''}>${c}</option>`).join('')}
              </select>
            </div>
            <div>
              <label class="block text-xs font-medium text-slate-600 dark:text-slate-400 mb-1">

          <div>

              Responsável</label>
            <select id="mt-resp"
                    class="w-full text-sm rounded-lg border border-slate-200
                           dark:border-slate-600 bg-slate-50 dark:bg-slate-700

              <option value="">—</option>
              ${assessores.map(a =>

          <div class="flex justify-end gap-2 pt-2">

    _salvarMeta(id) {
      if (!temPermissao('metas', id ? 'editar' : 'criar')) { toast('Sem permiss\u00e3o.','error'); return; }
      const titulo = document.getElementById('mt-titulo')?.value?.trim();
      const meta_n = parseFloat(document.getElementById('mt-meta')?.value) || 0;
      if (!titulo || !meta_n) { toast('Preencha título e meta numérica.', 'error'); return; }
      const obj = {
        id:            id || gerarUUID(),
        titulo,
        categoria:     document.getElementById('mt-categoria')?.value || '',
        status:        document.getElementById('mt-status')?.value    || 'nao_iniciada',
        meta_numerica: meta_n,
        progresso:     parseFloat(document.getElementById('mt-prog')?.value) || 0,
        data_inicio:   document.getElementById('mt-inicio')?.value || hoje(),
        prazo:         document.getElementById('mt-prazo')?.value  || '',
        responsavel_id:document.getElementById('mt-resp')?.value   || '',
        descricao:     document.getElementById('mt-desc')?.value   || '',
      };
      if (id) {
        const idx = this.state.dados.metas.findIndex(m => m.id === id);
        if (idx >= 0) this.state.dados.metas[idx] = obj;
      } else {
        this.state.dados.metas.push(obj);
      }
      this.salvar();
      fecharModal();
      this.renderMetas();
      toast(id ? 'Meta atualizada!' : 'Meta criada!', 'success');
    },

      document.getElementById('conteudo').innerHTML = `

                           hover:bg-slate-50 dark:hover:bg-slate-700">

            </button>

      `;

      if (view === 'lista') this._renderAgendaLista();

    _renderAgendaLista() {
      const agenda = this.state.dados.agenda || [];
      const hj     = hoje();
      // Próximos 60 dias
      const limite = new Date(); limite.setDate(limite.getDate() + 60);
      const limiteStr = dataLocal(limite);

      const proximos = agenda
        .filter(e => e.data >= hj && e.data <= limiteStr)
        .sort((a,b) => a.data.localeCompare(b.data) || a.hora_inicio.localeCompare(b.hora_inicio));
      const passados = agenda
        .filter(e => e.data < hj)
        .sort((a,b) => b.data.localeCompare(a.data));

      const renderLista = (eventos, vazio) => {
        if (!eventos.length) return `<p class="text-sm text-slate-400 py-4">${vazio}</p>`;
        let ultimo = '';
        return eventos.map(e => {
          const isHoje   = e.data === hj;
          const dataLabel = isHoje ? 'Hoje' : formatarData(e.data);
          let header = '';
          if (e.data !== ultimo) {
            header = `<div class="text-xs font-bold text-slate-500 dark:text-slate-400
                                  uppercase tracking-wide mt-3 mb-1
                                  ${isHoje ? 'text-primary' : ''}">
                        ${dataLabel}
                      </div>`;
            ultimo = e.data;

          const icone = {

    _renderAgendaCalendario() {
      const agenda = this.state.dados.agenda || [];
      const mes    = this._agendaMes;
      const ano    = mes.getFullYear();
      const mesN   = mes.getMonth();
      const hj     = hoje();

      const nomeMes = mes.toLocaleDateString('pt-BR',{month:'long', year:'numeric'});
      const primeiro = new Date(ano, mesN, 1);
      const ultimo   = new Date(ano, mesN+1, 0);
      const inicioGrid = new Date(primeiro);
      inicioGrid.setDate(inicioGrid.getDate() - inicioGrid.getDay()); // domingo

      // Mapa: data -> eventos
      const mapa = {};
      agenda.forEach(e => { (mapa[e.data] = mapa[e.data]||[]).push(e); });

      let diasHtml = '';
      const cur = new Date(inicioGrid);
      for (let i = 0; i < 42; i++) {
        const ds   = dataLocal(cur);
        const dMes = cur.getMonth() === mesN;
        const isHj = ds === hj;
        const evs  = mapa[ds] || [];
        diasHtml += `
          <div data-act="a58" data-c0="${esc(ds)}" title="Tocar para criar um compromisso neste dia"
               class="min-h-16 p-1 border-b border-r border-slate-100 dark:border-slate-700 cursor-pointer hover:bg-primary-lt/40
                      ${dMes ? 'bg-white dark:bg-slate-800' : 'bg-slate-50 dark:bg-slate-900/50'}
                      ${isHj ? 'ring-2 ring-inset ring-primary' : ''}">
            <div class="text-xs font-medium mb-1 text-right
                        ${isHj ? 'text-primary font-bold' : dMes ? 'text-slate-600 dark:text-slate-300' : 'text-slate-300 dark:text-slate-600'}">
              ${cur.getDate()}
            </div>
            ${evs.slice(0,2).map(e => `
              <div data-act="a59" data-c0="${esc(e.id)}"
                   class="text-xs rounded px-1 py-0.5 mb-0.5 cursor-pointer truncate
                          bg-primary-lt text-primary hover:opacity-80">
                ${esc(e.hora_inicio)} ${esc(e.titulo)}
              </div>`).join('')}
            ${evs.length > 2 ? `<div class="text-xs text-slate-400">+${evs.length-2}</div>` : ''}
          </div>`;
        cur.setDate(cur.getDate()+1);
      }

      document.getElementById('agenda-conteudo').innerHTML = `
        <div class="bg-white dark:bg-slate-800 rounded-xl border
                    border-slate-200 dark:border-slate-700 overflow-hidden">
          <!-- Navegação do mês -->
          <div class="flex items-center justify-between px-4 py-3 border-b
                      border-slate-100 dark:border-slate-700">
            <button data-act="a60"
                    class="w-8 h-8 rounded-lg flex items-center justify-center
                           text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-700">
              <i class="fa-solid fa-chevron-left text-sm"></i>
            </button>
            <h3 class="font-semibold text-slate-700 dark:text-slate-200 capitalize">${nomeMes}</h3>
            <button data-act="a61"
                    class="w-8 h-8 rounded-lg flex items-center justify-center
                           text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-700">
              <i class="fa-solid fa-chevron-right text-sm"></i>
            </button>
          </div>
          <!-- Header dias da semana -->
          <div class="grid grid-cols-7 border-b border-slate-100 dark:border-slate-700">
            ${['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'].map(d =>
              `<div class="text-center text-xs font-semibold text-slate-400 py-2">${d}</div>`
            ).join('')}
          </div>
          <!-- Grid de dias -->
          <div class="grid grid-cols-7">${diasHtml}</div>

    _salvarAgenda(id) {
      const titulo = document.getElementById('ag-titulo')?.value?.trim();
      const data   = document.getElementById('ag-data')?.value;
      if (!titulo || !data) { toast('Preencha título e data.', 'error'); return; }
      const obj = {
        id:         id || gerarUUID(),
        titulo,
        data,
        hora_inicio:document.getElementById('ag-inicio')?.value||'',
        hora_fim:   document.getElementById('ag-fim')?.value||'',
        local:      document.getElementById('ag-local')?.value?.trim()||'',
        tipo:       document.getElementById('ag-tipo')?.value||'Outro',
        descricao:  document.getElementById('ag-desc')?.value||'',
      };
      if (id) {
        const idx = this.state.dados.agenda.findIndex(x => x.id === id);
        if (idx >= 0) this.state.dados.agenda[idx] = obj;
      } else {
        this.state.dados.agenda.push(obj);
      }
      this.salvar();
      fecharModal();
      this.renderAgenda();
      toast(id ? 'Compromisso atualizado!' : 'Compromisso criado!', 'success');
    },

    _excluirAgenda(id) {
      confirmar('Excluir este compromisso?', () => {
        this.state.dados.agenda = this.state.dados.agenda.filter(x => x.id !== id);
        this.salvar();
        this.renderAgenda();
        toast('Compromisso excluído.', 'info');
      }, 'danger');
    },

    _imprimirAgendaSemana() {
      const agenda = this.state.dados.agenda || [];
      const meta   = this.state.meta;
      // Semana atual: domingo a sábado
      const ini = new Date(); ini.setDate(ini.getDate() - ini.getDay());
      const fim = new Date(ini); fim.setDate(fim.getDate() + 6);
      const iniStr = dataLocal(ini);
      const fimStr = dataLocal(fim);
      const semana = agenda
        .filter(e => e.data >= iniStr && e.data <= fimStr)
        .sort((a,b) => a.data.localeCompare(b.data)||a.hora_inicio.localeCompare(b.hora_inicio));

      const html = `
        <div style="font-family:Arial,sans-serif;max-width:680px;margin:0 auto;color:#111">
          <div style="border-bottom:2px solid #333;padding-bottom:10px;margin-bottom:16px">
            <div style="font-size:17px;font-weight:bold">
              ${esc(meta.cargo)} ${esc(meta.nome_vereador)} — Agenda da Semana
            </div>
            <div style="font-size:12px;color:#555">
              ${formatarData(iniStr)} a ${formatarData(fimStr)} ·
              ${esc(meta.cidade)}/${esc(meta.estado)}
            </div>
          </div>
          ${semana.length === 0
            ? '<p style="color:#888">Nenhum compromisso nesta semana.</p>'
            : semana.map(e => `
              <div style="border-left:4px solid #2563eb;padding:8px 12px;
                          margin-bottom:10px;background:#f8faff">
                <div style="font-weight:bold;font-size:14px">${esc(e.titulo)}</div>
                <div style="font-size:12px;color:#555">
                  ${formatarData(e.data)} · ${esc(e.hora_inicio)}${e.hora_fim?' – '+esc(e.hora_fim):''}
                  · ${esc(e.tipo)}${e.local?' · '+esc(e.local):''}
                </div>
                ${e.descricao ? `<div style="font-size:12px;color:#666;margin-top:3px">
                  ${esc(e.descricao)}</div>` : ''}
              </div>`).join('')}
        </div>`;
      const agendaHtml = `<!DOCTYPE html><html><head><title>Agenda da Semana</title>
        <style>@media print{body{margin:0}} body{margin:20px}</style>
        </head><body>${html}</body></html>`;
      const agendaBlob = new Blob([agendaHtml], { type: 'text/html' });
      const agendaUrl = URL.createObjectURL(agendaBlob);
      const win = window.open(agendaUrl, '_blank', 'width=760,height=800');
      if (!win) { URL.revokeObjectURL(agendaUrl); toast('Permita pop-ups para imprimir a agenda.', 'error', 5000); return; }
      setTimeout(() => { try { win.print(); } catch (e) {} URL.revokeObjectURL(agendaUrl); }, 600);
    },

        return true;

    async _exportarOficiosLote() {
      const ids = Array.from(document.querySelectorAll('.of-lote-check:checked')).map(cb => cb.dataset.id);
      if (!ids.length) return;
      const itens = (this.state.dados.oficios || []).filter(o => ids.includes(o.id));
      if (!itens.length) { toast('Nada a exportar.', 'warning'); return; }
      await this._exportarDocxComTemplate('oficio', async (tplId) => {
        try {
          toast(`Gerando ${itens.length} arquivo${itens.length !== 1 ? 's' : ''}…`, 'info', 2500);
          const blob = await Templates.gerarLote('oficio', itens, tplId);
          const nomeZip = `oficios-lote-${hoje()}.zip`;
          if (typeof window.saveAs === 'function') window.saveAs(blob, nomeZip);
          else {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = nomeZip;
            document.body.appendChild(a); a.click(); a.remove();
            setTimeout(() => URL.revokeObjectURL(url), 2000);
          }
          registrarLog('export_docx', 'oficios', `Exportados ${itens.length} ofícios em ${nomeZip}`);
          toast('Arquivo .zip baixado.', 'success');
        } catch (e) {
          console.warn('[Lote]', e);
          toast(`Falha: ${e.message || e}`, 'error');
        }
      });
    },

    _salvarOficio(id) {
      if (!temPermissao('oficios', id ? 'editar' : 'criar')) { toast('Sem permiss\u00e3o.','error'); return; }
      const dest   = document.getElementById('of-dest')?.value?.trim();
      const assunto= document.getElementById('of-assunto')?.value?.trim();
      const data   = document.getElementById('of-data')?.value;
      if (!dest || !assunto || !data) {
        toast('Preencha destinatário, assunto e data.', 'error'); return;
      }
      const dados = this.state.dados;
      if (!id) {
        dados.contadores.oficios = (dados.contadores.oficios||0) + 1;
      }
      const numero = id
        ? (dados.oficios.find(o=>o.id===id)?.numero || '')
        : `OF-${new Date().getFullYear()}-${String(dados.contadores.oficios).padStart(3,'0')}`;

      const obj = {
        id:                 id || gerarUUID(),
        numero,
        data_emissao:       data,
        destinatario:       dest,
        orgao_destinatario: document.getElementById('of-orgao')?.value?.trim()||'',
        assunto,
        demanda_protocolo:  document.getElementById('of-demanda')?.value||'',
        status:             document.getElementById('of-status')?.value||'enviado',
        data_resposta:      document.getElementById('of-resposta')?.value||'',
        observacoes:        document.getElementById('of-obs')?.value||'',
      };

      if (id) {
        const idx = dados.oficios.findIndex(o=>o.id===id);
        if (idx>=0) dados.oficios[idx] = obj;
      } else {
        dados.oficios.unshift(obj);
      }
      this.salvar();
      fecharModal();
      this.renderOficios();
      toast(id ? 'Ofício atualizado!' : `Ofício ${numero} criado!`, 'success');
    },

    _excluirOficio(id) {
      if (!temPermissao('oficios','excluir')) { toast('Sem permiss\u00e3o.','error'); return; }
      confirmar('Excluir este ofício permanentemente?', async () => {
        this.state.dados.oficios = this.state.dados.oficios.filter(o=>o.id!==id);
        this.salvar();
        try { await AnexoStore.excluirPorItem('oficio', id); } catch(e) {}
        this.renderOficios();
        toast('Ofício excluído.', 'info');
      }, 'danger');
    },

        ddd_padrao: dddEl ? (dddEl.value || '').replace(/\D/g, '').slice(0, 3) : (comunicacaoAtual.ddd_padrao || ''),
        rodape_opt_out: rodapeEl ? !!rodapeEl.checked : !!comunicacaoAtual.rodape_opt_out,
      };
      this.state.dados.configuracoes = {
        ...this.state.dados.configuracoes, partido, mandato, tema, comunicacao,
      };
      // Remove campo legado 'cor' quando já migramos
      delete this.state.dados.configuracoes.cor;
      aplicarTema(tema);
      this.salvar();
      // Atualiza sidebar
      this.renderLayout();
      this.renderConfiguracoes();
      toast('Configurações salvas.', 'success');
    },

    _cfgTrocarFoto(event) {
      const file = event.target.files[0];
      if (!file) return;
      if (file.size > 2*1024*1024) { toast('Máximo 2MB.','error'); return; }
      const reader = new FileReader();
      reader.onload = (e) => {
        const b64 = e.target.result;
        this.state.dados.configuracoes.foto_base64 = b64;
        App._fotoprevCache = b64; // mantém em memória de sessão
        Storage.salvarFoto(this.state.uuid, b64, this.state.senha);
        this.salvar();
        this.renderLayout();
        this._cfgDados();
        toast('Foto atualizada!', 'success');
      };
      reader.readAsDataURL(file);
    },

      const novo = {
        id:       id || gerarUUID(),
        nome,
        funcao:   document.getElementById('eq-funcao')?.value?.trim()||'',
        telefone: document.getElementById('eq-tel')?.value?.trim()||'',
        email:    document.getElementById('eq-email')?.value?.trim()||'',
        ativo:    true,

      if (id) {
        const idx = this.state.dados.assessores.findIndex(a=>a.id===id);
        if (idx>=0) this.state.dados.assessores[idx] = novo;
      } else {
        this.state.dados.assessores.push(novo);

      fecharModal();

    _inserirVarTemplate(nome) {
      const tx = document.getElementById('tpl-corpo');
      if (!tx) return;
      const placeholder = `{{${nome}}}`;
      const start = tx.selectionStart || 0, end = tx.selectionEnd || 0;
      tx.value = tx.value.slice(0, start) + placeholder + tx.value.slice(end);
      tx.focus();
      tx.selectionStart = tx.selectionEnd = start + placeholder.length;
      this._atualizarPreviewTemplate();
    },

    _baixarBackupLocal(prefixo) {
      try {
        const uuid = this.state.uuid;
        const cipher = Storage._cipherCache[uuid] || localStorage.getItem(Storage._keyData(uuid));
        const backup = { versao: VERSAO, exportado: new Date().toISOString(), meta: Storage.carregarMeta(uuid), data: cipher, foto: localStorage.getItem(Storage._keyFoto(uuid)) };
        const blob = new Blob([JSON.stringify(backup)], { type: 'application/json' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = (prefixo || 'backup') + '-' + new Date().toISOString().slice(0, 10) + '.json';
        document.body.appendChild(a); a.click(); a.remove();
        setTimeout(() => URL.revokeObjectURL(a.href), 2000);
      } catch (e) {}

    // ── Tela: Gerenciar anexos ───────────────────────────────
    async _abrirGerenciarAnexos() {
      if (!isAdmin()) { toast('Acesso restrito.','error'); return; }
      let anexos = [];
      try { anexos = await AnexoStore.listar(); } catch (e) { toast('Falha ao listar anexos.','error'); return; }

      window._anxFiltro = { modulo: '', tamanhoMin: 0 };

      const render = () => {
        const f = window._anxFiltro;
        const filtrados = anexos.filter(a =>
          (!f.modulo || a.modulo === f.modulo) &&
          (a.tamanho >= f.tamanhoMin)
        );
        const totalBytes = filtrados.reduce((acc, a) => acc + (a.tamanho || 0), 0);
        const byMod = {};
        filtrados.forEach(a => { byMod[a.modulo] = (byMod[a.modulo] || 0) + 1; });

        const linhas = filtrados.sort((a,b) => (b.tamanho||0) - (a.tamanho||0)).map(a => {

    async _alterarSenha() {
      if (!isAdmin()) { toast('Acesso restrito.','error'); return; }
      const atual = document.getElementById('sen-atual')?.value || '';
      const nova  = document.getElementById('sen-nova')?.value  || '';
      const conf  = document.getElementById('sen-conf')?.value  || '';
      if (atual !== this.state.senha) { toast('Senha atual incorreta.','error'); return; }
      if (nova.length < 10) { toast('Nova senha deve ter m\u00ednimo 10 caracteres.','error'); return; }
      if (nova !== conf)   { toast('As senhas n\u00e3o coincidem.','error'); return; }
      const senhaAntiga = this.state.senha;
      const cipherAntigo = Storage._cipherCache[this.state.uuid];
      // Atualiza apenas a senha MESTRE (de criptografia). A senha PESSOAL de login
      // é independente (trocada em "Equipe") — não deve mudar junto com a mestre.
      // ORDEM SEGURA: grava os DADOS (ativo crítico) com a nova senha PRIMEIRO. Só toca em
      // anexos/foto depois que a persistência confirmar — se a gravação falhar (cota), nada
      // fica inconsistente e o usuário não é trancado para fora. (Senha pessoal de login NÃO
      // muda junto — é independente, trocada em "Equipe".)
      this.state.senha = nova;
      let okDados = false;
      try { okDados = await this.salvar(); } catch (e) { okDados = false; }
      if (!okDados) {
        this.state.senha = senhaAntiga; // rollback total
        if (cipherAntigo) Storage._cipherCache[this.state.uuid] = cipherAntigo;
        toast('Erro ao salvar (armazenamento). A senha NÃO foi alterada. Faça um backup e tente de novo.', 'error', 8000);
        return;
      }
      try { Storage.salvarFoto(this.state.uuid, this.state.dados.configuracoes?.foto_base64 || null, nova); } catch (e) {}
      let reanexos = { total: 0, falhas: 0 };
      Storage._idbWriting++; // mantém o aviso de "não feche a aba" ativo durante a re-cifragem
      try { reanexos = await AnexoStore.reCifrarTodos(senhaAntiga, nova); }
      catch (e) { /* sem anexos */ }
      finally { Storage._idbWriting--; }
      // Limpar campos de senha do DOM
      ['sen-atual','sen-nova','sen-conf'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = '';
      });
      if (reanexos.falhas > 0) {
        toast(`Senha alterada. Aten\u00e7\u00e3o: ${reanexos.falhas} anexo(s) n\u00e3o puderam ser re-criptografados.`, 'error', 6000);
      } else {
        toast('Senha alterada com sucesso!','success');
      }
      this._cfgAba = 'backup';
      this.renderConfiguracoes();
    },

    async _importarBackupArquivo(event) {
      const file = event.target.files[0];
      if (!file) return;
      event.target.value = ''; // permite reimportar o mesmo arquivo

      const isZip = file.name.toLowerCase().endsWith('.zip') ||
                    file.type === 'application/zip' ||
                    file.type === 'application/x-zip-compressed';

      try {
        if (isZip) {
          if (typeof JSZip === 'undefined') { toast('JSZip não disponível — use .json.', 'error'); return; }
          const zip = await JSZip.loadAsync(file);
          const entry = zip.file('backup.json');
          if (!entry) { toast('Arquivo .zip sem backup.json.', 'error'); return; }
          const backup = JSON.parse(await entry.async('string'));

          // Extrai anexos cifrados (se houver)
          const indiceEntry = zip.file('anexos/_indice.json');
          const anexosCifrados = [];
          if (indiceEntry) {
            const indice = JSON.parse(await indiceEntry.async('string'));
            for (const meta of indice) {
              const f = zip.file(`anexos/${meta.id}.enc`);
              if (f) {
                const blob = await f.async('blob');
                anexosCifrados.push({ ...meta, blob_cifrado: blob });
              }
            }
          }
          this._abrirConfirmImport(backup, anexosCifrados);
        } else {
          const texto = await file.text();
          const backup = JSON.parse(texto);
          this._abrirConfirmImport(backup, []);
        }
      } catch (e) {
        console.warn('[Import]', e);
        toast('Arquivo inválido.', 'error');
      }
    },

    _abrirConfirmImport(backup, anexosCifrados) {
      window._impBackup = backup;
      window._impAnexos = anexosCifrados;
      const qt = anexosCifrados.length;
      abrirModal(`
        <div class="p-6 space-y-4">
          <p class="editorial-kicker">Restaurar backup</p>
          <h3 class="display-md">Importar dados${qt ? ` + ${qt} anexo${qt !== 1 ? 's' : ''}` : ''}</h3>
          <p class="text-[13px] text-ink-soft max-w-[52ch]">
            Os dados atuais serão <strong>substituídos</strong>. Digite a senha do backup
            para descriptografar os arquivos.
          </p>
          <div>${this._campo('imp-senha','Senha do backup','password','',true)}</div>
          <div class="flex justify-end gap-2">
            <button data-act="a0" class="btn btn-ghost text-[13px]">Cancelar</button>
            <button data-act="a106" class="btn btn-primary text-[13px]">Importar</button>
          </div>
        </div>`, 'max-w-sm');
      setTimeout(() => document.getElementById('imp-senha')?.focus(), 120);
    },

    async _confirmarImport() {
      const senha  = document.getElementById('imp-senha')?.value || '';
      const backup = window._impBackup;
      if (!backup) { toast('Backup ausente.','error'); return; }

      let ok;
      try { ok = await Storage.importarBackup(backup, senha); }
      catch (e) { console.warn('[Import]', e); toast('Falha ao importar o backup.','error'); return; }
      if (!ok) { toast('Senha incorreta ou backup inválido.','error'); return; }

      // Restaura anexos (cifrados) no IndexedDB do uuid importado
      const anexos = window._impAnexos || [];
      if (anexos.length) {
        // O uuid atual do app pode ser diferente — usar uuid do backup
        const targetUuid = backup.meta?.uuid;
        // Abre o DB do uuid alvo (mesmo antes do reload)
        const tmpStoreAbrir = () => new Promise((resolve, reject) => {
          const req = indexedDB.open(AnexoStore.DB_PREFIX + targetUuid, 1);
          req.onupgradeneeded = () => {
            const db = req.result;
            if (!db.objectStoreNames.contains(AnexoStore.STORE)) {
              const s = db.createObjectStore(AnexoStore.STORE, { keyPath: 'id' });
              s.createIndex('modulo',      'modulo',      { unique: false });
              s.createIndex('item_id',     'item_id',     { unique: false });
              s.createIndex('modulo_item', ['modulo', 'item_id'], { unique: false });
              s.createIndex('uploaded_em', 'uploaded_em', { unique: false });
            }
          };
          req.onsuccess = () => resolve(req.result);
          req.onerror   = () => reject(req.error);
        });

        try {
          const db = await tmpStoreAbrir();
          await new Promise((resolve, reject) => {
            const tx = db.transaction(AnexoStore.STORE, 'readwrite');
            const store = tx.objectStore(AnexoStore.STORE);
            // Limpa antes para garantir consistência
            store.clear();
            for (const a of anexos) store.put(a);
            tx.oncomplete = () => resolve();
            tx.onerror    = () => reject(tx.error);
          });
          db.close();
        } catch (e) {
          console.warn('[Import] anexos falhou', e);
          toast('Dados importados, mas alguns anexos falharam.', 'warning');
        }
      }

      fecharModal();
      toast('Backup importado. Reiniciando…','success');
      setTimeout(() => location.reload(), 1500);
    },

    _gerarAlertas() {
      const d = this.state.dados;
      const hj = hoje();
      const alertas = [];

      // Ofícios aguardando >15 dias
      (d.oficios||[]).forEach(o => {
        if (o.status === 'aguardando' && diasAtras(o.data_emissao) > 15)
          alertas.push({ tipo:'urgente', icone:'fa-envelope-open-text', msg:`Ofício ${esc(o.numero)} sem resposta há ${diasAtras(o.data_emissao)} dias`, href:'#oficios', id:o.id });
      });
      // Demandas pendente >7 dias
      (d.demandas||[]).forEach(x => {
        if ((x.status==='pendente'||x.status==='em_andamento') && diasAtras(x.data_abertura)>7)
          alertas.push({ tipo:'atencao', icone:'fa-clock', msg:`Demanda ${esc(x.protocolo)} parada há ${diasAtras(x.data_abertura)} dias`, href:'#demandas', id:x.id });
      });
      // Checklist não preenchido hoje
      const assessoresHj = (d.checklists||[]).filter(c=>c.data===hj).map(c=>c.assessor_id);
      (d.assessores||[]).forEach(a => {
        if (!assessoresHj.includes(a.id))
          alertas.push({ tipo:'info', icone:'fa-square-check', msg:`${esc(a.nome)} não preencheu o checklist hoje`, href:'#checklist', id:a.id });
      });
      // Agenda hoje e amanhã
      const amanha = new Date(); amanha.setDate(amanha.getDate()+1);
      const amanhaStr = dataLocal(amanha);
      (d.agenda||[]).forEach(e => {
        if (e.data===hj) alertas.push({ tipo:'info', icone:'fa-calendar-day', msg:`Hoje: ${esc(e.titulo)} às ${esc(e.hora_inicio)}`, href:'#agenda', id:e.id });
        if (e.data===amanhaStr) alertas.push({ tipo:'info', icone:'fa-calendar', msg:`Amanhã: ${esc(e.titulo)} às ${esc(e.hora_inicio)}`, href:'#agenda', id:e.id });
      });
      // Metas com prazo vencendo em 7 dias
      (d.metas||[]).forEach(m => {
        if (m.prazo && m.status!=='concluida' && m.status!=='cancelada') {
          const dias = -diasAtras(m.prazo);
          if (dias < 0) alertas.push({ tipo:'urgente', icone:'fa-bullseye', msg:`Meta "${esc(m.titulo)}" vencida há ${-dias} dias`, href:'#metas', id:m.id });
          else if (dias <= 7) alertas.push({ tipo:'atencao', icone:'fa-bullseye', msg:`Meta "${esc(m.titulo)}" vence em ${dias} dias`, href:'#metas', id:m.id });
        }
      });
      // Fiscalizações paralisadas
      (d.fiscalizacoes||[]).forEach(f => {
        if (f.status==='paralisado') alertas.push({ tipo:'urgente', icone:'fa-triangle-exclamation', msg:`Obra "${esc(f.nome)}" está paralisada`, href:'#fiscalizacao', id:f.id });
      });
      // Ordenar: urgente primeiro
      const ord = {urgente:0, atencao:1, info:2};
      alertas.sort((a,b) => ord[a.tipo]-ord[b.tipo]);
      return alertas;
    },

    _contarAlertas() {

      this._relAte = hoje();
      this.renderRelatorios();

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-5 mb-5">
          <div class="bg-white dark:bg-slate-800 rounded-2xl border border-slate-100 dark:border-slate-700/50 p-6 shadow-card">
            <h3 class="text-sm font-semibold text-slate-700 dark:text-slate-200 mb-4 flex items-center gap-2"><span class="w-1.5 h-4 rounded-full" style="background:var(--primary)"></span>Demandas por Status</h3>

    async _gerarRelatorioDocx() {
      const de = this._relDe, ate = this._relAte;
      const d = this.state.dados;
      const demandas = (d.demandas || []).filter(x => x.data_abertura >= de && x.data_abertura <= ate);
      const oficios  = (d.oficios  || []).filter(x => x.data_emissao  >= de && x.data_emissao  <= ate);
      const metasAnd = (d.metas    || []).filter(m => m.status === 'em_progresso');
      const pls      = (d.projetos_lei || []).filter(p => (p.data_apresentacao || '') >= de && (p.data_apresentacao || '') <= ate);

      const byBairro = {};
      demandas.forEach(dm => { const k = dm.bairro || '—'; byBairro[k] = (byBairro[k] || 0) + 1; });
      const linhasBairro = Object.entries(byBairro).sort((a,b) => b[1] - a[1])
        .map(([k,v]) => `• ${k}: ${v} demanda${v !== 1 ? 's' : ''}`).join('\n');

      const byArea = {};
      demandas.forEach(dm => { const k = dm.area || '—'; byArea[k] = (byArea[k] || 0) + 1; });
      const linhasArea = Object.entries(byArea).sort((a,b) => b[1] - a[1]).slice(0,10)
        .map(([k,v]) => `• ${k}: ${v} demanda${v !== 1 ? 's' : ''}`).join('\n');

      const lstPL = pls.slice(0, 20).map(p => `• ${p.numero || '—'} — ${p.titulo || '—'} (${LABELS.status_pl[p.status] || p.status})`).join('\n');

      const extras = {
        periodo_inicio: formatarData(de),
        periodo_fim:    formatarData(ate),
        total_demandas: demandas.length,
        total_oficios:  oficios.length,
        total_metas:    metasAnd.length,
        tabela_demandas_bairro: linhasBairro || '(sem dados no período)',
        tabela_demandas_area:   linhasArea   || '(sem dados no período)',
        lista_projetos_lei:     lstPL        || '(nenhum projeto no período)',
      };

      this._exportarDocxComTemplate('relatorio_mensal', async (tplId) => {
        try {
          toast('Gerando relatório…', 'info', 2000);
          const blob = await Templates.gerarDocx('relatorio_mensal', null, { templateId: tplId, extras });
          const nome = `relatorio-${de}_a_${ate}.docx`;
          if (typeof window.saveAs === 'function') window.saveAs(blob, nome);
          else {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = nome;
            document.body.appendChild(a); a.click(); a.remove();
            setTimeout(() => URL.revokeObjectURL(url), 2000);
          }
          const tpl = Templates.buscar(tplId);
          registrarLog('export_docx', 'relatorios',
            `Relatório ${formatarData(de)} a ${formatarData(ate)} — template "${tpl?.nome || '—'}"`);
          toast('Relatório .docx baixado.', 'success');
        } catch (e) {
          console.warn('[Relatorio]', e);
          toast(`Falha: ${e.message || e}`, 'error');
        }
      });
    },

    _imprimirRelatorio() {
      const meta = this.state.meta;
      const conteudo = document.getElementById('rel-conteudo')?.innerHTML||'';
      const html = `<!DOCTYPE html><html><head><title>Relatório - ${esc(meta.nome_vereador)}</title>
        <style>@media print{body{margin:0;font-size:12px}}</style>
        </head><body style="margin:20px;font-family:Arial,sans-serif">
        <div style="border-bottom:2px solid #333;padding-bottom:10px;margin-bottom:20px">
          <div style="font-size:18px;font-weight:bold">${esc(meta.cargo)} ${esc(meta.nome_vereador)} — Relatório</div>
          <div style="font-size:12px;color:#555">Período: ${formatarData(this._relDe)} a ${formatarData(this._relAte)} · ${esc(meta.cidade)}/${esc(meta.estado)}</div>
        </div>${conteudo}</body></html>`;
      const blob = new Blob([html],{type:'text/html'});
      const url = URL.createObjectURL(blob);
      const w = window.open(url,'_blank','width=900,height=700');
      if (!w) { URL.revokeObjectURL(url); toast('Permita pop-ups para imprimir o relatório.', 'error', 5000); return; }
      setTimeout(()=>{ try { w.print(); } catch (e) {} URL.revokeObjectURL(url); },600);
    },

    renderPresenca() {
      if (!this._presMes) this._presMes = new Date();
      const assessores = this.state.dados.assessores||[];
      const checklists = this.state.dados.checklists||[];
      const mes = this._presMes;
      const ano = mes.getFullYear(), mesN = mes.getMonth();
      const nomeMes = mes.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
      const diasNoMes = new Date(ano, mesN+1, 0).getDate();
      const filtro = this._presAssessor;
      const listaAss = filtro ? assessores.filter(a=>a.id===filtro) : assessores;

      document.getElementById('conteudo').innerHTML = `
        <div class="flex items-center justify-between mb-6 flex-wrap gap-3">
          <h2 class="heading-display text-xl text-slate-800 dark:text-white">Controle de Presença</h2>
          <div class="flex items-center gap-2">
            <button data-act="a113" class="w-8 h-8 rounded-xl flex items-center justify-center text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-700 cursor-pointer"><i class="fa-solid fa-chevron-left text-sm"></i></button>
            <span class="text-sm font-semibold text-slate-700 dark:text-slate-200 capitalize w-40 text-center">${nomeMes}</span>
            <button data-act="a114" class="w-8 h-8 rounded-xl flex items-center justify-center text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-700 cursor-pointer"><i class="fa-solid fa-chevron-right text-sm"></i></button>
            <select data-change="a115" class="text-xs rounded-xl border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 text-slate-800 dark:text-white px-3 py-2 cursor-pointer">
              <option value="">Todos</option>
              ${assessores.map(a=>`<option value="${a.id}" ${filtro===a.id?'selected':''}>${esc(a.nome)}</option>`).join('')}
            </select>
          </div>
        </div>
        <div class="space-y-4">
          ${listaAss.map(a => {
            const mesStr = `${ano}-${String(mesN+1).padStart(2,'0')}`;
            const checks = checklists.filter(c=>c.assessor_id===a.id&&c.data?.startsWith(mesStr));
            const diasTrabalhados = checks.length;
            let diasUteis = 0;
            for (let i=1;i<=diasNoMes;i++) { const dw=new Date(ano,mesN,i).getDay(); if(dw>0&&dw<6) diasUteis++; }
            const faltas = Math.max(0, diasUteis - diasTrabalhados);
            return `
            <div class="bg-white dark:bg-slate-800 rounded-2xl border border-slate-100 dark:border-slate-700/50 p-5 shadow-card">
              <div class="flex items-center justify-between mb-4">
                <div class="flex items-center gap-3">
                  <div class="w-10 h-10 rounded-full flex items-center justify-center text-white font-bold text-sm" style="background:var(--primary)">${esc(a.nome.slice(0,1).toUpperCase())}</div>
                  <div><p class="font-semibold text-slate-800 dark:text-white text-sm">${esc(a.nome)}</p><p class="text-xs text-slate-400">${esc(a.funcao||'')}</p></div>
                </div>
                <div class="flex gap-4 text-xs">
                  <span class="text-emerald-600 font-semibold"><i class="fa-solid fa-check mr-1"></i>${diasTrabalhados} dias</span>
                  <span class="text-red-500 font-semibold"><i class="fa-solid fa-xmark mr-1"></i>${faltas} faltas</span>
                </div>
              </div>
              <div class="grid grid-cols-7 gap-1">
                ${['D','S','T','Q','Q','S','S'].map(d=>`<div class="text-center text-[10px] font-semibold text-slate-400 pb-1">${d}</div>`).join('')}
                ${(() => {
                  let cells = '';
                  const primeiroDia = new Date(ano,mesN,1).getDay();
                  for (let i=0;i<primeiroDia;i++) cells += '<div></div>';
                  for (let dia=1;dia<=diasNoMes;dia++) {
                    const ds = `${ano}-${String(mesN+1).padStart(2,'0')}-${String(dia).padStart(2,'0')}`;
                    const dw = new Date(ano,mesN,dia).getDay();
                    const ck = checks.find(c=>c.data===ds);
                    const isHj = ds===hoje();
                    let cls = 'w-full aspect-square rounded-lg flex items-center justify-center text-[10px] font-medium ';
                    if (dw===0||dw===6) cls += 'bg-slate-100 dark:bg-slate-700/50 text-slate-400';
                    else if (ck) {
                      const mod = ck.modalidade;
                      cls += mod==='remoto'?'bg-blue-100 dark:bg-blue-900/30 text-blue-600':'bg-emerald-100 dark:bg-emerald-900/30 text-emerald-600';
                      if (mod==='externo') cls = cls.replace(/bg-\w+-100/,'bg-purple-100').replace(/bg-\w+-900/,'bg-purple-900').replace(/text-\w+-600/,'text-purple-600');
                    } else if (ds<=hoje()) cls += 'bg-red-50 dark:bg-red-900/15 text-red-400';
                    else cls += 'text-slate-400';
                    if (isHj) cls += ' ring-2 ring-primary';
                    const title = ck ? `${LABELS.modalidade_checklist[ck.modalidade]||''} ${ck.hora_entrada||''}-${ck.hora_saida||''}` : '';
                    cells += `<div class="${cls}" title="${title}">${dia}</div>`;
                  }
                  return cells;
                })()}
              </div>
              <div class="flex gap-4 mt-3 text-[10px] text-slate-400">
                <span><span class="inline-block w-3 h-3 rounded bg-emerald-100 dark:bg-emerald-900/30 mr-1"></span>Presencial</span>
                <span><span class="inline-block w-3 h-3 rounded bg-blue-100 dark:bg-blue-900/30 mr-1"></span>Remoto</span>
                <span><span class="inline-block w-3 h-3 rounded bg-purple-100 dark:bg-purple-900/30 mr-1"></span>Externo</span>
                <span><span class="inline-block w-3 h-3 rounded bg-red-50 dark:bg-red-900/15 mr-1"></span>Ausente</span>
              </div>
            </div>`;
          }).join('')}
        </div>`;
    },

    _salvarPL(id) {
      if (!temPermissao('projetos_lei', id ? 'editar' : 'criar')) { toast('Sem permiss\u00e3o.','error'); return; }
      const titulo = document.getElementById('pl-titulo')?.value?.trim();
      if (!titulo) { toast('Informe o título do PL.','error'); return; }
      const novoStatus = document.getElementById('pl-status')?.value||'rascunho';
      const d = this.state.dados;
      const antigo = id ? (d.projetos_lei||[]).find(x=>x.id===id) : null;
      const obj = {
        id: id||gerarUUID(),
        numero: document.getElementById('pl-numero')?.value?.trim()||'',
        titulo,
        ementa: document.getElementById('pl-ementa')?.value||'',
        autor: document.getElementById('pl-autor')?.value?.trim()||'',
        data_apresentacao: document.getElementById('pl-data')?.value||hoje(),
        status: novoStatus,
        comissao: document.getElementById('pl-comissao')?.value?.trim()||'',
        relator: document.getElementById('pl-relator')?.value?.trim()||'',
        meta_id: document.getElementById('pl-meta')?.value||'',
        observacoes: document.getElementById('pl-obs')?.value||'',
        historico: antigo?.historico||[{data:new Date().toISOString(),descricao:'PL registrado no sistema.'}],
      };
      if (antigo && antigo.status !== novoStatus) {
        obj.historico = [...obj.historico, {data:new Date().toISOString(),descricao:`Status alterado para "${LABELS.status_pl[novoStatus]||novoStatus}"`}];
      }
      if (id) { const idx=d.projetos_lei.findIndex(x=>x.id===id); if(idx>=0) d.projetos_lei[idx]=obj; }
      else d.projetos_lei.unshift(obj);
      this.salvar(); fecharModal(); this.renderProjetosLei();
      toast(id?'PL atualizado!':'PL criado!','success');
    },

    _excluirPL(id) { if (!temPermissao('projetos_lei','excluir')) { toast('Sem permiss\u00e3o.','error'); return; } confirmar('Excluir este projeto de lei?',async ()=>{ this.state.dados.projetos_lei=this.state.dados.projetos_lei.filter(x=>x.id!==id); this.salvar(); try { await AnexoStore.excluirPorItem('projeto_lei', id); } catch(e) {} this.renderProjetosLei(); toast('PL excluído.','info'); },'danger'); },

    // ════════════════════════════════════════════════════════════
    // MÓDULO 5: CADASTRO DE CIDADÃOS — CRM (#cidadaos)
    // ════════════════════════════════════════════════════════════

    _cidFiltros: { busca: '', bairro: '', tag: '', faixa: '', ult: '', lideranca: false },
    _cidTagsAtuais: [],

    _GENERO_OPCOES: {
      feminino: 'Feminino', masculino: 'Masculino',
      nao_binario: 'Não-binário', nao_informar: 'Prefiro não informar',
    },
    _COMO_CONHECEU: {

    },
    _INTERACAO_TIPOS: {
      ligacao: 'Ligação', visita: 'Visita', encontro: 'Encontro',
      mensagem: 'Mensagem', reuniao: 'Reunião',
    },
    _INTERACAO_ICON: {
      ligacao: 'phone', visita: 'home', encontro: 'handshake',
      mensagem: 'message-circle', reuniao: 'users',
    },
    _TERMO_LGPD_VERSAO: '1.0',

    // ── Helpers ────────────────────────────────────────────────
    _cidadaoIdade(c) {
      if (!c?.data_nascimento) return null;
      const d = new Date(c.data_nascimento + 'T00:00:00');
      if (isNaN(d)) return null;
      const hj = new Date();
      let idade = hj.getFullYear() - d.getFullYear();
      const m = hj.getMonth() - d.getMonth();
      if (m < 0 || (m === 0 && hj.getDate() < d.getDate())) idade--;
      return idade;
    },

    _cidadaoUltimaInteracao(c) {
      const interacoes = c.interacoes || [];
      const dms = (this.state.dados.demandas || []).filter(d => d.cidadao_id === c.id);
      const saudes = (this.state.dados.saude || []).filter(s => s.cidadao_id === c.id);
      const cestas = (this.state.dados.cesta_basica || []).filter(s => s.cidadao_id === c.id);
      const datas = [
        ...interacoes.map(i => i.data),
        ...dms.map(d => d.data_abertura),
        ...saudes.map(s => s.data_solicitacao),
        ...cestas.map(s => s.data_solicitacao),
        ...cestas.flatMap(s => (s.entregas || []).map(e => e.data)),
      ].filter(Boolean).sort().reverse();
      return datas[0] || null;
    },

    _diasDesde(iso) {
      if (!iso) return null;
      const d = new Date(iso + (iso.length === 10 ? 'T00:00:00' : ''));
      if (isNaN(d)) return null;
      return Math.floor((Date.now() - d.getTime()) / 86400000);
    },

    // Total de pedidos do cidadão = demandas + saúde + cesta básica.
    _cidadaoTotalPedidos(c) {
      const d = this.state.dados;
      return (d.demandas || []).filter(x => x.cidadao_id === c.id).length
        + (d.saude || []).filter(x => x.cidadao_id === c.id).length
        + (d.cesta_basica || []).filter(x => x.cidadao_id === c.id).length;
    },
    // Quantos pedidos foram concluídos (demanda resolvida / saúde atendida / cesta entregue).
    _cidadaoConcluidos(c) {
      const d = this.state.dados;
      return (d.demandas || []).filter(x => x.cidadao_id === c.id && x.status === 'resolvido').length
        + (d.saude || []).filter(x => x.cidadao_id === c.id && x.status === 'atendido').length
        + (d.cesta_basica || []).filter(x => x.cidadao_id === c.id && x.status === 'entregue').length;
    },

    _cidadaoTaxaResolucao(c) {
      const total = this._cidadaoTotalPedidos(c);
      if (!total) return null;
      return Math.round((this._cidadaoConcluidos(c) / total) * 100);
    },

    _todasTags() {
      const set = new Set();
      (this.state.dados.cidadaos || []).forEach(c => (c.tags || []).forEach(t => set.add(t)));
      return Array.from(set).sort();
    },

    _aniversariantesSemana() {
      const cidadaos = this.state.dados.cidadaos || [];
      const hj0 = new Date();
      const hj = new Date(hj0.getFullYear(), hj0.getMonth(), hj0.getDate());
      return cidadaos.filter(c => {
        if (!c.data_nascimento) return false;
        const d = new Date(c.data_nascimento + 'T00:00:00');
        if (isNaN(d)) return false;
        const alvo = new Date(hj0.getFullYear(), d.getMonth(), d.getDate());
        if (alvo < hj) alvo.setFullYear(alvo.getFullYear() + 1);
        const diff = (alvo - hj) / 86400000;
        return diff >= 0 && diff < 7;
      }).map(c => {
        const d = new Date(c.data_nascimento + 'T00:00:00');
        const alvo = new Date(hj0.getFullYear(), d.getMonth(), d.getDate());
        if (alvo < hj) alvo.setFullYear(alvo.getFullYear() + 1);
        return { ...c, _dia: alvo, _idade: alvo.getFullYear() - d.getFullYear() };
      }).sort((a, b) => a._dia - b._dia);
    },

    // ── Listagem ───────────────────────────────────────────────
    // Filtra a lista de cidadãos conforme this._cidFiltros (busca/bairro/tag/idade/interação).
    _cidFiltrar() {
      const cidadaos = this.state.dados.cidadaos || [];
      const f = this._cidFiltros;
      const q = (f.busca || '').toLowerCase();
      const passaFaixa = (c) => {
        if (!f.faixa) return true;
        const idade = this._cidadaoIdade(c);
        if (idade === null) return f.faixa === 'sem';
        if (f.faixa === 'lt30') return idade < 30;
        if (f.faixa === '30_60') return idade >= 30 && idade <= 60;
        if (f.faixa === 'gt60') return idade > 60;
        return true;
      };
      const passaUlt = (c) => {
        if (!f.ult) return true;
        const dias = this._diasDesde(this._cidadaoUltimaInteracao(c));
        if (f.ult === 'nunca') return dias === null;
        if (f.ult === '30')  return dias !== null && dias <= 30;
        if (f.ult === '90')  return dias !== null && dias <= 90;
        if (f.ult === '365') return dias !== null && dias <= 365;
        return true;
      };
      return cidadaos.filter(c => {
        if (q) {
          const txt = [c.nome, c.telefone, c.cpf, c.email, c.endereco, c.bairro, ...(c.tags || [])]
            .filter(Boolean).join(' ').toLowerCase();
          if (!txt.includes(q)) return false;
        }
        if (f.lideranca && !c.lideranca) return false;
        if (f.bairro && c.bairro !== f.bairro) return false;
        if (f.tag && !(c.tags || []).includes(f.tag)) return false;
        if (!passaFaixa(c)) return false;
        if (!passaUlt(c)) return false;
        return true;
      });
    },

    _ESCOLARIDADE: { fund_inc:'Fundamental incompleto', fund_comp:'Fundamental completo', medio_inc:'Médio incompleto', medio_comp:'Médio completo', sup_inc:'Superior incompleto', sup_comp:'Superior completo', pos:'Pós-graduação' },

    // ── Foto: compressão, captura e avatar ──────────────────────
    // Redimensiona/comprime no canvas → dataURL JPEG. Nunca guarda imagem crua.
    _comprimirImagem(file, maxSize = 256, quality = 0.78) {
      return new Promise((resolve, reject) => {
        if (!file || !(file.type || '').startsWith('image/')) { reject(new Error('arquivo inválido')); return; }
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const escala = Math.min(1, maxSize / Math.max(img.width, img.height));
            const w = Math.max(1, Math.round(img.width * escala));
            const h = Math.max(1, Math.round(img.height * escala));
            const canvas = document.createElement('canvas');
            canvas.width = w; canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
            try { resolve(canvas.toDataURL('image/jpeg', quality)); }
            catch (err) { reject(err); }
          };
          img.onerror = () => reject(new Error('falha ao carregar imagem'));
          img.src = e.target.result;
        };
        reader.onerror = () => reject(new Error('falha ao ler arquivo'));
        reader.readAsDataURL(file);
      });
    },

    _cidFotoAtual: null,

    async _cidEscolherFoto(input) {
      const file = input.files && input.files[0];
      if (!file) return;
      if (file.size > 15 * 1024 * 1024) { toast('Imagem muito grande (máx 15MB).', 'error'); return; }
      try {
        const thumb = await this._comprimirImagem(file, 256, 0.78);
        this._cidFotoAtual = thumb;
        const prev = document.getElementById('cid-foto-preview');
        if (prev) prev.innerHTML = `<img src="${thumb}" class="w-full h-full object-cover" alt="foto" />`;
        document.getElementById('cid-foto-remover')?.classList.remove('hidden');
      } catch (e) { toast('Não foi possível processar a imagem.', 'error'); }
      finally { input.value = ''; }
    },

      this._cidFotoAtual = '';

    _iniciais(nome) {
      const p = (nome || '').trim().split(/\s+/).filter(Boolean);
      if (!p.length) return '?';
      return (p[0][0] + (p.length > 1 ? p[p.length - 1][0] : '')).toUpperCase();

      return `<span class="rounded-full inline-flex items-center justify-center shrink-0 font-semibold"
        style="width:${px}px;height:${px}px;background:var(--accent-light);color:var(--accent);font-size:${Math.round(px * 0.38)}px">${esc(txt)}</span>`;
    },

    // Só aceita data URL de imagem em base64 ESTRITO (png/jpg/gif/webp). Bloqueia
    // svg+xml e qualquer caractere (aspas, <, >) que permita quebrar o atributo src
    // (XSS via foto_thumb forjada em import/backup/sync).
    _fotoSegura(s) { return (typeof s === 'string' && /^data:image\/(png|jpe?g|gif|webp);base64,[A-Za-z0-9+/]+=*$/.test(s)) ? s : ''; },

    _colegioPorSecao(secao) {
      const db = window.TSE_BERTIOGA;
      if (!db || secao == null || secao === '') return null;
      const s = parseInt(String(secao).replace(/\D/g, ''), 10);
      if (isNaN(s)) return null;
      const idx = db.secoes[s];
      if (idx == null) return null;
      return db.locais[idx] || null;

    // ═══════════════════════════════════════════════════════════
    // IMPORTAÇÃO DO CADASTRO (Google Docs exportado em .docx) + DEDUP
    // ═══════════════════════════════════════════════════════════
    // Rótulos do cadastro da Elisângela (Google Docs). Ordem importa para
    // desambiguar (ex.: "título de eleitor" antes de "título"/"zona").
    // O parser varre TODOS os rótulos numa ficha (não só o primeiro ':'),
    // porque várias células trazem rótulos grudados (ex.: "Título: … Zona: …",
    // ou "Comentários:…Observações Eli:…Indicação:…Filhos:…Encaminhado:…").
    _IMPORT_LABELS: [
      { re: 'n[ôo]me', f: 'nome' },
      { re: 'profiss[ãa]o', f: 'profissao' },
      { re: 'trabalha onde', f: 'profissao' },
      { re: 'endere[çc]o(?: e refer[êe]ncia)?', f: 'endereco' },
      { re: 'contato', f: 'telefone' },
      { re: 'telefones?|telefone\\(s\\)|celular', f: 'telefone' },
      { re: 'facebook|rede social', f: 'facebook' },
      { re: 'est\\.? ?civil|estado civil', f: 'estado_civil' },
      { re: 'e-?mail', f: 'email' },
      { re: 'escolaridade', f: 'escolaridade' },
      { re: 'cpf', f: 'cpf' },
      { re: 'rg', f: 'rg' },
      { re: 't[íi]tulo(?: de eleitor)?', f: 'titulo_eleitor' },
      { re: 'zona', f: 'zona_eleitoral' },
      { re: 'se[çc][ãa]o', f: 'secao_eleitoral' },
      { re: 'uf', f: 'uf_eleitoral' },
      { re: 'data nasc\\.?(?:imento)?|data de nascimento', f: 'data_nascimento' },
      { re: 'coment[áa]rios', f: 'observacoes' },
      { re: 'observa[çc][õo]es(?: eli)?', f: 'observacoes' },
      { re: 'indica[çc][ãa]o', f: 'indicacao' },
      { re: 'filhos', f: 'filhos' },
      { re: 'encaminhado', f: 'observacoes' },
      { re: 'foto', f: null },
    ],
    _importDataISO(s) {
      // extrai a 1ª data DD/MM/AAAA mesmo com sufixo ("25/04/1997 (40 anos)")
      const m = (s || '').match(/(\d{1,2})\/(\d{1,2})\/(\d{2,4})/);
      if (!m) return '';
      let [, d, mo, y] = m;
      if (y.length === 2) y = (parseInt(y, 10) > 30 ? '19' : '20') + y;
      if (y.length !== 4) return ''; // 3 dígitos = typo (ex.: "997") → rejeita
      const di = +d, moi = +mo, yi = +y;
      if (di < 1 || di > 31 || moi < 1 || moi > 12) return ''; // data inválida
      if (yi < 1900 || yi > new Date().getFullYear()) return ''; // ano implausível p/ nascimento
      return `${y}-${mo.padStart(2, '0')}-${d.padStart(2, '0')}`;
    },

    _importMapearCampos(texts) {
      const full = (Array.isArray(texts) ? texts.join('\n') : String(texts || ''));
      // compila uma vez a regex de cada rótulo (^…$) para identificar o campo
      if (!this._IMPORT_LABELS[0]._full) {
        this._IMPORT_LABELS.forEach(l => { l._full = new RegExp('^(?:' + l.re + ')$', 'i'); });
      }
      const labelOr = this._IMPORT_LABELS.map(l => l.re).join('|');
      const master = new RegExp('(' + labelOr + ')[ \\t]*:', 'gi');
      const found = [];
      let m;
      while ((m = master.exec(full)) !== null) {
        const def = this._IMPORT_LABELS.find(l => l._full.test(m[1]));
        found.push({ start: m.index, valStart: m.index + m[0].length, field: def ? def.f : null });
      }
      const obj = { fonte: 'importacao' };
      for (let i = 0; i < found.length; i++) {
        const f = found[i].field;
        if (!f) continue;
        let val = full.slice(found[i].valStart, i + 1 < found.length ? found[i + 1].start : full.length).trim();
        if (!val) continue;
        if (f === 'nome') val = val.replace(/\s*-\s*ok\s*$/i, '').trim();
        if (f === 'data_nascimento') { val = this._importDataISO(val) || ''; if (!val) continue; }
        if (f === 'zona_eleitoral') val = val.replace(/\(.*?\)/g, '').trim();
        if (f === 'secao_eleitoral') val = (val.match(/\d+/) || [val])[0];
        if (f === 'observacoes') { obj.observacoes = obj.observacoes ? (obj.observacoes + '\n' + val) : val; continue; }
        if (!obj[f]) obj[f] = val;
      }
      // número da ficha (prefixo antes de "Nome:")
      const num = full.match(/(?:^|\n)\s*(\d+)\s*-?\s*n[ôo]me\s*:/i);
      if (num) obj.numero = parseInt(num[1], 10) || null;
      // dois telefones grudados no mesmo campo → separa
      if (obj.telefone) {
        const fones = obj.telefone.match(/\d[\d\s()-]{7,}\d/g);
        if (fones && fones.length >= 2) { obj.telefone = fones[0].trim(); obj.telefone2 = fones[1].trim(); }
      }
      return obj.nome ? obj : null;
    },

    async _importParseDocx(file) {
      const zip = await JSZip.loadAsync(file);
      const arq = zip.file('word/document.xml');
      if (!arq) throw new Error('Arquivo .docx inválido (sem word/document.xml).');
      const xml = await arq.async('string');
      const doc = new DOMParser().parseFromString(xml, 'application/xml');
      const tbls = doc.getElementsByTagNameNS('*', 'tbl');
      const result = [];
      for (let i = 0; i < tbls.length; i++) {
        const cells = tbls[i].getElementsByTagNameNS('*', 'tc');
        const texts = [];
        for (let j = 0; j < cells.length; j++) {
          const ts = cells[j].getElementsByTagNameNS('*', 't');
          let s = '';
          for (let k = 0; k < ts.length; k++) s += ts[k].textContent;
          texts.push(s.trim());
        }
        const obj = this._importMapearCampos(texts);
        if (obj) result.push(obj);
      }
      return result;
    },

    // Chaves de deduplicação (pode haver mais de uma). É duplicado se QUALQUER
    // chave colidir — assim a mesma pessoa importada com e sem CPF é pega.
    _importChaves(c) {
      const keys = [];
      const cpf = (c.cpf || '').replace(/\D/g, '');
      // CPF válido: 11 dígitos e não todos iguais (descarta placeholders 000.../111...)
      if (cpf.length === 11 && !/^(\d)\1{10}$/.test(cpf)) keys.push('cpf:' + cpf);
      const nome = (c.nome || '').toLowerCase().trim().replace(/\s+/g, ' ');
      const tel = (c.telefone || '').replace(/\D/g, '');
      if (nome && tel.length >= 8) keys.push('nt:' + nome + ':' + tel.slice(-9));
      else if (nome && c.data_nascimento) keys.push('nn:' + nome + ':' + c.data_nascimento);
      else if (nome) keys.push('n:' + nome);
      return keys;
    },

    // Bairros oficiais de Bertioga + apelidos/variações (normalizados, sem acento).
    // Ordem: específico → genérico (ex.: "vista linda" antes de "chacaras").
    _BAIRROS_BERTIOGA: [
      ['Vista Linda', ['vista linda']],
      ['Jardim Vicente de Carvalho', ['vicente de carvalho', 'vcii', 'vc ii', 'vc2', 'vc 2']],
      ['Rio da Praia', ['rio da praia']],
      ['Jardim Ana Paula', ['jardim ana paula', 'jd ana paula']],
      ['Jardim Raphael', ['jardim raphael', 'jardim rafael', 'jd raphael', 'jd rafael']],
      ['Jardim Albatroz', ['albatroz']],
      ['Jardim Paulista', ['jardim paulista', 'jd paulista']],
      ['Jardim das Canções', ['cancoes']],
      ['Sítio São João', ['sitio sao joao']],
      ['Mangue Seco', ['mangue seco']],
      ['Vila da Mata', ['vila da mata']],
      ['Riviera de São Lourenço', ['riviera']],
      ['São Lourenço', ['sao lourenco']],
      ['Vila Itapanhaú', ['itapanhau']],
      ['Costa do Sol', ['costa do sol']],
      ['Morada da Praia', ['morada da praia']],
      ['Chácaras', ['chacaras', 'chacara']],
      ['Indaiá', ['indaia']],
      ['Maitinga', ['maitinga']],
      ['Boracéia', ['boraceia']],
      ['Caruará', ['caruara']],
      ['Caiubura', ['caiubura', 'caioubura']],
      ['Guaratuba', ['guaratuba']],
      ['Itaguaré', ['itaguare']],
      ['Centro', ['centro']],
    ],

    // Identifica o bairro de Bertioga dentro do endereço livre, casando contra a
    // lista oficial (com apelidos). Retorna '' se não reconhecer (evita criar
    // "bairro" a partir de nome de rua / endereço incompleto).
    _extrairBairro(endereco) {
      const a = (endereco || '').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '').replace(/\s+/g, ' ').trim();
      if (!a) return '';
      // Casa por LIMITE DE PALAVRA (não substring) — evita falso-positivo como
      // "Rua Rafael Pinto" virar "Jardim Raphael". Regexes pré-compilados (cache).
      if (!this._bairroRe) {
        const esc = (s) => s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        this._bairroRe = this._BAIRROS_BERTIOGA.map(([nome, aliases]) =>
          [nome, aliases.map(x => new RegExp('(?:^|\\b)' + esc(x) + '(?:\\b|$)'))]);
      }
      for (const [nome, res] of this._bairroRe) {
        for (const re of res) { if (re.test(a)) return nome; }
      }
      return '';
    },

    // ── Revisar cadastros incompletos ──────────────────────────
    _REVISAR_CAMPOS: [
      { key: 'foto',       label: 'Foto',       falta: c => !c.foto_thumb },
      { key: 'telefone',   label: 'Telefone',   falta: c => !c.telefone },
      { key: 'endereco',   label: 'Endereço',   falta: c => !c.endereco },
      { key: 'bairro',     label: 'Bairro',     falta: c => !c.bairro },
      { key: 'cpf',        label: 'CPF',        falta: c => !c.cpf },
      { key: 'nascimento', label: 'Nascimento', falta: c => !c.data_nascimento },
    ],
    _revisarFiltro: 'foto',

    _revisarFaltando(c) { return this._REVISAR_CAMPOS.filter(campo => campo.falta(c)); },

    _abrirModalRevisar() {

    _revisarSetFiltro(k) { this._revisarFiltro = k; this._revisarRender(); },

    _revisarRender() {
      const cidadaos = this.state.dados.cidadaos || [];
      const contagem = {};
      this._REVISAR_CAMPOS.forEach(campo => { contagem[campo.key] = cidadaos.filter(c => campo.falta(c)).length; });
      const algum = (c) => this._REVISAR_CAMPOS.some(campo => campo.falta(c));

      if (chips) chips.innerHTML = chip('tudo', 'Qualquer falta', totalInc) + this._REVISAR_CAMPOS.map(campo => chip(campo.key, 'Sem ' + campo.label.toLowerCase(), contagem[campo.key])).join('');

              ${this._revisarFaltando(c).map(x => `<span class="text-[10px] uppercase tracking-wide px-1.5 py-0.5 rounded-full" style="background:var(--accent-light);color:var(--accent)">falta ${esc(x.label.toLowerCase())}</span>`).join('')}
            </div>
          </div>
          <i data-lucide="pencil" style="width:14px;height:14px" class="text-ink-muted shrink-0"></i>

        + (lista.length > CAP ? `<p class="text-[12px] text-ink-muted text-center py-3">Mostrando ${CAP} de ${lista.length} — vá completando que a lista diminui.</p>` : '');
      renderLucide();

    async _importProcessarArquivo(input) {
      const file = input.files && input.files[0];
      if (!file) return;
      const box = document.getElementById('import-preview');
      if (box) box.innerHTML = '<p class="text-[13px] text-ink-soft py-4">Lendo arquivo…</p>';
      let parsed;
      try {
        if (/\.json$/i.test(file.name)) {
          // arquivo pré-processado (cadastro grande já convertido em texto + fotos)
          const arr = JSON.parse(await file.text());
          if (!Array.isArray(arr)) throw new Error('JSON precisa ser uma lista de cidadãos.');
          // Coage campos string-sensíveis (CPF/telefone podem vir numéricos no JSON) —
          // senão o dedup (.replace) quebraria fora do try.
          const str = (v) => (v == null ? '' : String(v));
          parsed = arr.filter(o => o && o.nome != null && str(o.nome).trim()).map(o => ({
            ...o, fonte: o.fonte || 'importacao',
            nome: str(o.nome).trim(), cpf: str(o.cpf), rg: str(o.rg),
            telefone: str(o.telefone), telefone2: str(o.telefone2), email: str(o.email),
            endereco: str(o.endereco), bairro: str(o.bairro).trim(), data_nascimento: str(o.data_nascimento),
            titulo_eleitor: str(o.titulo_eleitor), zona_eleitoral: str(o.zona_eleitoral), secao_eleitoral: str(o.secao_eleitoral),
          }));
        } else {
          parsed = await this._importParseDocx(file);
        }
      }
      catch (e) { if (box) box.innerHTML = `<p class="text-[13px] text-red-500 py-4">Erro ao ler: ${esc(e.message)}</p>`; return; }
      if (!parsed.length) { if (box) box.innerHTML = '<p class="text-[13px] text-ink-soft py-4">Nenhuma ficha reconhecida. Verifique se o documento tem uma tabela por pessoa com "Nome:".</p>'; return; }

      // deriva o bairro a partir do endereço quando não veio separado
      parsed.forEach(o => { if (!o.bairro && o.endereco) o.bairro = this._extrairBairro(o.endereco); });

      // dedup contra base existente + dentro do lote (multi-chave)
      const existentes = new Set();
      (this.state.dados.cidadaos || []).forEach(c => this._importChaves(c).forEach(k => existentes.add(k)));
      const noLote = new Set();
      this._importPreview = parsed.map(obj => {
        const chaves = this._importChaves(obj);
        let dup = null;
        if (chaves.some(k => existentes.has(k))) dup = 'existente';
        else if (chaves.some(k => noLote.has(k))) dup = 'lote';
        chaves.forEach(k => noLote.add(k));
        return { obj, dup, sel: !dup };
      });
      this._importRenderPreview();
    },

    _importRenderPreview() {
      const box = document.getElementById('import-preview');
      const pv = this._importPreview || [];
      const novos = pv.filter(p => !p.dup).length;
      const dups = pv.length - novos;
      const selN = pv.filter(p => p.sel).length;
      box.innerHTML = `
        <div class="flex items-center justify-between mb-2">
          <p class="text-[13px]"><strong>${pv.length}</strong> fichas · <span class="text-[color:var(--accent)]">${dups} duplicada(s)</span> · ${novos} nova(s)</p>
          <button data-act="a145" class="text-[12px] text-ink-soft hover:text-ink">Marcar/desmarcar todos</button>
        </div>
        <div class="border border-hairline rounded-lg divide-y divide-[color:var(--hairline)] max-h-[40vh] overflow-y-auto">
          ${pv.map((p, i) => `
            <label class="flex items-center gap-3 px-3 py-2 cursor-pointer hover:bg-sunken">
              <input type="checkbox" ${p.sel ? 'checked' : ''} data-change="d9" data-g0="${i}" class="rounded border-slate-300">
              <div class="min-w-0 flex-1">
                <p class="text-[13px] font-medium truncate">${p.obj.numero ? `#${esc(String(p.obj.numero))} ` : ''}${esc(p.obj.nome)}</p>
                <p class="text-[11px] text-ink-muted truncate">${[p.obj.telefone, p.obj.cpf, p.obj.bairro, p.obj.profissao].filter(Boolean).map(esc).join(' · ')}</p>
              </div>
              ${p.dup ? `<span class="text-[10px] uppercase tracking-widest font-semibold px-2 py-0.5 rounded-full" style="background:var(--accent-light);color:var(--accent)">${p.dup === 'existente' ? 'Já existe' : 'Repetido'}</span>` : '<span class="text-[10px] uppercase tracking-widest font-semibold px-2 py-0.5 rounded-full" style="background:rgba(16,185,129,.12);color:#059669">Novo</span>'}
            </label>`).join('')}
        </div>`;
      const footer = document.getElementById('import-footer');
      if (footer) footer.innerHTML = `
        <button data-act="a0" class="btn btn-ghost text-[13px]">Cancelar</button>
        <button data-act="a146" class="btn btn-primary text-[13px]" ${selN ? '' : 'disabled style="opacity:.5"'}>Importar ${selN} selecionado(s)</button>`;
      renderLucide();
    },

    _importToggle(i) { if (this._importPreview?.[i]) { this._importPreview[i].sel = !this._importPreview[i].sel; this._importRenderPreview(); } },
    _importToggleTodos() {
      const pv = this._importPreview || [];
      const alvo = !pv.every(p => p.sel);
      pv.forEach(p => p.sel = alvo);
      this._importRenderPreview();
    },

    async _importConfirmar() {
      const pv = (this._importPreview || []).filter(p => p.sel);
      if (!pv.length) { toast('Nada selecionado.', 'warning'); return; }
      const d = this.state.dados;
      d.cidadaos = d.cidadaos || [];
      let prox = Math.max(0, ...(d.cidadaos).map(x => +x.numero || 0), d.contadores?.cidadaos || 0);
      // Evita colisão de número (explícitos podem repetir entre si ou com existentes).
      const usados = new Set((d.cidadaos).map(x => +x.numero).filter(Boolean));
      const novos = pv.map(p => {
        const o = p.obj;
        const loc = this._colegioPorSecao(o.secao_eleitoral);
        let numero = +o.numero || 0;
        if (!numero || usados.has(numero)) { do { numero = ++prox; } while (usados.has(numero)); }
        usados.add(numero);
        if (numero > prox) prox = numero;
        return {
          id: gerarUUID(),
          numero,
          nome: o.nome, cpf: o.cpf || '', rg: o.rg || '',
          data_nascimento: o.data_nascimento || '', genero: '', estado_civil: o.estado_civil || '',
          escolaridade: o.escolaridade || '', profissao: o.profissao || '', filhos: o.filhos || '',
          telefone: o.telefone || '', telefone2: o.telefone2 || '', email: o.email || '', facebook: o.facebook || '',
          bairro: o.bairro || '', endereco: o.endereco || '',
          titulo_eleitor: o.titulo_eleitor || '', zona_eleitoral: o.zona_eleitoral || '',
          secao_eleitoral: o.secao_eleitoral || '', uf_eleitoral: o.uf_eleitoral || 'SP',
          colegio: loc ? loc.nome : '', colegio_endereco: loc ? `${loc.endereco}${loc.bairro ? ' · ' + loc.bairro : ''}` : '',
          indicacao: o.indicacao || '', data_cadastro: hoje(),
          como_conheceu: '', fonte: 'importacao', foto_thumb: this._fotoSegura(o.foto_thumb) || '',
          tags: [], observacoes: o.observacoes || '',
          consentimento_lgpd: { aceito: false, data: null, versao_termo: this._TERMO_LGPD_VERSAO },
          interacoes: [], criado_em: new Date().toISOString(),
        };
      });
      // adiciona os bairros descobertos à lista (KPI "bairros atendidos" + filtro)
      const bset = new Set(d.bairros || []);
      novos.forEach(c => { if (c.bairro) bset.add(c.bairro); });
      d.bairros = Array.from(bset).sort();
      let okSalvo = false;
      try {
        d.cidadaos = novos.concat(d.cidadaos);
        if (d.contadores) d.contadores.cidadaos = prox;
        okSalvo = await this.salvar(); // aguarda a persistência REAL (localStorage ou IndexedDB)
      } catch (e) { okSalvo = false; }
      if (!okSalvo) {
        toast('Erro ao salvar (limite de armazenamento). Faça um backup agora e importe em lotes menores.', 'error', 8000);
        return; // não declara sucesso falso — dados ficam em memória para o usuário exportar
      }
      registrarLog('importar_cidadaos', 'cidadaos', `${novos.length} cidadãos importados`, null);
      fecharModal();
      this.renderCidadaos();
      toast(`${novos.length} cidadão(s) importado(s).`, 'success');
    },

    // ═══════════════════════════════════════════════════════════
    // SELETOR DE CIDADÃO (compartilhado: Cesta Básica, Saúde)
    // ═══════════════════════════════════════════════════════════
    _cidById(id) { return (this.state.dados.cidadaos || []).find(c => c.id === id) || null; },

    _dataBR(s) {
      if (!s) return '—';
      try { return new Date(s.length === 10 ? s + 'T00:00:00' : s).toLocaleDateString('pt-BR'); }
      catch (e) { return s; }
    },

    _cidPickerSel: {},

    _cidPickerHTML(ctx, selId) {
      this._cidPickerSel[ctx] = selId || null;
      const c = selId ? this._cidById(selId) : null;
      return `<div id="picker-${ctx}-wrap">${c ? this._cidPickerCardHTML(ctx, c) : this._cidPickerBuscaHTML(ctx)}</div>`;
    },
    _cidPickerBuscaHTML(ctx) {
      return `
        <input id="picker-${ctx}-input" type="text" placeholder="Buscar cidadão pelo nome..." autocomplete="off"
               data-input="a147" data-n0="${esc(ctx)}"
               class="w-full text-sm rounded-lg border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 px-3 py-2 focus:outline-none focus:ring-2 ring-primary" />
        <div id="picker-${ctx}-results" class="mt-1 space-y-1"></div>
        <p class="text-[11px] text-ink-muted mt-1">A pessoa precisa estar cadastrada em Cidadãos.</p>`;
    },
    _cidPickerCardHTML(ctx, c) {
      return `
        <div class="flex items-center gap-3 p-2 rounded-lg border border-hairline bg-surface">
          ${this._avatarCidadao(c, 36)}
          <div class="min-w-0 flex-1">
            <p class="font-medium text-sm truncate">${c.numero ? `#${esc(String(c.numero))} ` : ''}${esc(c.nome)}</p>

        </div>`;
