  // ── PWA: Service Worker + Install Banner + apple-touch-icon ──
  (function() {
    'use strict';

    const DISMISS_KEY = 'gabinete_pwa_install_dismissed';
    const DISMISS_DAYS = 30;
    let deferredPrompt = null;

    function gerarAppleTouchIcon() {
      try {
        fetch('./icon.svg').then(r => r.text()).then(svgText => {
          const blob = new Blob([svgText], { type: 'image/svg+xml' });
          const svgUrl = URL.createObjectURL(blob);
          const img = new Image();
          img.onload = () => {
            [180, 192, 512].forEach(size => {
              const canvas = document.createElement('canvas');
              canvas.width = size; canvas.height = size;
              const ctx = canvas.getContext('2d');
              ctx.drawImage(img, 0, 0, size, size);
              canvas.toBlob((pngBlob) => {
                if (!pngBlob) return;
                const pngUrl = URL.createObjectURL(pngBlob);
                if (size === 180) {
                  const link = document.getElementById('apple-touch-icon-link');
                  if (link) link.href = pngUrl;
                }
              }, 'image/png');
            });
            URL.revokeObjectURL(svgUrl);
          };
          img.onerror = () => URL.revokeObjectURL(svgUrl);
          img.src = svgUrl;
        }).catch(() => {});
      } catch (e) { /* silent */ }
    }

    function jaDismissado() {
      try {
        const v = localStorage.getItem(DISMISS_KEY);
        if (!v) return false;
        const t = parseInt(v, 10);
        if (isNaN(t)) return false;
        return (Date.now() - t) / 86400000 < DISMISS_DAYS;
      } catch (e) { return false; }
    }

    function el(tag, className, text) {
      const n = document.createElement(tag);
      if (className) n.className = className;
      if (text) n.textContent = text;
      return n;
    }

    function mostrarBannerInstalacao() {
      if (document.getElementById('pwa-install-banner')) return;

      const banner = el('div');
      banner.id = 'pwa-install-banner';
      banner.className = 'fixed bottom-4 left-4 right-4 md:left-auto md:right-4 md:w-96 z-[9998] rounded-2xl shadow-card bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 p-4 flex items-start gap-3';
      banner.style.animation = 'slideUp 0.35s cubic-bezier(.4,0,.2,1)';

      const iconWrap = el('div', 'w-11 h-11 rounded-xl bg-primary text-white grid place-items-center shrink-0');
      const iconI = el('i', 'fa-solid fa-arrow-down-to-bracket');
      iconWrap.appendChild(iconI);

      const body = el('div', 'flex-1 min-w-0');
      body.appendChild(el('p', 'font-semibold text-sm text-slate-900 dark:text-slate-100', 'Instalar como app'));
      body.appendChild(el('p', 'text-xs text-slate-500 dark:text-slate-400 mt-0.5', 'Acesso rápido e funcionamento offline.'));

      const actions = el('div', 'flex gap-2 mt-3');
      const btnInstall = el('button', 'px-3 py-1.5 rounded-lg bg-primary text-white text-xs font-semibold hover:bg-primary-dark', 'Instalar');
      btnInstall.id = 'pwa-install-btn';
      const btnLater = el('button', 'px-3 py-1.5 rounded-lg text-slate-600 dark:text-slate-300 text-xs font-semibold hover:bg-slate-100 dark:hover:bg-slate-700', 'Depois');
      btnLater.id = 'pwa-install-dismiss';
      actions.appendChild(btnInstall);
      actions.appendChild(btnLater);
      body.appendChild(actions);

      const btnClose = el('button', 'text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 shrink-0');
      btnClose.id = 'pwa-install-close';
      btnClose.setAttribute('aria-label', 'Fechar');
      btnClose.appendChild(el('i', 'fa-solid fa-xmark'));

      banner.appendChild(iconWrap);
      banner.appendChild(body);
      banner.appendChild(btnClose);
      document.body.appendChild(banner);

      const remover = () => banner.remove();
      const dispensar = () => {
        remover();
        try { localStorage.setItem(DISMISS_KEY, String(Date.now())); } catch (e) {}
      };

      btnInstall.addEventListener('click', async () => {
        remover();
        if (!deferredPrompt) return;
        try {
          deferredPrompt.prompt();
          await deferredPrompt.userChoice;
        } catch (e) {}
        deferredPrompt = null;
      });
      btnLater.addEventListener('click', dispensar);
      btnClose.addEventListener('click', dispensar);
    }

    window.addEventListener('load', () => {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./service-worker.js').catch(() => {});
      }
      gerarAppleTouchIcon();
    });

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      if (jaDismissado()) return;
      setTimeout(mostrarBannerInstalacao, 3000);
    });

    window.addEventListener('appinstalled', () => {
      const b = document.getElementById('pwa-install-banner');
      if (b) b.remove();
      deferredPrompt = null;
      try { localStorage.removeItem(DISMISS_KEY); } catch (e) {}

    });
  })();
