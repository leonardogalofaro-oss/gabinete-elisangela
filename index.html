  // SEÇÃO 5 — CRIPTOGRAFIA, HASHING E COMPARAÇÃO SEGURA
  // ════════════════════════════════════════════════════════════════

  /**
   * Comparação de strings em tempo constante (timing-safe).
   * Evita timing attacks na verificação de hashes.
   */
  function timingSafeEqual(a, b) {
    if (typeof a !== 'string' || typeof b !== 'string') return false;
    if (a.length !== b.length) return false;
    let result = 0;
    for (let i = 0; i < a.length; i++) {
      result |= a.charCodeAt(i) ^ b.charCodeAt(i);
    }
    return result === 0;
  }

  /**
   * Gera hash de senha com salt usando PBKDF2.
   * Formato armazenado: "salt_hex:hash_hex"
   * @param {string} senha - senha em texto puro
   * @param {string} [saltExistente] - salt hex para verificação (omitir para gerar novo)
   * @returns {string} "salt:hash"
   */
  function hashSenha(senha, saltExistente) {
    const salt = saltExistente
      ? CryptoJS.enc.Hex.parse(saltExistente)
      : CryptoJS.lib.WordArray.random(128 / 8);
    const hash = CryptoJS.PBKDF2(senha, salt, {
      keySize: 256 / 32,
      iterations: 10000,
    });
    return salt.toString(CryptoJS.enc.Hex) + ':' + hash.toString(CryptoJS.enc.Hex);
  }

  /**
   * Verifica uma senha contra um hash armazenado.
   * Compatível com formato antigo (SHA256 sem salt) e novo (PBKDF2 salt:hash).
   * @param {string} senha - senha digitada
   * @param {string} hashArmazenado - hash salvo no banco
   * @returns {boolean}
   */
  function verificarSenha(senha, hashArmazenado) {
    if (!senha || !hashArmazenado) return false;
    // Formato novo: "salt_hex:hash_hex" (salt tem 32 chars hex = 16 bytes)
    if (hashArmazenado.includes(':')) {
      const [saltHex] = hashArmazenado.split(':');
      const hashCalculado = hashSenha(senha, saltHex);
      return timingSafeEqual(hashCalculado, hashArmazenado);
    }
    // Formato legado: SHA256 sem salt (migração transparente)
    const hashLegado = CryptoJS.SHA256(senha).toString();
    return timingSafeEqual(hashLegado, hashArmazenado);
  }

  const Crypto = {
    // Formato EGB1: PBKDF2-SHA256(100k) deriva 512 bits (256 cifra + 256 HMAC),
    // AES-256-CBC com IV aleatório, e HMAC-SHA256 (encrypt-then-MAC) para integridade.
    // Muito mais forte que o KDF legado do CryptoJS (MD5, 1 iteração). Mantém
    // compatibilidade lendo o formato antigo (passphrase). Chaves em cache por sessão.
    ITER: 100000,
    _keyCache: {},
    _sessionSalt: null,

    _deriveKeys(senha, saltHex) {
      // Chave do cache via hash (não a senha em texto) — evita que a senha mestre
      // fique como substring enumerável de Object.keys(_keyCache) no heap.
      const ck = CryptoJS.SHA256(senha + '|' + saltHex).toString();
      if (this._keyCache[ck]) return this._keyCache[ck];
      const salt = CryptoJS.enc.Hex.parse(saltHex);
      const dk = CryptoJS.PBKDF2(senha, salt, { keySize: 512 / 32, iterations: this.ITER, hasher: CryptoJS.algo.SHA256 });
      const keys = {
        encKey: CryptoJS.lib.WordArray.create(dk.words.slice(0, 8), 32),
        macKey: CryptoJS.lib.WordArray.create(dk.words.slice(8, 16), 32),
      };
      this._keyCache[ck] = keys;
      return keys;
    },

    criptografar(dados, senha) {
      if (!this._sessionSalt) this._sessionSalt = CryptoJS.lib.WordArray.random(16).toString(CryptoJS.enc.Hex);
      const saltHex = this._sessionSalt;
      const { encKey, macKey } = this._deriveKeys(senha, saltHex);
      const iv = CryptoJS.lib.WordArray.random(16);
      const ct = CryptoJS.AES.encrypt(JSON.stringify(dados), encKey, { iv, mode: CryptoJS.mode.CBC, padding: CryptoJS.pad.Pkcs7 }).ciphertext;
      const ivHex = iv.toString(CryptoJS.enc.Hex);
      const ctB64 = ct.toString(CryptoJS.enc.Base64);
      const mac = CryptoJS.HmacSHA256(saltHex + ':' + ivHex + ':' + ctB64, macKey).toString(CryptoJS.enc.Hex);
      return 'EGB1:' + saltHex + ':' + ivHex + ':' + ctB64 + ':' + mac;
    },

    /**
     * Descriptografa. Retorna null se a senha for incorreta, o dado corrompido,
     * ou (no formato EGB1) o HMAC não bater (adulteração/integridade).
     */
    descriptografar(cipher, senha) {
      try {
        if (typeof cipher === 'string' && cipher.startsWith('EGB1:')) {
          const [, saltHex, ivHex, ctB64, mac] = cipher.split(':');
          const { encKey, macKey } = this._deriveKeys(senha, saltHex);
          const macCalc = CryptoJS.HmacSHA256(saltHex + ':' + ivHex + ':' + ctB64, macKey).toString(CryptoJS.enc.Hex);
          if (!timingSafeEqual(macCalc, mac)) return null; // senha errada OU adulteração
          const bytes = CryptoJS.AES.decrypt(
            { ciphertext: CryptoJS.enc.Base64.parse(ctB64) },
            encKey,
            { iv: CryptoJS.enc.Hex.parse(ivHex), mode: CryptoJS.mode.CBC, padding: CryptoJS.pad.Pkcs7 }
          );
          const texto = bytes.toString(CryptoJS.enc.Utf8);
          if (!texto) return null;
          this._sessionSalt = this._sessionSalt || saltHex; // reusa o salt → menos derivações
          return JSON.parse(texto);
        }
        // LEGADO: formato antigo (passphrase OpenSSL/EVP) — compatibilidade de leitura.
        const bytes = CryptoJS.AES.decrypt(cipher, senha);
        const texto = bytes.toString(CryptoJS.enc.Utf8);
        if (!texto) return null;
        return JSON.parse(texto);
      } catch {
        return null;
      }
    },
  };

  // ════════════════════════════════════════════════════════════════
  // SEÇÃO 6 — STORAGE LAYER (localStorage com criptografia)
  // ════════════════════════════════════════════════════════════════

  /**
   * Nomenclatura das chaves no localStorage:
   *   gabinete_{uuid}_meta  → JSON plano (identificação pública)
   *   gabinete_{uuid}_data  → AES-256 (todos os dados do gabinete)
   *   gabinete_{uuid}_foto  → AES-256 (base64 da foto/logo)
   *   gabinete_darkmode     → '0' ou '1' (preferência de tema)
   */

  // Armazenamento chave→valor em IndexedDB (suporta MB; usado quando o bloco
  // de dados não cabe no localStorage — ex.: milhares de cidadãos).
  const IdbKV = {
    _db: null,
    DB: 'gabinete_kv',
    STORE: 'kv',
    _open() {
      if (this._db) return Promise.resolve(this._db);
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(this.DB, 1);
        req.onupgradeneeded = () => {
          const db = req.result;
          if (!db.objectStoreNames.contains(this.STORE)) db.createObjectStore(this.STORE);
        };
        req.onsuccess = () => { this._db = req.result; resolve(this._db); };
        req.onerror = () => reject(req.error);
      });
    },
    async set(k, v) {
      const db = await this._open();
      return new Promise((res, rej) => {
        const tx = db.transaction(this.STORE, 'readwrite');
        tx.objectStore(this.STORE).put(v, k);
        tx.oncomplete = () => res(true);
        tx.onerror = () => rej(tx.error);
      });
    },
    async get(k) {
      const db = await this._open();
      return new Promise((res, rej) => {
        const tx = db.transaction(this.STORE, 'readonly');
        const r = tx.objectStore(this.STORE).get(k);
        r.onsuccess = () => res(r.result || null);
        r.onerror = () => rej(r.error);
      });
    },
    async del(k) {
      const db = await this._open();
      return new Promise((res) => {
        const tx = db.transaction(this.STORE, 'readwrite');
        tx.objectStore(this.STORE).delete(k);
        tx.oncomplete = () => res(true);
        tx.onerror = () => res(false);
      });
    },
  };

  const Storage = {
    // ── Chaves ──────────────────────────────────────────────────

    _keyMeta(uuid) { return `gabinete_${uuid}_meta`; },
    _keyData(uuid) { return `gabinete_${uuid}_data`; },
    _keyFoto(uuid) { return `gabinete_${uuid}_foto`; },

    // ── Meta (não criptografado — apenas identificação) ──────────

    /**
     * Salva os dados de identificação do gabinete (sem criptografia).
     * Usado na tela de login para exibir nome/cidade sem pedir senha.
     */
    salvarMeta(uuid, meta) {
      localStorage.setItem(this._keyMeta(uuid), JSON.stringify(meta));
    },

    carregarMeta(uuid) {
      const raw = localStorage.getItem(this._keyMeta(uuid));
      if (!raw) return null;
      try { return JSON.parse(raw); }
      catch (e) { console.warn('meta corrompido', e); return null; }
    },

    // ── Dados principais (criptografados) ────────────────────────

    /**
     * Criptografa e salva os dados do gabinete.
     * @param {string} uuid
     * @param {object} dados - objeto completo de dados
     * @param {string} senha - senha do gabinete
     */
    // Cache do último cipher em memória (permite backup síncrono mesmo quando
    // os dados moram no IndexedDB).
    _cipherCache: {},

    salvarDados(uuid, dados, senha) {
      const cipher = Crypto.criptografar(dados, senha);
      this._cipherCache[uuid] = cipher;
      return this._gravarCipher(uuid, cipher); // Promise<boolean> — quem importa em massa pode aguardar
    },

    _idbWriting: 0,

    // Grava o cipher onde couber: localStorage (rápido) ou IndexedDB (grande).
    // Invariante de segurança: sempre existe UMA cópia válida — no overflow,
    // o localStorage antigo só é removido DEPOIS que o IndexedDB confirma.
    // Um marcador "__idb" diz onde está a fonte de verdade (evita ler dado velho).
    // Retorna uma Promise que resolve quando a gravação realmente persistiu
    // (importante para a importação aguardar antes de recarregar a página).
    _gravarCipher(uuid, cipher) {
      const key = this._keyData(uuid);
      const flag = key + '__idb';
      try {
        localStorage.setItem(key, cipher);
        localStorage.removeItem(flag);
        IdbKV.del(key).catch(() => {});
        return Promise.resolve(true);
      } catch (e) {
        // Excedeu a cota do localStorage (milhares de cadastros) → IndexedDB.
        this._idbWriting++;
        return IdbKV.set(key, cipher)
          .then(() => { try { localStorage.setItem(flag, '1'); localStorage.removeItem(key); } catch (_) {} return true; })
          .catch(() => { toast('Erro ao salvar (armazenamento). Faça um backup por segurança.', 'error', 8000); return false; })
          .finally(() => { this._idbWriting--; });
      }
    },

    /**
     * Carrega e descriptografa os dados do gabinete (async — pode vir do IndexedDB).
     * O marcador "__idb" indica a fonte de verdade, evitando ler cópia velha.
     * Retorna null se a senha estiver incorreta (ou o dado não descriptografar).
     */
    async carregarDados(uuid, senha) {
      const key = this._keyData(uuid);
      let cipher = null;
      if (localStorage.getItem(key + '__idb') === '1') {
        try { cipher = await IdbKV.get(key); } catch (e) {}
        if (!cipher) cipher = localStorage.getItem(key); // fallback
      } else {
        cipher = localStorage.getItem(key);
        if (!cipher) { try { cipher = await IdbKV.get(key); } catch (e) {} }
      }
      if (!cipher) return null;
      const dados = Crypto.descriptografar(cipher, senha);
      if (dados) {
        // Migração de segurança: se o blob veio no formato LEGADO (sem HMAC, KDF fraco),
        // re-cifra já em EGB1 e regrava — não deixa cripto fraca persistir (anti-downgrade).
        if (typeof cipher === 'string' && !cipher.startsWith('EGB1:')) {
          try { const novo = Crypto.criptografar(dados, senha); this._cipherCache[uuid] = novo; this._gravarCipher(uuid, novo); }
          catch (e) { this._cipherCache[uuid] = cipher; }
        } else {
          this._cipherCache[uuid] = cipher;
        }
      }
      return dados;
    },

    // ── Foto / logo (criptografada) ──────────────────────────────

    salvarFoto(uuid, base64, senha) {
      if (!base64) return;
      localStorage.setItem(this._keyFoto(uuid), Crypto.criptografar(base64, senha));
    },

    carregarFoto(uuid, senha) {
      const cipher = localStorage.getItem(this._keyFoto(uuid));
      if (!cipher) return null;
      return Crypto.descriptografar(cipher, senha);
    },

    // ── Utilitários ──────────────────────────────────────────────

    /**
     * Retorna o UUID de qualquer gabinete salvo neste navegador.
     * Varre o localStorage procurando chaves no padrão gabinete_*_meta.
     * @returns {string|null}
     */
    encontrarUUID() {
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        const match = key && key.match(/^gabinete_([a-f0-9-]{36})_meta$/);
        if (match) return match[1];
      }
      return null;
    },

    /**
     * Remove completamente todos os dados de um gabinete.
     * AÇÃO IRREVERSÍVEL — exige confirmação na UI antes de chamar.
     */
    limparGabinete(uuid) {
      localStorage.removeItem(this._keyMeta(uuid));
      localStorage.removeItem(this._keyData(uuid));
      localStorage.removeItem(this._keyData(uuid) + '__idb');
      localStorage.removeItem(this._keyFoto(uuid));
      localStorage.removeItem(`gabinete_${uuid}_sync`); // token do GitHub (cifrado) também sai no "Apagar tudo"
      delete this._cipherCache[uuid];
      IdbKV.del(this._keyData(uuid)).catch(() => {});
      // Remove também os anexos (dados de cidadãos — LGPD) do IndexedDB.
      try { indexedDB.deleteDatabase(AnexoStore.DB_PREFIX + uuid); } catch (e) {}
    },

    /**
     * Exporta os dados brutos (cipher) como objeto para backup.
     * O arquivo exportado ainda está criptografado — seguro para envio.
     */
    exportarBackup(uuid) {
      return {
        versao:    VERSAO,
        exportado: new Date().toISOString(),
        meta:      this.carregarMeta(uuid),   // não criptografado
        data:      this._cipherCache[uuid] || localStorage.getItem(this._keyData(uuid)), // cipher
        foto:      localStorage.getItem(this._keyFoto(uuid)), // cipher
      };
    },

    /**
     * Importa um backup exportado por exportarBackup().
     * Verifica a senha antes de sobrescrever os dados.
     * @returns {boolean} true se importação bem-sucedida
     */
    async importarBackup(backup, senha) {
      if (!backup || !backup.meta || !backup.data || !backup.meta.uuid) return false;
      // Descriptografa para testar a senha E sanear o conteúdo antes de confiar nele.
      const dados = Crypto.descriptografar(backup.data, senha);
      if (!dados) return false; // senha incorreta

      // SEGURANÇA: regenera ids malformados antes de persistir (fecha XSS via backup forjado).
      try { sanearIdsMalformados(dados); } catch (e) { /* segue com o que deu */ }
      const cipher = Crypto.criptografar(dados, senha); // re-cifra já saneado (migra p/ EGB1)

      const uuid = backup.meta.uuid;
      // Grava os DADOS primeiro e confere — só então meta/foto (evita estado
      // inconsistente / perda silenciosa se a cota estourar no meio).
      this._cipherCache[uuid] = cipher;
      const ok = await this._gravarCipher(uuid, cipher);
      if (!ok) { delete this._cipherCache[uuid]; return false; }
      try { localStorage.setItem(this._keyMeta(uuid), JSON.stringify(backup.meta)); } catch (e) {}
      if (backup.foto) {
        try { localStorage.setItem(this._keyFoto(uuid), backup.foto); } catch (e) {}
      }
      // App de gabinete único: remove QUALQUER outro gabinete (uuid diferente) para o
      // reload não carregar o gabinete errado.
      try {
        const outros = new Set();
        for (let i = 0; i < localStorage.length; i++) {
          const k = localStorage.key(i);
          const mm = k && k.match(/^gabinete_([a-f0-9-]{36})_meta$/);
          if (mm && mm[1] !== uuid) outros.add(mm[1]);
        }
        outros.forEach(u => this.limparGabinete(u));
      } catch (e) { /* não crítico */ }
      return ok;
    },
  };

  // Se houver gravação grande no IndexedDB ainda em voo, avisa antes de fechar a aba.
  window.addEventListener('beforeunload', (e) => {
    if (Storage._idbWriting > 0) { e.preventDefault(); e.returnValue = ''; }
  });

  // ════════════════════════════════════════════════════════════════
  // SEÇÃO 7 — SESSÃO (timeout automático de 30 minutos)
  // ════════════════════════════════════════════════════════════════

  const TIMEOUT_MS = 30 * 60 * 1000; // 30 minutos
  let _timerTimeout = null;
  let _ultimaAtividade = Date.now();

  /** Reinicia o contador de inatividade. Chamado a cada interação do usuário. */
  function resetarTimeout() {
    _ultimaAtividade = Date.now();
  }

  /** Inicia o monitoramento de inatividade. Chamado após login bem-sucedido. */
  function iniciarTimeout() {
    pararTimeout();
    // Escuta eventos de atividade do usuário (com throttle de 30s)
    let _lastThrottle = 0;
    const handler = () => {
      const agora = Date.now();
      if (agora - _lastThrottle > 30000) {
        _lastThrottle = agora;
        resetarTimeout();
      }
    };
    document.addEventListener('mousemove', handler, { passive: true });
    document.addEventListener('keydown',   handler, { passive: true });
    document.addEventListener('click',     handler, { passive: true });
    document.addEventListener('touchstart',handler, { passive: true });

    // Verifica a cada 30 segundos se o timeout expirou
    _timerTimeout = setInterval(() => {
      if (Date.now() - _ultimaAtividade >= TIMEOUT_MS) {
        pararTimeout();
        App.bloquear();
      }
    }, 30000);
  }

  /** Para o monitoramento de inatividade. */
  function pararTimeout() {
    if (_timerTimeout) {
      clearInterval(_timerTimeout);
      _timerTimeout = null;
    }
  }

  // ════════════════════════════════════════════════════════════════
  // SEÇÃO 8 — SISTEMA MULTI-USUÁRIO (helpers)
  // ════════════════════════════════════════════════════════════════

  /**
   * Verifica se o usuário logado tem permissão para uma ação em um módulo.
   * Vereador (admin) sempre tem todas as permissões.
   * @param {string} modulo - chave do módulo (ex: 'demandas')
   * @param {string} acao   - 'ver', 'criar', 'editar' ou 'excluir'
   * @returns {boolean}
   */
  function temPermissao(modulo, acao) {
    const u = App.state.usuario_logado;
    if (!u) return false;
    if (u.tipo === 'vereador') return true;
    return !!(u.permissoes && u.permissoes[modulo] && u.permissoes[modulo][acao]);
  }

  /**
   * Verifica se o usuário logado é o vereador (admin).
   * @returns {boolean}
   */
  function isAdmin() {
    return App.state.usuario_logado?.tipo === 'vereador';
  }

  /**
   * Gera permissões totais (usada para o vereador).
   * @returns {object}
   */
  function gerarPermissoesTotais() {
    return PERFIS_PERMISSAO.acesso_total.gerar();
  }

  /**
   * Registra uma ação no log de atividades.
   * Mantém FIFO de 500 registros.
   * @param {string} acao    - ex: 'login', 'criar_demanda'
   * @param {string} modulo  - ex: 'demandas', 'oficios'
   * @param {string} descricao - texto livre
   * @param {string|null} item_id - ID do item afetado
   */
  function registrarLog(acao, modulo, descricao, item_id = null) {
    if (!App.state.dados) return;
    if (!App.state.dados.log_atividades) App.state.dados.log_atividades = [];
    const u = App.state.usuario_logado;
    App.state.dados.log_atividades.unshift({
      id:            gerarUUID(),
      data:          new Date().toISOString(),
      usuario_id:    u?.id || '',
      usuario_nome:  u?.nome || App.state.meta?.nome_vereador || 'Sistema',
      acao,
      modulo,
      descricao,
      item_id,
    });
    // FIFO — manter apenas 500 registros
    if (App.state.dados.log_atividades.length > 500) {
      App.state.dados.log_atividades = App.state.dados.log_atividades.slice(0, 500);
    }
  }

  // ════════════════════════════════════════════════════════════════
  // ANEXOS — IndexedDB + AES-256
  // ════════════════════════════════════════════════════════════════
  // Decisão de design (export/import): os blobs permanecem CIFRADOS
  // dentro do .zip exportado, mantendo o mesmo padrão de segurança do
  // export atual (data field cifrado). O backup inteiro é inútil sem a
  // senha do gabinete — reduz risco de vazamento de documentos pessoais
  // (LGPD). No import, a senha verifica automaticamente ao descriptografar.

  const AnexoStore = {
    DB_PREFIX:     'gabinete_anexos_',
    STORE:         'anexos',
    TAMANHO_MAX:   25 * 1024 * 1024, // 25 MB
    MIME_IMG_MAX:  2 * 1024 * 1024,  // thumbnails só para imgs < 2 MB

    _db:     null,
    _dbUuid: null,

    async _open() {
      const uuid = App.state.uuid;
      if (!uuid) throw new Error('Gabinete não identificado.');
      if (this._db && this._dbUuid === uuid) return this._db;
      if (this._db) { try { this._db.close(); } catch(e){} }
      this._db = null;

      return new Promise((resolve, reject) => {
        const req = indexedDB.open(this.DB_PREFIX + uuid, 1);
        req.onupgradeneeded = () => {
          const db = req.result;
          if (!db.objectStoreNames.contains(this.STORE)) {
            const s = db.createObjectStore(this.STORE, { keyPath: 'id' });
            s.createIndex('modulo',      'modulo',      { unique: false });
            s.createIndex('item_id',     'item_id',     { unique: false });
            s.createIndex('modulo_item', ['modulo', 'item_id'], { unique: false });
            s.createIndex('uploaded_em', 'uploaded_em', { unique: false });
          }
        };
        req.onsuccess = () => { this._db = req.result; this._dbUuid = uuid; resolve(req.result); };
        req.onerror   = () => reject(req.error);
      });
    },

    async _store(mode = 'readonly') {
      const db = await this._open();
      return db.transaction(this.STORE, mode).objectStore(this.STORE);
    },

    // ── Criptografia ────────────────────────────────────────────
    categorizar(mime) {
      if (!mime) return 'outro';
      if (mime.startsWith('image/')) return 'foto';
      if (mime === 'application/pdf' ||
          mime.startsWith('application/msword') ||
          mime.includes('officedocument') ||
          mime.startsWith('text/')) return 'documento';
      return 'outro';
    },

    async _criptografarBlob(blob) {
      const buf = await blob.arrayBuffer();
      // ArrayBuffer → base64 (chunked p/ não estourar call stack em arquivos grandes)
      const bytes = new Uint8Array(buf);
      const CHUNK = 0x8000;
      let bin = '';
      for (let i = 0; i < bytes.length; i += CHUNK) {
        bin += String.fromCharCode.apply(null, bytes.subarray(i, i + CHUNK));
      }
      const base64 = btoa(bin);
      const cifrado = Crypto.criptografar({ mime: blob.type, b64: base64 }, App.state.senha);
      return new Blob([cifrado], { type: 'application/octet-stream' });
    },

    async _descriptografarBlob(blobCifrado) {
      const txt = await blobCifrado.text();
      const obj = Crypto.descriptografar(txt, App.state.senha);
      if (!obj || typeof obj.b64 !== 'string') throw new Error('Falha ao descriptografar anexo.');
      const bin = atob(obj.b64);
      const u8 = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) u8[i] = bin.charCodeAt(i);
      // SEGURANÇA: só permite MIME inerte ao abrir no mesmo origin (blob:). Tipos
      // scriptáveis (text/html, image/svg+xml, etc.) viram octet-stream → o navegador
      // baixa em vez de executar script no contexto do app.
      const MIME_OK = { 'image/png':1, 'image/jpeg':1, 'image/jpg':1, 'image/gif':1, 'image/webp':1, 'application/pdf':1, 'text/plain':1 };
      const mime = MIME_OK[(obj.mime || '').toLowerCase()] ? obj.mime : 'application/octet-stream';
      return new Blob([u8], { type: mime });
    },

    // ── CRUD ─────────────────────────────────────────────────────
    async salvar({ modulo, item_id, arquivo, descricao = '' }, onProgress) {
      if (!arquivo) throw new Error('Arquivo ausente.');
      if (arquivo.size > this.TAMANHO_MAX) {
        throw new Error(`Arquivo excede o limite de ${formatarTamanho(this.TAMANHO_MAX)}.`);
      }
      onProgress?.(10);
      const blob_cifrado = await this._criptografarBlob(arquivo);
      onProgress?.(70);

      const registro = {
        id: gerarUUID(),
        modulo,
        item_id,
        nome:        arquivo.name || 'anexo',
        tipo_mime:   arquivo.type || 'application/octet-stream',
        tamanho:     arquivo.size,
        categoria:   this.categorizar(arquivo.type),
        blob_cifrado,
        descricao:   descricao || '',
        uploaded_em: new Date().toISOString(),
        uploaded_por: App.state.usuario_logado?.id || null,
      };

      const store = await this._store('readwrite');
      await new Promise((resolve, reject) => {
        const req = store.put(registro);
        req.onsuccess = () => resolve();
        req.onerror   = () => reject(req.error);
      });
      onProgress?.(100);

      if (typeof registrarLog === 'function') {
        registrarLog('upload_anexo', modulo, `Anexo "${registro.nome}" (${formatarTamanho(registro.tamanho)})`, item_id);
      }
      return registro;
    },

    async salvarCifradoBruto(registro) {
      // Usado pelo import: salva já cifrado, sem re-cripto
      const store = await this._store('readwrite');
      return new Promise((resolve, reject) => {
        const req = store.put(registro);
        req.onsuccess = () => resolve();
        req.onerror   = () => reject(req.error);
      });
    },

    // Re-cifra TODOS os anexos da senha antiga para a nova (na troca de senha mestre).
    // Sem isso, os blobs ficariam ilegíveis após mudar a senha. Retorna {total, falhas}.
    async reCifrarTodos(senhaAntiga, senhaNova) {
      if (!senhaAntiga || !senhaNova || senhaAntiga === senhaNova) return { total: 0, falhas: 0 };
      let todos;
      try {
        const store = await this._store('readonly');
        todos = await new Promise((resolve, reject) => {
          const out = []; const req = store.openCursor();
          req.onsuccess = () => { const c = req.result; if (c) { out.push(c.value); c.continue(); } else resolve(out); };
          req.onerror   = () => reject(req.error);
        });
      } catch (e) { return { total: 0, falhas: 0 }; } // sem DB de anexos ainda
      let falhas = 0;
      for (const reg of todos) {
        try {
          const txt = await reg.blob_cifrado.text();
          const obj = Crypto.descriptografar(txt, senhaAntiga);
          if (!obj || typeof obj.b64 !== 'string') { falhas++; continue; }
          const novoCifrado = Crypto.criptografar({ mime: obj.mime, b64: obj.b64 }, senhaNova);
          reg.blob_cifrado = new Blob([novoCifrado], { type: 'application/octet-stream' });
          await this.salvarCifradoBruto(reg);
        } catch (e) { falhas++; }
      }
      return { total: todos.length, falhas };
    },

    async buscar(id) {
      const store = await this._store('readonly');
      return new Promise((resolve, reject) => {
        const req = store.get(id);
        req.onsuccess = () => resolve(req.result || null);
        req.onerror   = () => reject(req.error);
      });
    },

    async obterBlob(id) {
      const reg = await this.buscar(id);
      if (!reg) return null;
      return this._descriptografarBlob(reg.blob_cifrado);
    },

    async listar(filtros = {}) {
      const store = await this._store('readonly');
      return new Promise((resolve, reject) => {
        const resultados = [];
        let src;
        if (filtros.modulo && filtros.item_id) {
          src = store.index('modulo_item').openCursor(IDBKeyRange.only([filtros.modulo, filtros.item_id]));
        } else if (filtros.modulo) {
          src = store.index('modulo').openCursor(IDBKeyRange.only(filtros.modulo));
        } else if (filtros.item_id) {
          src = store.index('item_id').openCursor(IDBKeyRange.only(filtros.item_id));
        } else {
          src = store.openCursor();
        }
        src.onsuccess = () => {
          const cur = src.result;
          if (cur) {
            // Retorna cópia sem o blob_cifrado por padrão (economia de memória),
            // exceto quando filtros.incluirBlob=true
            if (filtros.incluirBlob) {
              resultados.push(cur.value);
            } else {
              const { blob_cifrado, ...meta } = cur.value;
              resultados.push(meta);
            }
            cur.continue();
          } else {
            resultados.sort((a,b) => (b.uploaded_em || '').localeCompare(a.uploaded_em || ''));
            resolve(resultados);
          }
        };
        src.onerror = () => reject(src.error);
      });
    },

    async excluir(id) {
      const reg = await this.buscar(id);
      const store = await this._store('readwrite');
      await new Promise((resolve, reject) => {
        const req = store.delete(id);
        req.onsuccess = () => resolve();
        req.onerror   = () => reject(req.error);
      });
      if (reg && typeof registrarLog === 'function') {
        registrarLog('excluir_anexo', reg.modulo, `Anexo "${reg.nome}" removido`, reg.item_id);
      }
    },

    async excluirPorItem(modulo, item_id) {
      const itens = await this.listar({ modulo, item_id });
      for (const a of itens) {
        try {
          const store = await this._store('readwrite');
          await new Promise((resolve, reject) => {
            const req = store.delete(a.id);
            req.onsuccess = () => resolve();
            req.onerror   = () => reject(req.error);
          });
        } catch (e) { /* continua */ }
      }
      return itens.length;
    },

    async limparOrfaos() {
      const dados = App.state.dados;
      if (!dados) return 0;
      const setDe = (arr) => new Set((arr || []).map(x => x.id));
      const validos = {
        demanda:      setDe(dados.demandas),
        oficio:       setDe(dados.oficios),
        projeto_lei:  setDe(dados.projetos_lei),
        fiscalizacao: setDe(dados.fiscalizacoes),
        cidadao:      setDe(dados.cidadaos),
        diario:       setDe(dados.diario),
      };
      const todos = await this.listar();
      let excluidos = 0;
      for (const a of todos) {
        const s = validos[a.modulo];
        if (!s || !s.has(a.item_id)) {
          try { await this.excluir(a.id); excluidos++; } catch(e) {}
        }
      }
      return excluidos;
    },

    async tamanhoTotal() {
      const todos = await this.listar();
      const bytes = todos.reduce((acc, a) => acc + (a.tamanho || 0), 0);
      return { bytes, count: todos.length };
    },

    async exportarTodos() {
      const store = await this._store('readonly');
      return new Promise((resolve, reject) => {
        const resultados = [];
        const req = store.openCursor();
        req.onsuccess = () => {
          const c = req.result;
          if (c) { resultados.push(c.value); c.continue(); }
          else { resolve(resultados); }
        };
        req.onerror = () => reject(req.error);
      });
    },

    async limparTudo() {
      const store = await this._store('readwrite');
      return new Promise((resolve, reject) => {
        const req = store.clear();
        req.onsuccess = () => resolve();
        req.onerror   = () => reject(req.error);
      });
    },
  };

  /** Formata bytes em KB/MB/GB legível. */
  function formatarTamanho(bytes) {
    if (bytes == null || isNaN(bytes)) return '—';
    if (bytes < 1024) return `${bytes} B`;
    if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
    if (bytes < 1024 * 1024 * 1024) return `${(bytes / (1024 * 1024)).toFixed(1)} MB`;
    return `${(bytes / (1024 * 1024 * 1024)).toFixed(2)} GB`;
  }

  // ════════════════════════════════════════════════════════════════
  // BACKUP AUTOMÁTICO (File System Access API + fallback)
  // ════════════════════════════════════════════════════════════════

  // ════════════════════════════════════════════════════════════════
  // SEÇÃO — SINCRONIZAÇÃO (GitHub como "cofre cego": sobe só o cifrado)
  // Usa a Git Data API (blob→tree→commit→ref) → aguenta arquivos grandes
  // (as fotos) e cada sync vira um commit = histórico/"voltar no tempo".
  // ════════════════════════════════════════════════════════════════
  const Sync = {
    API: 'https://api.github.com',
    _status: 'naoconfig', // naoconfig | syncing | ok | erro | offline
    _statusMsg: '',
    _running: false,
    _pushTimer: null,

    _keyCfg(uuid) { return `gabinete_${uuid}_sync`; },
    _branch(cfg) { return cfg.branch || 'main'; },
    _path(cfg)   { return cfg.path || 'gabinete.enc'; },

    // Config POR DISPOSITIVO, cifrada com a senha mestre (token nunca em texto claro).
    carregarCfg(uuid, senha) {
      try { const raw = localStorage.getItem(this._keyCfg(uuid)); return raw ? Crypto.descriptografar(raw, senha) : null; }
      catch (e) { return null; }
    },
    salvarCfg(uuid, senha, cfg) {
      try { localStorage.setItem(this._keyCfg(uuid), Crypto.criptografar(cfg, senha)); } catch (e) {}
    },
    configurado(uuid, senha) {
      const c = this.carregarCfg(uuid, senha);
      return !!(c && c.owner && c.repo && c.token);
    },

    _setStatus(s, msg) {
      this._status = s; this._statusMsg = msg || '';
      try { App._syncAtualizarStatus && App._syncAtualizarStatus(); } catch (e) {}
    },

    async _api(cfg, path, opts = {}) {
      const headers = {
        'Authorization': 'Bearer ' + cfg.token,
        'Accept': 'application/vnd.github+json',
        'X-GitHub-Api-Version': '2022-11-28',
      };
      if (opts.body) headers['Content-Type'] = 'application/json';
      return fetch(this.API + path, { ...opts, headers: { ...headers, ...(opts.headers || {}) } });
    },

    // base64 seguro p/ UTF-8 (o cipher é ASCII, mas garante robustez)
    _b64enc(s) { return btoa(unescape(encodeURIComponent(s))); },
    _b64dec(b) { return decodeURIComponent(escape(atob((b || '').replace(/\s/g, '')))); },

    // Valida usuário/repo/token e a permissão de escrita.
    async testar(cfg) {
      let r;
      try { r = await this._api(cfg, `/repos/${cfg.owner}/${cfg.repo}`); }
      catch (e) { throw new Error('Sem internet ou GitHub fora do ar.'); }
      if (r.status === 401) throw new Error('Token inválido.');
      if (r.status === 404) throw new Error('Repositório não encontrado — confira o usuário e o nome, e se o token dá acesso a ele.');
      if (!r.ok) throw new Error('Falha ao conectar (HTTP ' + r.status + ').');
      const j = await r.json();
      if (!j.permissions || !j.permissions.push) throw new Error('O token não tem permissão de escrita. Em Contents, marque "Read and write".');
      return true;
    },

    // Lê o estado remoto → { commitSha, ts, cipher } ou null se o repo está vazio.
    async puxar(cfg) {
      const base = `/repos/${cfg.owner}/${cfg.repo}`, branch = this._branch(cfg);
      let r = await this._api(cfg, `${base}/git/ref/heads/${branch}`);
      // 404 = branch ainda não existe; 409 = repositório recém-criado, totalmente vazio
      // ("Git Repository is empty"). Nos dois casos tratamos como cofre vazio → primeiro envio cria tudo.
      if (r.status === 404 || r.status === 409) return null;
      if (!r.ok) throw new Error('Erro ao ler o repositório (HTTP ' + r.status + ').');
      const commitSha = (await r.json()).object.sha;
      const commit = await (await this._api(cfg, `${base}/git/commits/${commitSha}`)).json();
      const tree = await (await this._api(cfg, `${base}/git/trees/${commit.tree.sha}?recursive=1`)).json();
      const entry = (tree.tree || []).find(e => e.path === this._path(cfg));
      let cipher = null;
      if (entry) {
        const blob = await (await this._api(cfg, `${base}/git/blobs/${entry.sha}`)).json();
        cipher = this._b64dec(blob.content);
      }
      let ts = commit.committer?.date || commit.author?.date || null;
      const st = (tree.tree || []).find(e => e.path === 'state.json');
      if (st) {
        try { const b = await (await this._api(cfg, `${base}/git/blobs/${st.sha}`)).json(); const o = JSON.parse(this._b64dec(b.content)); if (o.ts) ts = o.ts; } catch (e) {}
      }
      return { commitSha, ts, cipher };
    },

    // Cria um commit novo com o cipher + state.json. Retorna o sha do commit.
    async enviar(cfg, cipher, parentSha, ts) {
      const base = `/repos/${cfg.owner}/${cfg.repo}`, branch = this._branch(cfg);
      const mkBlob = async (conteudo) => {
        const r = await this._api(cfg, `${base}/git/blobs`, { method: 'POST', body: JSON.stringify({ content: this._b64enc(conteudo), encoding: 'base64' }) });
        if (!r.ok) throw new Error('Erro ao enviar os dados (blob HTTP ' + r.status + ').');
        return (await r.json()).sha;
      };
      const dataSha  = await mkBlob(cipher);
      const stateSha = await mkBlob(JSON.stringify({ ts, app: VERSAO }));
      const treeBody = { tree: [
        { path: this._path(cfg), mode: '100644', type: 'blob', sha: dataSha },
        { path: 'state.json',    mode: '100644', type: 'blob', sha: stateSha },
      ] };
      let r = await this._api(cfg, `${base}/git/trees`, { method: 'POST', body: JSON.stringify(treeBody) });
      if (!r.ok) throw new Error('Erro ao montar árvore (HTTP ' + r.status + ').');
      const treeSha = (await r.json()).sha;
      r = await this._api(cfg, `${base}/git/commits`, { method: 'POST', body: JSON.stringify({ message: 'Backup ' + ts, tree: treeSha, parents: parentSha ? [parentSha] : [] }) });
      if (!r.ok) throw new Error('Erro ao criar commit (HTTP ' + r.status + ').');
      const novo = (await r.json()).sha;
      r = await this._api(cfg, `${base}/git/refs/heads/${branch}`, { method: 'PATCH', body: JSON.stringify({ sha: novo, force: true }) });
      if (r.status === 404 || r.status === 422) {
        r = await this._api(cfg, `${base}/git/refs`, { method: 'POST', body: JSON.stringify({ ref: 'refs/heads/' + branch, sha: novo }) });
      }
      if (!r.ok) throw new Error('Erro ao atualizar o repositório (HTTP ' + r.status + ').');
      return novo;
    },

    // Aplica os dados remotos localmente (decifra com a senha mestre da sessão).
    async _aplicarRemoto(uuid, senha, remote) {
      const dados = Crypto.descriptografar(remote.cipher, senha);
      if (!dados) throw new Error('Os dados do GitHub não abriram com esta chave (senha diferente?).');
      if (!dados.cidadaos && !dados.usuarios) throw new Error('Dados remotos em formato inesperado — sincronização abortada.');
      // SEGURANÇA: sanea ids malformados do blob remoto (mesma defesa do restore de
      // backup) — um repositório poisonado não injeta XSS via id em onclick.
      try { sanearIdsMalformados(dados); } catch (e) {}
      const cipher = Crypto.criptografar(dados, senha); // re-cifra já saneado
      Storage._cipherCache[uuid] = cipher;
      await Storage._gravarCipher(uuid, cipher);
      App.state.dados = dados;
      try { App.rotear(); } catch (e) {}
    },

    // Orquestra: puxa, decide (recente vence), e empurra/aplica conforme o caso.
    async sincronizar(uuid, senha, opts = {}) {
      if (this._running) return;
      const cfg = this.carregarCfg(uuid, senha);
      if (!cfg || !cfg.owner || !cfg.repo || !cfg.token) { this._setStatus('naoconfig'); return; }
      if (!navigator.onLine) { this._setStatus('offline'); return; }
      this._running = true; this._setStatus('syncing');
      try {
        const localCipher = Storage._cipherCache[uuid] || localStorage.getItem(Storage._keyData(uuid));
        const remote = await this.puxar(cfg);
        const localMudou = cfg.dataTs && (!cfg.lastSyncTs || cfg.dataTs > cfg.lastSyncTs);
        const remoteAvancou = remote && remote.commitSha !== cfg.lastCommit;

        if (!remote || !remote.cipher) {
          // Repo vazio → manda o local (se houver).
          if (localCipher) {
            const ts = new Date().toISOString();
            cfg.lastCommit = await this.enviar(cfg, localCipher, remote ? remote.commitSha : null, ts);
            cfg.lastSyncTs = cfg.dataTs || ts;
          }
        } else if (remoteAvancou && !localMudou) {
          // Só o remoto mudou → baixa.
          await this._aplicarRemoto(uuid, senha, remote);
          cfg.lastCommit = remote.commitSha; cfg.lastSyncTs = remote.ts || new Date().toISOString();
        } else if (localMudou && !remoteAvancou) {
          // Só o local mudou → sobe.
          const ts = new Date().toISOString();
          cfg.lastCommit = await this.enviar(cfg, localCipher, remote.commitSha, ts);
          cfg.lastSyncTs = ts;
        } else if (localMudou && remoteAvancou) {
          // CONFLITO: os dois mudaram. Recente vence; guarda backup do que perder.
          const remoteTs = remote.ts || '';
          const localTs  = cfg.dataTs || '';
          if (remoteTs > localTs) {
            try { App._baixarBackupLocal && App._baixarBackupLocal('conflito-local'); } catch (e) {}
            await this._aplicarRemoto(uuid, senha, remote);
            cfg.lastCommit = remote.commitSha; cfg.lastSyncTs = remoteTs;
            toast('Havia uma versão mais nova no outro aparelho — apliquei ela. Guardei um backup da sua versão local.', 'warning', 8000);
          } else {
            const ts = new Date().toISOString();
            cfg.lastCommit = await this.enviar(cfg, localCipher, remote.commitSha, ts);
            cfg.lastSyncTs = ts;
          }
        } else {
          // Nada mudou.
          if (remote) cfg.lastCommit = remote.commitSha;
        }
        this.salvarCfg(uuid, senha, cfg);
        this._setStatus('ok');
      } catch (e) {
        this._setStatus(navigator.onLine ? 'erro' : 'offline', e.message);
        if (!opts.silencioso) toast('Sincronização: ' + e.message, 'error', 6000);
      } finally { this._running = false; }
    },

    // Marca que houve alteração local e agenda um envio (debounce).
    aoSalvar(uuid, senha) {
      const cfg = this.carregarCfg(uuid, senha);
      if (!cfg || !cfg.owner || !cfg.token || cfg.auto === false) return;
      cfg.dataTs = new Date().toISOString();
      this.salvarCfg(uuid, senha, cfg);
      clearTimeout(this._pushTimer);
      this._pushTimer = setTimeout(() => { this.sincronizar(uuid, senha, { silencioso: true }); }, 3000);
    },
  };

  const Backup = {
    VERSAO_SCHEMA:   1,
    MAX_HISTORICO:   7,
    THROTTLE_MS:     60 * 1000,
    REMINDER_DIAS:   7,
    DB_NAME:         'gabinete_config',
    DB_STORE:        'handles',
    DB_KEY:          'backup_folder',
    get SUPPORTS_FSA()  { return typeof window.showDirectoryPicker === 'function'; },

    _dirHandle:      null,
    _lastAttempt:    0,
    _inicializado:   false,

    _db() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(this.DB_NAME, 1);
        req.onupgradeneeded = () => {
          const db = req.result;
          if (!db.objectStoreNames.contains(this.DB_STORE)) {
            db.createObjectStore(this.DB_STORE);
          }
        };
        req.onsuccess = () => resolve(req.result);
        req.onerror   = () => reject(req.error);
      });
    },
    async _saveHandle(handle) {
      const db = await this._db();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(this.DB_STORE, 'readwrite');
        tx.objectStore(this.DB_STORE).put(handle, this.DB_KEY);
        tx.oncomplete = () => resolve(true);
        tx.onerror    = () => reject(tx.error);
      });
    },
    async _loadHandle() {
      try {
        const db = await this._db();
        return new Promise((resolve) => {
          const tx = db.transaction(this.DB_STORE, 'readonly');
          const req = tx.objectStore(this.DB_STORE).get(this.DB_KEY);
          req.onsuccess = () => resolve(req.result || null);
          req.onerror   = () => resolve(null);
        });
      } catch (e) { return null; }
    },
    async _clearHandle() {
      try {
        const db = await this._db();
        return new Promise((resolve) => {
          const tx = db.transaction(this.DB_STORE, 'readwrite');
          tx.objectStore(this.DB_STORE).delete(this.DB_KEY);
          tx.oncomplete = () => resolve(true);
          tx.onerror    = () => resolve(false);
        });
      } catch (e) { return false; }
    },

    _getConfig() {
      const cfg = App.state.dados?.configuracoes;
      if (!cfg) return null;
      if (!cfg.backup) {
        cfg.backup = {
          periodicidade: 'diario',
          ultimoBackup:  null,
          pastaNome:     null,
          historico:     [],
          avisoUltimo:   null,
        };
      }
      return cfg.backup;
    },

    _gerarNome() {
      const d  = new Date();
      const Y  = d.getFullYear();
      const M  = String(d.getMonth()+1).padStart(2,'0');
      const D  = String(d.getDate()).padStart(2,'0');
      const hh = String(d.getHours()).padStart(2,'0');
      const mm = String(d.getMinutes()).padStart(2,'0');
      return `gabinete-backup-${Y}-${M}-${D}-${hh}${mm}.json`;
    },

    gerarPayload() {
      const backup = Storage.exportarBackup(App.state.uuid);
      backup.versao_schema = this.VERSAO_SCHEMA;
      const nome = this._gerarNome();
      const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
      return { nome, blob, data: new Date().toISOString() };
    },

    async _checarPermissao(handle, reprompt = false) {
      if (!handle || typeof handle.queryPermission !== 'function') return false;
      const opts = { mode: 'readwrite' };
      let perm;
      try { perm = await handle.queryPermission(opts); }
      catch (e) { return false; }
      if (perm === 'granted') return true;
      if (reprompt) {
        try { perm = await handle.requestPermission(opts); }
        catch (e) { return false; }
        return perm === 'granted';
      }
      return false;
    },

    async escolherPasta() {
      if (!this.SUPPORTS_FSA) {
        toast('Seu navegador não suporta seleção de pasta. Use o backup manual.', 'warning');
        return false;
      }
      if (!isAdmin()) { toast('Acesso restrito.', 'error'); return false; }
      try {
        const handle = await window.showDirectoryPicker({ id: 'gabinete-backup', mode: 'readwrite', startIn: 'documents' });
        await this._saveHandle(handle);
        this._dirHandle = handle;
        const cfg = this._getConfig();
        if (cfg) { cfg.pastaNome = handle.name; App.salvar(); }
        toast(`Pasta selecionada: ${handle.name}`, 'success');
        if (App.state.rota === '#configuracoes') App.renderConfiguracoes?.(); // só re-render se ainda na tela
        return true;
      } catch (e) {
        if (e && e.name !== 'AbortError') {
          console.warn('[Backup] escolherPasta', e);
          toast('Erro ao selecionar pasta.', 'error');
        }
        return false;
      }
    },

    async _salvarNaPasta(nome, blob) {
      if (!this._dirHandle) this._dirHandle = await this._loadHandle();
      if (!this._dirHandle) return { ok: false, motivo: 'sem-pasta' };
      const ok = await this._checarPermissao(this._dirHandle, true);
      if (!ok) return { ok: false, motivo: 'sem-permissao' };
      try {
        const fh = await this._dirHandle.getFileHandle(nome, { create: true });
        const w  = await fh.createWritable();
        await w.write(blob);
        await w.close();
        return { ok: true };
      } catch (e) {
        console.warn('[Backup] _salvarNaPasta', e);
        return { ok: false, motivo: 'erro' };
      }
    },

    async _limparAntigos(cfg) {
      if (!cfg) return;
      if (cfg.historico.length > this.MAX_HISTORICO) {
        cfg.historico = cfg.historico.slice(-this.MAX_HISTORICO);
      }
      if (!this._dirHandle) return;
      try {
        const mantidos = new Set(cfg.historico.map(h => h.nome));
        const paraRemover = [];
        for await (const [name, entry] of this._dirHandle.entries()) {
          if (entry.kind === 'file' &&
              name.startsWith('gabinete-backup-') &&
              name.endsWith('.json') &&
              !mantidos.has(name)) {
            paraRemover.push(name);
          }
        }
        for (const name of paraRemover) {
          try { await this._dirHandle.removeEntry(name); } catch (e) {}
        }
      } catch (e) { /* silent */ }
    },

    _download(nome, blob) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = nome;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    },

    async executarBackup(opcoes = {}) {
      const manual = !!opcoes.manual;
      const cfg = this._getConfig();
      if (!cfg || !App.state.dados) return false;

      const { nome, blob, data } = this.gerarPayload();

      let salvoNaPasta = false;
      if (this.SUPPORTS_FSA && this._dirHandle) {
        const r = await this._salvarNaPasta(nome, blob);
        if (r.ok) {
          salvoNaPasta = true;
        } else if (manual) {
          if (r.motivo === 'sem-permissao') {
            toast('Permissão para a pasta foi negada. Reconfigure em Configurações.', 'error');
          } else {
            toast('Não foi possível salvar na pasta. Baixando como arquivo.', 'warning');
            this._download(nome, blob);
          }
        } else {
          return false;
        }
      } else if (manual || !this.SUPPORTS_FSA) {
        this._download(nome, blob);
      } else {
        return false;
      }

      cfg.ultimoBackup = data;
      cfg.historico.push({ nome, data });
      await this._limparAntigos(cfg);
      App.salvar();

      if (typeof registrarLog === 'function') {
        const descr = salvoNaPasta
          ? `Backup automático salvo em ${cfg.pastaNome || 'pasta configurada'}: ${nome}`
          : `Backup baixado: ${nome}`;
        registrarLog('backup_automatico', 'sistema', descr);
      }

      if (manual) toast('Backup realizado com sucesso!', 'success');
      this.atualizarTopbar();
      if (App.state.rota === '#configuracoes' && App._cfgAba === 'backup') {
        App.renderConfiguracoes?.();
      }
      return true;
    },

    async verificar() {
      if (!App.state.dados || !App.state.senha) return;
      const cfg = this._getConfig();
      if (!cfg) return;
      this.atualizarTopbar();
      if (cfg.periodicidade === 'desligado') return;
      if (!this.SUPPORTS_FSA) {
        this._talvezMostrarLembrete();
        return;
      }
      const agora = Date.now();
      if (agora - this._lastAttempt < this.THROTTLE_MS) return;
      this._lastAttempt = agora;

      const intervaloMs = cfg.periodicidade === 'semanal' ? 7*86400000 : 86400000;
      const ultimo = cfg.ultimoBackup ? new Date(cfg.ultimoBackup).getTime() : 0;
      if (agora - ultimo < intervaloMs) return;

      if (!this._dirHandle) this._dirHandle = await this._loadHandle();
      if (!this._dirHandle) return;
      const ok = await this._checarPermissao(this._dirHandle, false);
      if (!ok) return;

      await this.executarBackup({ manual: false });
    },

    diasSemBackup() {
      const cfg = this._getConfig();
      if (!cfg || !cfg.ultimoBackup) return null;
      const d = (Date.now() - new Date(cfg.ultimoBackup).getTime()) / 86400000;
      return Math.floor(d);
    },

    atualizarTopbar() {
      const slot = document.getElementById('topbar-backup-slot');
      if (!slot) return;
      while (slot.firstChild) slot.removeChild(slot.firstChild);

      if (!App.state.dados) return;
      const cfg = this._getConfig();
      if (!cfg || cfg.periodicidade === 'desligado') return;
      if (this.SUPPORTS_FSA && this._dirHandle) return;
      if (!isAdmin() && !temPermissao('configuracoes','editar')) return;

      const dias = this.diasSemBackup();
      const sem = (dias === null);
      let cor = 'bg-slate-100 text-slate-600 dark:bg-slate-700 dark:text-slate-300';
      if (dias !== null && dias > 14) cor = 'bg-red-100 text-red-700 dark:bg-red-900/40 dark:text-red-300';
      else if (dias !== null && dias > 7) cor = 'bg-amber-100 text-amber-700 dark:bg-amber-900/40 dark:text-amber-300';

      const label = sem ? 'Sem backup' : (dias === 0 ? 'Backup hoje' : `${dias}d sem backup`);

      const wrap = document.createElement('div');
      wrap.className = 'flex items-center gap-2';

      const badge = document.createElement('span');
      badge.className = `hidden md:inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-[11px] font-semibold ${cor}`;
      const ic = document.createElement('i');
      ic.className = 'fa-solid fa-database text-[10px]';
      badge.appendChild(ic);
      badge.appendChild(document.createTextNode(label));

      const btn = document.createElement('button');
      btn.type = 'button';
      btn.title = 'Fazer backup agora';
      btn.className = 'w-9 h-9 rounded-xl flex items-center justify-center text-slate-400 hover:text-primary hover:bg-slate-100 dark:hover:bg-slate-700/50 cursor-pointer';
      const bi = document.createElement('i');
      bi.className = 'fa-solid fa-cloud-arrow-down';
      btn.appendChild(bi);
      btn.addEventListener('click', () => this.executarBackup({ manual: true }));

      wrap.appendChild(badge);
      wrap.appendChild(btn);
      slot.appendChild(wrap);
    },

    _talvezMostrarLembrete() {
      const cfg = this._getConfig();
      if (!cfg) return;
      const dias = this.diasSemBackup();
      if (dias !== null && dias < this.REMINDER_DIAS) return;
      const ultAviso = cfg.avisoUltimo ? new Date(cfg.avisoUltimo).getTime() : 0;
      if (Date.now() - ultAviso < 7*86400000) return;
      cfg.avisoUltimo = new Date().toISOString();
      App.salvar();
      const msg = dias === null
        ? 'Você ainda não fez nenhum backup. Que tal fazer um agora?'
        : `Faz ${dias} dia(s) sem backup. Que tal fazer um agora?`;
      setTimeout(() => {
        if (typeof toast === 'function') toast(msg, 'warning', 6000);
      }, 1500);
    },

    async inicializar() {
      if (this._inicializado) return;
      this._inicializado = true;
      if (this.SUPPORTS_FSA) {
        this._dirHandle = await this._loadHandle();
      }
      this.atualizarTopbar();
      this.verificar();
    },

    async desconfigurarPasta() {
      await this._clearHandle();
      this._dirHandle = null;
      const cfg = this._getConfig();
      if (cfg) { cfg.pastaNome = null; App.salvar(); }
      this.atualizarTopbar();
      toast('Pasta desvinculada.', 'info');
      if (App.state.rota === '#configuracoes') App.renderConfiguracoes?.();
    },
  };

  // COMUNICAÇÃO — utilitários (DDDs + normalização de telefone)
  // ════════════════════════════════════════════════════════════════

  const DDD_POR_ESTADO = {
    AC:'68', AL:'82', AM:'92', AP:'96', BA:'71', CE:'85', DF:'61',
    ES:'27', GO:'62', MA:'98', MG:'31', MS:'67', MT:'65', PA:'91',
    PB:'83', PE:'81', PI:'86', PR:'41', RJ:'21', RN:'84', RO:'69',
    RR:'95', RS:'51', SC:'48', SE:'79', SP:'11', TO:'63',
  };
  const DDDS_VALIDOS = new Set(Object.values(DDD_POR_ESTADO));

  function normalizarTelefone(input, dddPadrao = '') {
    if (!input) return { e164: null, valido: false, motivo: 'vazio', tipo: null };
    let d = String(input).replace(/\D/g, '');
    if (!d) return { e164: null, valido: false, motivo: 'sem_digitos', tipo: null };
    if (d.startsWith('55') && d.length >= 12) d = d.slice(2);
    if (d.length === 8 || d.length === 9) {
      if (!dddPadrao) return { e164: null, valido: false, motivo: 'sem_ddd', tipo: null };
      d = String(dddPadrao) + d;
    }
    if (d.length < 10 || d.length > 11) {
      return { e164: null, valido: false, motivo: 'tamanho_invalido', tipo: null };
    }
    const ddd = d.slice(0, 2);
    const numero = d.slice(2);
    if (!DDDS_VALIDOS.has(ddd)) {
      return { e164: null, valido: false, motivo: 'ddd_invalido', tipo: null };
    }
    let tipo = null;
    if (numero.length === 9 && numero.startsWith('9')) tipo = 'celular';
    else if (numero.length === 8) tipo = 'fixo';
    else return { e164: null, valido: false, motivo: 'formato_invalido', tipo: null };
    return { e164: '+55' + d, valido: true, motivo: null, tipo };
  }

    // ── Persistência em state.dados.templates_docx ─────────────
    seedIfMissing() {
      const d = App.state.dados;
      if (!d) return;
      if (Array.isArray(d.templates_docx) && d.templates_docx.length) return;
      d.templates_docx = this._SEEDS().map(t => ({ ...t, criado_em: new Date().toISOString() }));
      App.salvar();
    },

    listar(tipo) {
      const all = App.state.dados?.templates_docx || [];
      return tipo ? all.filter(t => t.tipo === tipo) : all;
    },

    buscar(id) {
      return (App.state.dados?.templates_docx || []).find(t => t.id === id) || null;
    },

    padrao(tipo) {
      const lst = this.listar(tipo);
      return lst.find(t => t.padrao) || lst[0] || null;
    },

    salvarTemplate(tpl) {
      const d = App.state.dados;
      if (!d.templates_docx) d.templates_docx = [];
      if (!tpl.id) tpl.id = gerarUUID();
      const idx = d.templates_docx.findIndex(t => t.id === tpl.id);
      if (idx >= 0) d.templates_docx[idx] = { ...d.templates_docx[idx], ...tpl };
      else d.templates_docx.unshift({ ...tpl, criado_em: new Date().toISOString() });
      App.salvar();
      return tpl;
    },

    excluir(id) {
      const d = App.state.dados;
      const t = (d.templates_docx || []).find(x => x.id === id);
      if (!t) return;
      d.templates_docx = (d.templates_docx || []).filter(x => x.id !== id);
      App.salvar();
    },

    definirPadrao(tipo, id) {
      const d = App.state.dados;
      (d.templates_docx || []).forEach(t => {
        if (t.tipo === tipo) t.padrao = (t.id === id);
      });
      App.salvar();
    },

    // ── Substituição de variáveis ──────────────────────────────
    _sub(texto, ctx) {
      if (!texto) return '';
      return texto.replace(/\{\{\s*([\w.]+)\s*\}\}/g, (_, key) => {
        const path = key.split('.');
        let v = ctx;
        for (const p of path) { v = v?.[p]; if (v === undefined) break; }
        return (v === undefined || v === null) ? '' : String(v);
      });
    },

    construirContexto(tipo, item, extras = {}) {
      const meta = App.state.meta || {};
      const cfg  = App.state.dados?.configuracoes || {};
      const hojeDate = new Date();
      const ctx = {
        gabinete: {
          nome:          meta.nome_vereador || '',
          cargo:         meta.cargo || '',
          cidade:        meta.cidade || '',
          cidade_upper: (meta.cidade || '').toUpperCase(),
          estado:        meta.estado || '',
          partido:       cfg.partido || '',
          mandato:       cfg.mandato || '',
        },
        data_hoje:         hojeDate.toLocaleDateString('pt-BR'),
        data_hoje_extenso: `${meta.cidade || ''}, ${formatarDataExtenso()}`,
        ano:               hojeDate.getFullYear(),
      };

      if (tipo === 'oficio' && item) {
        const ano = item.data_emissao ? (item.data_emissao.slice(0,4)) : ctx.ano;
        ctx.numero        = item.numero || '';
        ctx.assunto       = item.assunto || '';
        ctx.corpo         = item.observacoes || '';
        ctx.data_emissao  = item.data_emissao ? formatarData(item.data_emissao) : '';
        ctx.ano_emissao   = ano;
        ctx.destinatario  = {
          nome:  item.destinatario || '',
          cargo: '',
          orgao: item.orgao_destinatario || '',
        };
      } else if (tipo === 'projeto_lei' && item) {
        const ano = item.data_apresentacao ? item.data_apresentacao.slice(0,4) : ctx.ano;
        ctx.numero_pl    = item.numero || '';
        ctx.ano_pl       = ano;
        ctx.titulo       = item.titulo || '';
        ctx.ementa       = item.ementa || '';
        ctx.corpo        = item.observacoes || '';
        ctx.autoria      = item.autor || meta.nome_vereador;
        ctx.justificativa = item.justificativa || item.observacoes || '';
      } else if (tipo === 'indicacao' || tipo === 'requerimento') {
        Object.assign(ctx, {
          numero:           item?.numero || extras.numero || '',
          ano:              ctx.ano,
          objeto:           item?.objeto || extras.objeto || '',
          justificativa:    item?.justificativa || extras.justificativa || '',
          destinatario_orgao: item?.destinatario_orgao || extras.destinatario_orgao || '',
          autor_tratamento: extras.autor_tratamento || 'O(A) Vereador(a)',
        });
      } else if (tipo === 'relatorio_mensal') {
        Object.assign(ctx, extras);
      }

      return ctx;
    },

    // ── Docx: parse texto de template em blocos ────────────────
    _parseParagrafos(texto, ctx, tpl) {
      const resolvido = this._sub(texto || '', ctx);
      const dx = window.docx;
      // Divide por linhas; cada linha vira um parágrafo. Linha vazia = espaço.
      const linhas = resolvido.split(/\r?\n/);
      return linhas.map(linha => this._paragrafo(linha, tpl));
    },

    _paragrafo(texto, tpl) {
      const dx = window.docx;
      const fonte    = tpl.fonte_padrao || 'Times New Roman';
      const tamanho  = (tpl.tamanho_fonte || 12) * 2; // half-points
      const espacLine = Math.round((tpl.espacamento || 1.5) * 240);

      if (!texto || !texto.trim()) {
        return new dx.Paragraph({
          children: [new dx.TextRun({ text: '', font: fonte, size: tamanho })],
          spacing: { line: espacLine, lineRule: dx.LineRuleType?.AUTO || 'auto' },
        });
      }

      // Sinalização centro/direita com markers iniciais (opcional, simples)
      let alignment = dx.AlignmentType.JUSTIFIED;
      let indent = { firstLine: 708 };
      const linhaLimpa = texto;

      // Se a linha tem exclusivamente **...** ou é só uma palavra curta em destaque, centraliza (heurística branda)
      const soBold = /^\*\*[^*]+\*\*$/.test(linhaLimpa.trim());
      if (soBold) { alignment = dx.AlignmentType.CENTER; indent = undefined; }

      // Parse inline **bold** e _italic_
      const children = [];
      const re = /(\*\*[^*]+\*\*|_[^_]+_)/g;
      const tokens = linhaLimpa.split(re).filter(Boolean);
      tokens.forEach(tk => {
        if (tk.startsWith('**') && tk.endsWith('**')) {
          children.push(new dx.TextRun({ text: tk.slice(2, -2), bold: true, font: fonte, size: tamanho }));
        } else if (tk.startsWith('_') && tk.endsWith('_')) {
          children.push(new dx.TextRun({ text: tk.slice(1, -1), italics: true, font: fonte, size: tamanho }));
        } else {
          children.push(new dx.TextRun({ text: tk, font: fonte, size: tamanho }));
        }
      });

      return new dx.Paragraph({
        children,
        alignment,
        ...(indent ? { indent } : {}),
        spacing: { line: espacLine, lineRule: dx.LineRuleType?.AUTO || 'auto' },
      });
    },

    // ── Gerador principal ──────────────────────────────────────
    async gerarDocx(tipo, item, opcoes = {}) {
      if (typeof window.docx === 'undefined') {
        throw new Error('Biblioteca docx não carregou. Verifique sua conexão.');
      }
      const tpl = opcoes.template || (opcoes.templateId ? this.buscar(opcoes.templateId) : this.padrao(tipo));
      if (!tpl) throw new Error('Nenhum template disponível para este tipo.');
      const ctx = this.construirContexto(tipo, item, opcoes.extras || {});

      const dx = window.docx;
      const cmToTwip = (cm) => Math.round((cm || 0) * 567);
      const margens = tpl.margens || { top: 2.5, bottom: 2.5, left: 3, right: 2.5 };

      const bodyPars   = this._parseParagrafos(tpl.corpo,     ctx, tpl);
      const headerPars = tpl.cabecalho ? this._parseParagrafos(tpl.cabecalho, ctx, { ...tpl, espacamento: 1 }) : [];
      const footerPars = tpl.rodape    ? this._parseParagrafos(tpl.rodape,    ctx, { ...tpl, espacamento: 1, tamanho_fonte: Math.max(9, (tpl.tamanho_fonte||12)-2) }) : [];

      const extrasRodape = [];
      if (tpl.numera_paginas) {
        extrasRodape.push(new dx.Paragraph({
          alignment: dx.AlignmentType.CENTER,
          children: [
            new dx.TextRun({
              children: ['Página ', dx.PageNumber.CURRENT, ' de ', dx.PageNumber.TOTAL_PAGES],
              font: tpl.fonte_padrao || 'Times New Roman',
              size: Math.max(9, (tpl.tamanho_fonte||12)-2) * 2,
            }),
          ],
        }));
      }

      const sec = {
        properties: {
          page: {
            margin: {
              top:    cmToTwip(margens.top),
              bottom: cmToTwip(margens.bottom),
              left:   cmToTwip(margens.left),
              right:  cmToTwip(margens.right),
            },
            size: {
              orientation: tpl.orientacao === 'landscape'
                ? dx.PageOrientation.LANDSCAPE
                : dx.PageOrientation.PORTRAIT,
            },
          },
        },
        children: bodyPars,
      };
      if (headerPars.length) sec.headers = { default: new dx.Header({ children: headerPars }) };
      if (footerPars.length || extrasRodape.length) {
        sec.footers = { default: new dx.Footer({ children: [...footerPars, ...extrasRodape] }) };
      }

      const doc = new dx.Document({
        creator: App.state.meta?.nome_vereador || 'Gabinete',
        title: opcoes.titulo || this.TIPOS[tipo]?.label || 'Documento',
        description: 'Gerado pelo Sistema de Gabinete',
        sections: [sec],
      });

      return dx.Packer.toBlob(doc);
    },

    _nomeArquivo(tipo, item, ctx) {
      const dataStr = hoje();
      const numero = (item?.numero || item?.protocolo || ctx?.numero || ctx?.numero_pl || 'sem-numero')
        .toString().replace(/[^a-zA-Z0-9_-]/g, '-');
      const slugTipo = tipo.replace(/_/g, '-');
      return `${slugTipo}-${numero}-${dataStr}.docx`;
    },

    async baixarDocx(tipo, item, opcoes = {}) {
      try {
        const blob = await this.gerarDocx(tipo, item, opcoes);
        const ctx = this.construirContexto(tipo, item, opcoes.extras || {});
        const nome = opcoes.nomeArquivo || this._nomeArquivo(tipo, item, ctx);
        if (typeof window.saveAs === 'function') {
          window.saveAs(blob, nome);
        } else {
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url; a.download = nome;
          document.body.appendChild(a); a.click(); a.remove();
          setTimeout(() => URL.revokeObjectURL(url), 2000);
        }
        const tpl = opcoes.template || (opcoes.templateId ? this.buscar(opcoes.templateId) : this.padrao(tipo));
        if (typeof registrarLog === 'function') {
          registrarLog('export_docx', tipo,
            `Exportado "${nome}" usando template "${tpl?.nome || '—'}"`, item?.id || null);
        }
      } catch (e) {
        console.warn('[Templates] gerar docx', e);
        toast(`Falha ao gerar .docx: ${e.message || e}`, 'error');
      }
    },

    async gerarLote(tipo, itens, templateId) {
      if (typeof JSZip === 'undefined') throw new Error('JSZip não carregado.');
      const tpl = this.buscar(templateId) || this.padrao(tipo);
      if (!tpl) throw new Error('Nenhum template disponível.');
      const zip = new JSZip();
      for (const item of itens) {
        const blob = await this.gerarDocx(tipo, item, { template: tpl });
        const ctx = this.construirContexto(tipo, item);
        const nome = this._nomeArquivo(tipo, item, ctx);
        zip.file(nome, blob);
      }
      return zip.generateAsync({ type: 'blob', compression: 'DEFLATE', compressionOptions: { level: 5 } });
    },
  };

    // ── Ponto de entrada ────────────────────────────────────────
    init() {
      try {
        restaurarDarkMode();
        aplicarTema('blue');

        const uuid = Storage.encontrarUUID();
        if (!uuid) {
          // Primeiro acesso — nenhum gabinete configurado
          this.renderConfiguracaoInicial();
        } else {
          // Gabinete já existe → tela de login
          this.state.uuid = uuid;
          this.state.meta = Storage.carregarMeta(uuid);
          this.renderLogin();

        console.error('Falha ao iniciar:', e);
        this._renderRecuperacao(e);

    // Tela mínima de recuperação — nunca deixa o app numa tela branca irrecuperável.
    _renderRecuperacao(e) {
      document.body.innerHTML = `

    },

    // ── Salva os dados descriptografados de volta ao localStorage ──
    salvar() {
      if (!this.state.uuid || !this.state.senha || !this.state.dados) return Promise.resolve(false);
      const p = Storage.salvarDados(this.state.uuid, this.state.dados, this.state.senha);
      try { Backup.verificar(); } catch (e) { /* silent */ }
      // opts.semSync = não marca alteração p/ o GitHub (ex.: log de login) — evita
      // marcar o local como "mais novo" e sobrescrever dados remotos no pull.
      if (!(arguments[0] && arguments[0].semSync)) {
        try { Sync.aoSalvar(this.state.uuid, this.state.senha); } catch (e) { /* sync opcional */ }
      }
      return p; // Promise<boolean> — resolve quando a gravação persistiu de fato

    _migrarUsuarios() {

        const meta = this.state.meta;
        d.usuarios = [{
          id:           gerarUUID(),

          login:        'vereador',

          tipo:         'vereador',
          ativo:        true,
          permissoes:   gerarPermissoesTotais(),
          criado_em:    new Date().toISOString(),
        }];
        d.log_atividades = d.log_atividades || [];
        this.salvar();
      }
      if (!d.log_atividades) {
        d.log_atividades = [];
        this.salvar();

    // ── Bloquear sessão (timeout ou botão Sair) ─────────────────
    bloquear() {
      pararTimeout();
      this._filaCleanup();                 // tira o atalho de teclado da fila de disparo
      this._campAtual = null; this._campPasso = null; // não deixa estado de campanha vivo
      // Remove listener de hashchange para não interferir na tela de login
      if (this._hashHandler) {
        window.removeEventListener('hashchange', this._hashHandler);
        this._hashHandler = null;
      }
      // Fecha dropdown se estiver aberto
      const dd = document.getElementById('user-dropdown-fixed');
      if (dd) dd.remove();
      // SEGURANÇA: apaga os segredos da memória ao bloquear/sair — chaves derivadas
      // (AES/HMAC), salt de sessão e o cache de cifra. Senão a chave continuava viva
      // no heap (e a senha era enumerável no cache) mesmo após voltar pro login.
      try { Crypto._keyCache = {}; Crypto._sessionSalt = null; } catch (e) {}
      try { Storage._cipherCache = {}; } catch (e) {}
      this.state.senha          = null;
      this.state.dados          = null;
      this.state.usuario_logado = null;
      this.renderLogin();
    },

    // ── Rate limiting de login ──────────────────────────────────
    _loginAttempts: 0,
    _loginLockUntil: 0,

    // Tenta fazer login: senha mestre + credenciais do usuário
    async tentarLogin() {
      // Rate limiting: bloqueia após 5 tentativas por 2 minutos
      if (Date.now() < this._loginLockUntil) {
        const segsRestantes = Math.ceil((this._loginLockUntil - Date.now()) / 1000);
        this.renderLogin(`Muitas tentativas. Aguarde ${segsRestantes}s.`);
        return;
      }
      const senhaMestre = document.getElementById('login-senha-mestre')?.value || '';
      const loginInput  = (document.getElementById('login-usuario')?.value || '').trim().toLowerCase();
      const senhaUser   = document.getElementById('login-senha')?.value || '';

      if (!senhaMestre) {
        this.renderLogin('Digite a senha do gabinete.');
        return;
      }
      if (!loginInput || !senhaUser) {
        this.renderLogin('Preencha o usu\u00e1rio e a senha pessoal.');
        return;
      }

      // Etapa 1: descriptografar dados com a senha mestre
      const dados = await Storage.carregarDados(this.state.uuid, senhaMestre);
      if (!dados) {
        this._loginAttempts++;
        if (this._loginAttempts >= 5) {
          this._loginLockUntil = Date.now() + 120000; // 2 minutos
          this._loginAttempts = 0;
        }
        this.renderLogin('Senha do gabinete incorreta.');
        return;
      }

      this.state.senha = senhaMestre;
      if (!dados.mensagens_templates || dados.mensagens_templates.length === 0) {
        dados.mensagens_templates = Mensagens._SEEDS();
      }
      dados.listas_destinatarios = dados.listas_destinatarios || [];
      dados.campanhas            = dados.campanhas            || [];
      dados.historico_mensagens  = dados.historico_mensagens  || [];
      dados.configuracoes        = dados.configuracoes        || {};
      dados.configuracoes.comunicacao = dados.configuracoes.comunicacao || { rodape_opt_out: false, ddd_padrao: '' };
      dados.contadores           = dados.contadores           || {};
      dados.contadores.campanhas = dados.contadores.campanhas || 0;
      dados.contadores.mensagens = dados.contadores.mensagens || 0;
      (dados.usuarios || []).forEach(u => {
        u.permissoes = u.permissoes || {};
        if (!u.permissoes.comunicacao) {
          u.permissoes.comunicacao = u.tipo === 'vereador'
            ? { ver: true, criar: true, editar: true, excluir: true, disparar: true }
            : { ver: false, criar: false, editar: false, excluir: false, disparar: false };
        }
      });
      (dados.cidadaos || []).forEach(c => {
        if (c.telefone && !c.telefone_e164) {
          const dddDef = dados.configuracoes?.comunicacao?.ddd_padrao || '';
          const fone = normalizarTelefone(c.telefone, dddDef);
          c.telefone_e164 = fone.e164;
          c.telefone_invalido = !fone.valido;
          c.telefone_tipo = fone.tipo;
        }
        if (c.opt_out_comunicacao === undefined) c.opt_out_comunicacao = false;
      });
      this.state.dados = dados;

      // Migração: inicializa arrays de módulos novos se não existirem
      const migracao = {
        projetos_lei:[], cidadaos:[], contatos:[], fiscalizacoes:[],
        diario:[], anexos:[], cesta_basica:[], saude:[]
      };
      for (const [k,v] of Object.entries(migracao)) {
        if (!this.state.dados[k]) this.state.dados[k] = v;
      }

      // Bairros: canoniza (uma vez) os cadastros IMPORTADOS pela lista oficial de
      // Bertioga — corrige a 1ª importação que gerou bairros "sujos" (nome de rua,
      // variações). Depois apenas recompõe a lista distinta + backfill leve.
      if (!this.state.dados._bairrosCanon) {
        (this.state.dados.cidadaos || []).forEach(c => {
          if (c.fonte === 'importacao' && c.endereco) { const b = this._extrairBairro(c.endereco); if (b) c.bairro = b; }
        });
        this.state.dados._bairrosCanon = true;
      }
      {
        const bset = new Set();
        (this.state.dados.cidadaos || []).forEach(c => {
          if (!c.bairro && c.endereco) c.bairro = this._extrairBairro(c.endereco);
          if (c.bairro) bset.add(c.bairro);
        });
        this.state.dados.bairros = Array.from(bset).sort();
      }

      // Liderança: marca (uma vez) como liderança quem já tinha a tag "liderança(s)".
      if (!this.state.dados._lideMigrado) {
        (this.state.dados.cidadaos || []).forEach(c => {
          if (!c.lideranca && (c.tags || []).some(t => /lideran/i.test(t))) c.lideranca = true;
        });
        this.state.dados._lideMigrado = true;
      }

      // Cesta: conserta (uma vez) cestas marcadas "entregue" SEM nenhuma entrega registrada
      // (dado antigo) — cria a entrega na competência da solicitação, p/ os números do
      // dashboard ("já receberam" x "entregas no mês") baterem.
      if (!this.state.dados._cestaEntregaBackfill) {
        (this.state.dados.cesta_basica || []).forEach(s => {
          if (s.status === 'entregue' && (!s.entregas || !s.entregas.length)) {
            const base = (s.data_solicitacao || (s.criado_em ? dataLocal(new Date(s.criado_em)) : '') || hoje());
            s.entregas = [{ id: gerarUUID(), competencia: base.slice(0, 7), data: base, quantidade: 1, auto: true }];
          }
        });
        this.state.dados._cestaEntregaBackfill = true;
      }

      // Migração: criar array de usuários se não existir
      this._migrarUsuarios();

      // Etapa 2: autenticar o usuário pelo login + senha (timing-safe)
      const usuario = (this.state.dados.usuarios || []).find(u =>
        u.login?.toLowerCase() === loginInput && u.ativo && verificarSenha(senhaUser, u.senha_hash)
      );

      if (!usuario) {
        this._loginAttempts++;
        if (this._loginAttempts >= 5) {
          this._loginLockUntil = Date.now() + 120000;
          this._loginAttempts = 0;
        }
        this.state.senha = null;
        this.state.dados = null;
        this.renderLogin('Usu\u00e1rio ou senha pessoal incorretos.');
        return;
      }

      // Login bem-sucedido — resetar rate limit
      this._loginAttempts = 0;
      this._loginLockUntil = 0;

      // Strip senha_hash — nunca manter hash em memória de sessão
      const { senha_hash: _, ...usuarioSeguro } = usuario;
      this.state.usuario_logado = usuarioSeguro;

      const temaKey = dados.configuracoes?.tema || _resolverTema(dados.configuracoes?.cor);
      aplicarTema(temaKey);

      if (dados.configuracoes?.foto_base64) {
        App._fotoprevCache = dados.configuracoes.foto_base64;
      }

      iniciarTimeout();

      registrarLog('login', 'sistema', `Login realizado por ${esc(usuario.nome)}`, usuario.id);
      this.salvar({ semSync: true }); // log de login não conta como alteração p/ o sync

      toast(`Bem-vinda(o), ${esc(usuario.nome)}!`, 'success');
      this._posLogin();
      // Sincronização: ao entrar, puxa do GitHub (silencioso). Se o outro aparelho
      // tiver dados mais novos, eles entram aqui.
      try {
        const uuid = this.state.uuid, senha = this.state.senha;
        if (Sync.configurado(uuid, senha)) setTimeout(() => Sync.sincronizar(uuid, senha, { silencioso: true }), 800);
      } catch (e) {}
    },

    _exportarBackupLogin() {
      abrirModal(`
